# 音乐播放器配置 - 唱碟样式
# 自定义实现，不使用 APlayer

# 注入配置
inject:
  head:
    - <style>#page-header,#page-header::before,#footer,#footer::before{background:transparent!important}</style>
    # 导航栏标题改为 Mercury
    - <style>#blog-info .site-name{font-size:0}#blog-info .site-name::after{content:"Mercury";font-size:16px}</style>
    # 音乐播放器样式
    - <link rel="stylesheet" href="/css/music-player.css">
    # 全局用户认证样式
    - <link rel="stylesheet" href="/css/site-auth.css">
    # 个人中心样式
    - <link rel="stylesheet" href="/css/user-center.css">
    # 百度站长验证
    - <meta name="baidu-site-verification" content="codeva-ZY06XcFKmM" />
  bottom:
    # 全局用户认证
    - <script src="/js/site-auth.js"></script>
    # CWD评论认证钩子
    - <script src="/js/cwd-auth-hook.js"></script>
    # 天气
    - <script src="/js/weather-store.js"></script>
    - <script src="/js/weather-widget.js"></script>
    # 日历
    - <script src="/js/lunar.js"></script>
    - <script src="/js/calendar-widget.js"></script>
    # CWD评论系统
    - <script src="https://unpkg.com/cwd-widget@0.1.11/dist/cwd.js"></script>
    - <script>function initCWD(){var wrap=document.querySelector('.comment-wrap');if(!wrap)return;wrap.innerHTML='<div id="cwd-comments"></div>';function init(){if(typeof CWDComments==='undefined')return;new CWDComments({el:'#cwd-comments',apiBaseUrl:'https://cwd-api.233002.xyz',siteId:'blog',lang:'zh-CN',customCssUrl:'/css/cwd-custom.css'}).mount();}if(typeof CWDComments!=='undefined'){init();}else{var t=setInterval(function(){if(typeof CWDComments!=='undefined'){clearInterval(t);init();}},100);setTimeout(function(){clearInterval(t);},10000);}}document.addEventListener('DOMContentLoaded',initCWD);document.addEventListener('pjax:complete',initCWD);</script>
    # 音乐播放器
    - <script src="/js/music-player.js"></script>
    # 个人中心
    - <script src="/js/user-center.js"></script>
