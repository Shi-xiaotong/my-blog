# 音乐播放器配置 - 唱碟样式
# 自定义实现，不使用 APlayer

# 注入配置
inject:
  head:
    - <style>#page-header,#page-header::before,#footer,#footer::before{background:transparent!important}</style>
    # 音乐播放器样式
    - <link rel="stylesheet" href="/css/music-player.css">
  bottom:
    # 天气
    - <script src="/js/weather-store.js"></script>
    - <script src="/js/weather-widget.js"></script>
    # 日历
    - <script src="/js/lunar.js"></script>
    - <script src="/js/calendar-widget.js"></script>
    # CWD评论系统
    - <script src="https://unpkg.com/cwd-widget@0.1.11/dist/cwd.js"></script>
    - <script>function initCWD(){var wrap=document.querySelector('.comment-wrap');if(!wrap)return;wrap.innerHTML='<div id="cwd-comments"></div>';function init(){if(typeof CWDComments==='undefined')return;new CWDComments({el:'#cwd-comments',apiBaseUrl:'https://cwd-api.233002.xyz',siteId:'blog',lang:'zh-CN'}).mount();}if(typeof CWDComments!=='undefined'){init();}else{var t=setInterval(function(){if(typeof CWDComments!=='undefined'){clearInterval(t);init();}},100);setTimeout(function(){clearInterval(t);},10000);}}document.addEventListener('DOMContentLoaded',initCWD);document.addEventListener('pjax:complete',initCWD);</script>
    # 音乐播放器
    - <script src="/js/music-player.js"></script>
