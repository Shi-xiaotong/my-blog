<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>电视直播 - 233002.xyz</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
<style>
:root {
  --primary: #ffd93d;
  --primary-hover: #ff6b6b;
  --bg: #0f0f1a;
  --card-bg: #1a1a2e;
  --text: #e0e0e0;
  --text-secondary: #888;
  --border: #2a2a3e;
  --radius: 12px;
}
[data-theme="light"] {
  --bg: #f5f5fa;
  --card-bg: #ffffff;
  --text: #1a1a2e;
  --text-secondary: #666;
  --border: #e0e0e8;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}
.container { max-width: 1000px; margin: 0 auto; padding: 16px; }

/* Header */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 0; margin-bottom: 16px; border-bottom: 1px solid var(--border);
}
.header h1 { font-size: 22px; color: var(--primary); }
.header h1 i { margin-right: 8px; }
.back-link {
  display: inline-flex; align-items: center; gap: 6px;
  color: var(--primary); text-decoration: none; font-size: 14px;
  padding: 6px 14px; border: 1px solid var(--primary); border-radius: 20px;
  transition: all 0.2s;
}
.back-link:hover { background: var(--primary); color: #0f0f1a; }

.theme-toggle {
  width: 36px; height: 36px; border-radius: 50%;
  border: 1px solid var(--border); background: var(--card-bg); color: var(--text);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 16px; transition: all 0.2s;
}
.theme-toggle:hover { border-color: var(--primary); }

/* Input area */
.input-area {
  display: flex; gap: 8px; margin-bottom: 16px;
}
.url-input {
  flex: 1; padding: 10px 14px; border-radius: 10px;
  border: 1px solid var(--border); background: var(--card-bg);
  color: var(--text); font-size: 14px; outline: none;
  transition: border-color 0.2s;
}
.url-input:focus { border-color: var(--primary); }
.url-input::placeholder { color: var(--text-secondary); }
.play-btn {
  padding: 10px 24px; border-radius: 10px; border: none;
  background: var(--primary); color: #0f0f1a; font-weight: 600;
  cursor: pointer; font-size: 14px; transition: all 0.2s;
  white-space: nowrap;
}
.play-btn:hover { background: var(--primary-hover); color: #fff; }
.play-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* History */
.history {
  display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px;
}
.history-tag {
  padding: 4px 12px; border-radius: 16px; font-size: 12px;
  background: var(--card-bg); border: 1px solid var(--border);
  color: var(--text-secondary); cursor: pointer; transition: all 0.2s;
}
.history-tag:hover { border-color: var(--primary); color: var(--primary); }
.history-clear {
  padding: 4px 12px; border-radius: 16px; font-size: 12px;
  background: transparent; border: 1px solid #ff4444;
  color: #ff4444; cursor: pointer; transition: all 0.2s;
}
.history-clear:hover { background: #ff4444; color: #fff; }

/* Player area */
.player-area { position: relative; }
.video-wrapper {
  position: relative; width: 100%; padding-top: 56.25%;
  background: #000; border-radius: var(--radius); overflow: hidden;
}
.video-wrapper video {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: #000;
}

/* Empty state */
.empty-state {
  position: absolute; inset: 0; display: flex; align-items: center;
  justify-content: center; flex-direction: column; gap: 12px;
  color: var(--text-secondary);
}
.empty-state i { font-size: 48px; opacity: 0.3; }
.empty-state p { font-size: 14px; }

/* Loading */
.loading-overlay {
  position: absolute; inset: 0; background: rgba(0,0,0,0.7);
  display: none; align-items: center; justify-content: center;
  flex-direction: column; gap: 12px;
}
.loading-overlay.show { display: flex; }
.loading-overlay .spinner {
  width: 40px; height: 40px; border: 3px solid var(--border);
  border-top-color: var(--primary); border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Error */
.error-state {
  position: absolute; inset: 0; display: none; align-items: center;
  justify-content: center; flex-direction: column; gap: 12px;
  color: #ff6b6b;
}
.error-state.show { display: flex; }
.error-state i { font-size: 48px; opacity: 0.5; }
.error-state p { font-size: 14px; text-align: center; padding: 0 20px; }
.retry-btn {
  margin-top: 8px; padding: 8px 20px; border: 1px solid var(--primary);
  border-radius: 20px; background: transparent; color: var(--primary);
  cursor: pointer; font-size: 13px; transition: all 0.2s;
}
.retry-btn:hover { background: var(--primary); color: #0f0f1a; }

/* Status bar */
.status-bar {
  display: flex; align-items: center; gap: 12px;
  padding: 8px 0; font-size: 12px; color: var(--text-secondary);
}
.live-dot {
  display: inline-block; width: 8px; height: 8px; border-radius: 50%;
  background: #ff4444; margin-right: 4px; animation: pulse 1.5s infinite;
}
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

/* Help section */
.help-section {
  margin-top: 20px; padding: 16px; background: var(--card-bg);
  border-radius: var(--radius); border: 1px solid var(--border);
}
.help-section h3 { font-size: 14px; color: var(--primary); margin-bottom: 8px; }
.help-section ol { font-size: 13px; color: var(--text-secondary); padding-left: 20px; line-height: 1.8; }
.help-section code {
  background: var(--bg); padding: 2px 6px; border-radius: 4px;
  font-size: 12px; color: var(--primary);
}

.footer {
  text-align: center; padding: 20px 0; color: var(--text-secondary);
  font-size: 12px; border-top: 1px solid var(--border); margin-top: 20px;
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div style="display:flex;align-items:center;gap:12px;">
      <a href="/anime/" class="back-link"><i class="fas fa-arrow-left"></i> 返回影视屋</a>
      <h1><i class="fas fa-broadcast-tower"></i>电视直播</h1>
    </div>
    <button class="theme-toggle" onclick="toggleTheme()" title="切换主题"><i class="fas fa-adjust"></i></button>
  </div>

  <div class="status-bar">
    <div><i class="fas fa-info-circle"></i> 粘贴 m3u8 直播源地址即可播放</div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <input type="text" class="url-input" id="url-input" placeholder="粘贴 m3u8 直播源 URL，例如 http://xxx.m3u8" onkeydown="if(event.key==='Enter')playFromInput()">
    <button class="play-btn" id="play-btn" onclick="playFromInput()">播放</button>
  </div>

  <!-- History -->
  <div class="history" id="history"></div>

  <!-- Player -->
  <div class="player-area">
    <div class="video-wrapper">
      <video id="player" controls autoplay playsinline></video>
      <div class="empty-state" id="empty-state">
        <i class="fas fa-tv"></i>
        <p>粘贴一个 m3u8 直播源地址开始观看</p>
      </div>
      <div class="loading-overlay" id="loading">
        <div class="spinner"></div>
        <span style="color:#fff;font-size:13px;">正在加载...</span>
      </div>
      <div class="error-state" id="error-state">
        <i class="fas fa-exclamation-triangle"></i>
        <p id="error-msg">频道加载失败</p>
        <button class="retry-btn" onclick="retryPlay()">重试</button>
      </div>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;">
      <div style="font-size:14px;font-weight:600;" id="current-name"></div>
      <div style="font-size:12px;color:var(--text-secondary);" id="current-status"></div>
    </div>
  </div>

  <!-- Help -->
  <div class="help-section">
    <h3><i class="fas fa-lightbulb"></i> 如何获取直播源？</h3>
    <ol>
      <li>搜索 "IPTV m3u8 直播源" 获取公开可用的直播地址</li>
      <li>使用路由器或内网 IPTV 的 m3u8 地址</li>
      <li>注意：部分直播源可能有地域限制或时效性</li>
      <li>支持的格式：<code>m3u8</code>（HLS）和 <code>mp4</code> 视频流</li>
    </ol>
  </div>

  <div class="footer">
    仅供学习研究使用 · 直播源来自第三方
  </div>
</div>

<script>
let currentChannel = null;
let hls = null;

// Theme
function toggleTheme() {
  const html = document.documentElement;
  const current = html.getAttribute('data-theme');
  html.setAttribute('data-theme', current === 'light' ? 'dark' : 'light');
  localStorage.setItem('live-theme', html.getAttribute('data-theme'));
}
(function() {
  const t = localStorage.getItem('live-theme');
  if (t) document.documentElement.setAttribute('data-theme', t);
})();

// History management
function getHistory() {
  try {
    return JSON.parse(localStorage.getItem('live-history') || '[]');
  } catch { return []; }
}
function saveToHistory(name, url) {
  let history = getHistory();
  // Remove duplicate
  history = history.filter(h => h.url !== url);
  // Add to front
  history.unshift({ name: name || url.substring(0, 30), url });
  // Keep last 10
  if (history.length > 10) history = history.slice(0, 10);
  localStorage.setItem('live-history', JSON.stringify(history));
  renderHistory();
}
function clearHistory() {
  localStorage.removeItem('live-history');
  renderHistory();
}
function renderHistory() {
  const history = getHistory();
  const container = document.getElementById('history');
  if (history.length === 0) {
    container.innerHTML = '';
    return;
  }
  let html = history.map((h, i) =>
    `<span class="history-tag" onclick="playUrl('${h.url.replace(/'/g, "\\'")}', '${h.name.replace(/'/g, "\\'")}')">${h.name}</span>`
  ).join('');
  html += `<button class="history-clear" onclick="clearHistory()"><i class="fas fa-trash"></i> 清除</button>`;
  container.innerHTML = html;
}

// Play
function playFromInput() {
  const input = document.getElementById('url-input');
  const url = input.value.trim();
  if (!url) return;
  
  // Extract name from URL
  let name = '';
  try {
    const urlObj = new URL(url);
    const pathname = urlObj.pathname.split('/').pop();
    name = decodeURIComponent(pathname) || '未知频道';
  } catch {
    name = '自定义频道';
  }
  
  playUrl(url, name);
  input.value = '';
}

function playUrl(url, name) {
  currentChannel = { url, name };
  const video = document.getElementById('player');
  const loading = document.getElementById('loading');
  const errorState = document.getElementById('error-state');
  const emptyState = document.getElementById('empty-state');
  const statusText = document.getElementById('current-status');
  const nameEl = document.getElementById('current-name');
  const playBtn = document.getElementById('play-btn');

  // UI updates
  emptyState.style.display = 'none';
  errorState.classList.remove('show');
  loading.classList.add('show');
  nameEl.textContent = name;
  statusText.textContent = '正在连接...';
  playBtn.disabled = true;

  // Destroy previous HLS
  if (hls) {
    hls.destroy();
    hls = null;
  }

  // Save to history
  saveToHistory(name, url);

  // Detect stream type
  const isM3u8 = url.includes('.m3u8') || url.includes('playlist');
  const isHttp = url.startsWith('http://');

  if (isM3u8) {
    // HLS playback
    if (Hls.isSupported()) {
      hls = new Hls({
        maxBufferLength: 30,
        maxMaxBufferLength: 60,
        startLevel: -1,
        debug: false
      });
      hls.loadSource(url);
      hls.attachMedia(video);
      
      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        loading.classList.remove('show');
        statusText.textContent = '播放中';
        playBtn.disabled = false;
        video.play().catch(() => {});
      });
      
      hls.on(Hls.Events.ERROR, (event, data) => {
        if (data.fatal) {
          loading.classList.remove('show');
          errorState.classList.add('show');
          statusText.textContent = '连接失败';
          playBtn.disabled = false;
          if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
            document.getElementById('error-msg').textContent = '网络错误，频道可能已失效或不支持跨域访问';
            setTimeout(() => hls.startLoad(), 3000);
          } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
            hls.recoverMediaError();
          } else {
            document.getElementById('error-msg').textContent = '播放失败，该频道可能已下线';
          }
        }
      });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      // Safari native HLS
      video.src = url;
      video.addEventListener('loadedmetadata', () => {
        loading.classList.remove('show');
        statusText.textContent = '播放中';
        playBtn.disabled = false;
        video.play().catch(() => {});
      });
      video.addEventListener('error', () => {
        loading.classList.remove('show');
        errorState.classList.add('show');
        statusText.textContent = '播放失败';
        playBtn.disabled = false;
        document.getElementById('error-msg').textContent = 'Safari 也无法播放此频道';
      });
    } else {
      loading.classList.remove('show');
      errorState.classList.add('show');
      document.getElementById('error-msg').textContent = '您的浏览器不支持 HLS 播放';
      playBtn.disabled = false;
    }
  } else {
    // Direct video (mp4 etc)
    video.src = url;
    video.play().then(() => {
      loading.classList.remove('show');
      statusText.textContent = '播放中';
      playBtn.disabled = false;
    }).catch(err => {
      loading.classList.remove('show');
      errorState.classList.add('show');
      statusText.textContent = '播放失败';
      playBtn.disabled = false;
      document.getElementById('error-msg').textContent = err.message || '无法播放此视频';
    });
  }
}

function retryPlay() {
  if (currentChannel) {
    playUrl(currentChannel.url, currentChannel.name);
  }
}

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  const video = document.getElementById('player');
  if (e.key === ' ' && video && document.activeElement.tagName !== 'INPUT') {
    e.preventDefault();
    video.paused ? video.play() : video.pause();
  }
  if (e.key === 'f' && video && document.activeElement.tagName !== 'INPUT') {
    if (document.fullscreenElement) {
      document.exitFullscreen();
    } else {
      video.requestFullscreen?.();
    }
  }
});

// Init
renderHistory();
</script>
</body>
</html>
