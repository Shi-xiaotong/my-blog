<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>电视直播 - 233002.xyz</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
<style>
:root {
  --primary: #ffd93d;
  --primary-hover: #ff6b6b;
  --bg: #0f0f1a;
  --card-bg: #1a1a2e;
  --text: #e0e0e0;
  --text-secondary: #888;
  --border: #2a2a3e;
  --radius: 12px;
}
[data-theme="light"] {
  --bg: #f5f5fa;
  --card-bg: #ffffff;
  --text: #1a1a2e;
  --text-secondary: #666;
  --border: #e0e0e8;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}
.container { max-width: 1400px; margin: 0 auto; padding: 16px; }
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 0; margin-bottom: 16px; border-bottom: 1px solid var(--border);
}
.header h1 { font-size: 22px; color: var(--primary); }
.header h1 i { margin-right: 8px; }
.back-link {
  display: inline-flex; align-items: center; gap: 6px;
  color: var(--primary); text-decoration: none; font-size: 14px;
  padding: 6px 14px; border: 1px solid var(--primary); border-radius: 20px;
  transition: all 0.2s;
}
.back-link:hover { background: var(--primary); color: #0f0f1a; }
.theme-toggle {
  width: 36px; height: 36px; border-radius: 50%;
  border: 1px solid var(--border); background: var(--card-bg); color: var(--text);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 16px; transition: all 0.2s;
}
.theme-toggle:hover { border-color: var(--primary); }

/* Tabs */
.tab-bar { display: flex; gap: 4px; margin-bottom: 16px; flex-wrap: wrap; }
.tab-btn {
  padding: 6px 16px; border: 1px solid var(--border); border-radius: 20px;
  background: transparent; color: var(--text-secondary);
  cursor: pointer; font-size: 13px; transition: all 0.2s;
}
.tab-btn.active { background: var(--primary); color: #0f0f1a; border-color: var(--primary); font-weight: 600; }
.tab-btn:hover:not(.active) { border-color: var(--primary); color: var(--primary); }

/* Layout */
.layout { display: grid; grid-template-columns: 1fr 340px; gap: 16px; }
@media (max-width: 900px) {
  .layout { grid-template-columns: 1fr; }
  .channel-sidebar { max-height: 300px; }
}

/* Player */
.player-area { position: relative; }
.video-wrapper {
  position: relative; width: 100%; padding-top: 56.25%;
  background: #000; border-radius: var(--radius); overflow: hidden;
}
.video-wrapper video {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: #000;
}
.empty-state {
  position: absolute; inset: 0; display: flex; align-items: center;
  justify-content: center; flex-direction: column; gap: 12px;
  color: var(--text-secondary);
}
.empty-state i { font-size: 48px; opacity: 0.3; }
.loading-overlay {
  position: absolute; inset: 0; background: rgba(0,0,0,0.7);
  display: none; align-items: center; justify-content: center;
  flex-direction: column; gap: 12px;
}
.loading-overlay.show { display: flex; }
.loading-overlay .spinner {
  width: 40px; height: 40px; border: 3px solid var(--border);
  border-top-color: var(--primary); border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.error-state {
  position: absolute; inset: 0; display: none; align-items: center;
  justify-content: center; flex-direction: column; gap: 12px;
  color: #ff6b6b;
}
.error-state.show { display: flex; }
.error-state i { font-size: 48px; opacity: 0.5; }
.error-state p { font-size: 14px; text-align: center; padding: 0 20px; }
.retry-btn {
  margin-top: 8px; padding: 8px 20px; border: 1px solid var(--primary);
  border-radius: 20px; background: transparent; color: var(--primary);
  cursor: pointer; font-size: 13px; transition: all 0.2s;
}
.retry-btn:hover { background: var(--primary); color: #0f0f1a; }

/* Channel info bar */
.channel-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 0; font-size: 14px;
}
.channel-bar .ch-name { font-weight: 600; }
.channel-bar .ch-status { font-size: 12px; color: var(--text-secondary); }
.live-dot {
  display: inline-block; width: 8px; height: 8px; border-radius: 50%;
  background: #ff4444; margin-right: 4px; animation: pulse 1.5s infinite;
}
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

/* Sidebar */
.channel-sidebar {
  background: var(--card-bg); border-radius: var(--radius);
  border: 1px solid var(--border); display: flex; flex-direction: column;
  max-height: calc(100vh - 100px);
}
.sidebar-header { padding: 12px; border-bottom: 1px solid var(--border); }
.search-box {
  position: relative; margin-bottom: 10px;
}
.search-box input {
  width: 100%; padding: 8px 12px 8px 36px; border-radius: 8px;
  border: 1px solid var(--border); background: var(--bg);
  color: var(--text); font-size: 14px; outline: none;
  transition: border-color 0.2s;
}
.search-box input:focus { border-color: var(--primary); }
.search-box i {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  color: var(--text-secondary); font-size: 14px;
}
.channel-list {
  flex: 1; overflow-y: auto; padding: 8px;
}
.channel-list::-webkit-scrollbar { width: 4px; }
.channel-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.channel-group-title {
  font-size: 11px; color: var(--text-secondary); padding: 8px 4px 4px;
  text-transform: uppercase; letter-spacing: 1px; font-weight: 600;
  position: sticky; top: 0; background: var(--card-bg); z-index: 1;
}
.channel-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; border-radius: 8px; cursor: pointer;
  transition: all 0.15s; margin-bottom: 2px;
}
.channel-item:hover { background: var(--border); }
.channel-item.active { background: var(--primary); color: #0f0f1a; }
.ch-logo {
  width: 36px; height: 36px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-weight: bold; font-size: 12px;
}
.ch-name {
  font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  flex: 1;
}
.ch-badge {
  font-size: 10px; padding: 1px 6px; border-radius: 8px;
  background: rgba(255,255,255,0.15); flex-shrink: 0;
}
.channel-item.active .ch-badge { background: rgba(0,0,0,0.2); }
.no-results {
  text-align: center; padding: 40px 20px; color: var(--text-secondary);
}
.no-results i { font-size: 32px; margin-bottom: 8px; display: block; }

/* Loading channels */
.loading-channels {
  text-align: center; padding: 40px; color: var(--text-secondary);
}
.loading-channels .spinner {
  width: 30px; height: 30px; border: 3px solid var(--border);
  border-top-color: var(--primary); border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 12px;
}
.fail-msg {
  text-align: center; padding: 20px; color: var(--text-secondary);
  font-size: 13px;
}
.fail-msg a { color: var(--primary); }

.footer {
  text-align: center; padding: 20px 0; color: var(--text-secondary);
  font-size: 12px; border-top: 1px solid var(--border); margin-top: 20px;
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div style="display:flex;align-items:center;gap:12px;">
      <a href="/anime/" class="back-link"><i class="fas fa-arrow-left"></i> 返回影视屋</a>
      <h1><i class="fas fa-broadcast-tower"></i>电视直播</h1>
    </div>
    <button class="theme-toggle" onclick="toggleTheme()" title="切换主题"><i class="fas fa-adjust"></i></button>
  </div>

  <!-- Tabs -->
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="all" onclick="switchTab('all')">全部</button>
    <button class="tab-btn" data-tab="cctv" onclick="switchTab('cctv')">CCTV</button>
    <button class="tab-btn" data-tab="卫视" onclick="switchTab('卫视')">卫视</button>
    <button class="tab-btn" data-tab="其他" onclick="switchTab('其他')">其他</button>
  </div>

  <div class="layout">
    <!-- Player -->
    <div class="player-area">
      <div class="video-wrapper">
        <video id="player" controls autoplay playsinline></video>
        <div class="empty-state" id="empty-state">
          <i class="fas fa-tv"></i>
          <p>从右侧列表选择一个频道</p>
        </div>
        <div class="loading-overlay" id="loading">
          <div class="spinner"></div>
          <span style="color:#fff;font-size:13px;">正在加载...</span>
        </div>
        <div class="error-state" id="error-state">
          <i class="fas fa-exclamation-triangle"></i>
          <p id="error-msg">播放失败</p>
          <button class="retry-btn" onclick="retryPlay()">重试</button>
        </div>
      </div>
      <div class="channel-bar">
        <span class="ch-name" id="current-name">等待选择频道</span>
        <span class="ch-status" id="current-status"></span>
      </div>
    </div>

    <!-- Sidebar -->
    <div class="channel-sidebar">
      <div class="sidebar-header">
        <div class="search-box">
          <i class="fas fa-search"></i>
          <input type="text" id="search-input" placeholder="搜索频道..." oninput="filterChannels()">
        </div>
      </div>
      <div class="channel-list" id="channel-list">
        <div class="loading-channels">
          <div class="spinner"></div>
          <p>正在加载频道列表...</p>
          <p style="font-size:11px;margin-top:4px;">从 GitHub 获取 Free-TV IPTV 源</p>
        </div>
      </div>
    </div>
  </div>

  <div class="footer">
    数据源: Free-TV IPTV · 频道可用性取决于您的网络环境 · 仅供学习研究
  </div>
</div>

<script>
const SOURCES = [
  'https://raw.githubusercontent.com/Free-TV/IPTV/master/playlist.m3u8',
  'https://ghproxy.net/https://raw.githubusercontent.com/Free-TV/IPTV/master/playlist.m3u8',
  'https://cdn.jsdelivr.net/gh/Free-TV/IPTV@master/playlist.m3u8'
];

let channels = [];
let currentChannel = null;
let hls = null;
let currentTab = 'all';
let filteredChannels = [];

// Theme
function toggleTheme() {
  const html = document.documentElement;
  const current = html.getAttribute('data-theme');
  html.setAttribute('data-theme', current === 'light' ? 'dark' : 'light');
  localStorage.setItem('live-theme', html.getAttribute('data-theme'));
}
(function() {
  const t = localStorage.getItem('live-theme');
  if (t) document.documentElement.setAttribute('data-theme', t);
})();

// Parse M3U
function parseM3U(text) {
  const result = [];
  const lines = text.split('\n');
  let current = null;
  
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i].trim();
    if (line.startsWith('#EXTINF:')) {
      const info = line.substring(10);
      const nameMatch = info.match(/,(.+)$/);
      const name = nameMatch ? nameMatch[1].trim() : 'Unknown';
      
      // Extract metadata
      const logoMatch = info.match(/tvg-logo="([^"]*)"/);
      const logo = logoMatch ? logoMatch[1] : '';
      
      const groupMatch = info.match(/group-title="([^"]*)"/);
      const group = groupMatch ? groupMatch[1] : '';
      
      const countryMatch = info.match(/tvg-country="([A-Z]{2})"/);
      const country = countryMatch ? countryMatch[1] : '';
      
      current = { name, logo, group, country };
    } else if (line && !line.startsWith('#') && current) {
      current.url = line;
      // Filter: only HTTP/HTTPS, no IPv6, no YouTube/Twitch
      if ((line.startsWith('http://') || line.startsWith('https://')) &&
          !line.includes('youtube.com') && !line.includes('twitch.tv') &&
          !line.includes('youtu.be') &&
          !line.includes('[')) {
        result.push({...current});
      }
      current = null;
    }
  }
  return result;
}

// Classify channel
function classify(ch) {
  const n = ch.name.toUpperCase();
  if (/CCTV/.test(n)) return 'cctv';
  if (/卫视|TV/.test(ch.name) && !/CCTV/.test(n)) return '卫视';
  return '其他';
}

// Load channels from source
async function loadChannels() {
  const listEl = document.getElementById('channel-list');
  
  for (const source of SOURCES) {
    try {
      const resp = await fetch(source, { signal: AbortSignal.timeout(15000) });
      if (!resp.ok) continue;
      const text = await resp.text();
      const parsed = parseM3U(text);
      
      if (parsed.length > 0) {
        channels = parsed;
        // Deduplicate by URL
        const seen = new Set();
        channels = channels.filter(ch => {
          if (seen.has(ch.url)) return false;
          seen.add(ch.url);
          return true;
        });
        // Add classification
        channels.forEach(ch => ch.category = classify(ch));
        
        listEl.innerHTML = `<div style="padding:8px;font-size:12px;color:var(--text-secondary);">共 ${channels.length} 个频道</div>` + listEl.innerHTML.replace('<div class="loading-channels">...</div>', '');
        renderChannels();
        return;
      }
    } catch (e) {
      console.warn(`Source failed: ${source}`, e.message);
    }
  }
  
  // All sources failed
  listEl.innerHTML = `
    <div class="fail-msg">
      <i class="fas fa-exclamation-circle" style="font-size:24px;display:block;margin-bottom:8px;color:var(--text-secondary);"></i>
      频道列表加载失败<br>
      <a href="https://raw.githubusercontent.com/Free-TV/IPTV/master/playlist.m3u8" target="_blank">手动下载 M3U 文件</a>
      或粘贴 m3u8 URL 播放
    </div>
    <div style="padding:12px;">
      <input type="text" class="url-input" id="fallback-input" 
        style="width:100%;padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:13px;"
        placeholder="或在此粘贴 m3u8 直播源 URL">
      <button onclick="playFallback()" style="margin-top:8px;width:100%;padding:8px;border-radius:8px;border:1px solid var(--primary);background:transparent;color:var(--primary);cursor:pointer;">播放</button>
    </div>`;
}

function playFallback() {
  const input = document.getElementById('fallback-input');
  if (input && input.value.trim()) {
    playUrl(input.value.trim(), '自定义频道');
  }
}

// Render channels
function renderChannels() {
  const search = document.getElementById('search-input').value.toLowerCase();
  
  let tabs = currentTab === 'all' ? ['cctv','卫视','其他'] : [currentTab];
  filteredChannels = channels.filter(ch => 
    tabs.includes(ch.category) && ch.name.toLowerCase().includes(search)
  );
  
  if (filteredChannels.length === 0) {
    document.getElementById('channel-list').innerHTML += 
      '<div class="no-results"><i class="fas fa-search"></i><p>没有找到匹配的频道</p></div>';
    return;
  }
  
  // Group
  const groups = {};
  filteredChannels.forEach(ch => {
    const g = ch.group || '其他';
    if (!groups[g]) groups[g] = [];
    groups[g].push(ch);
  });
  
  // Build HTML
  let html = '';
  const groupOrder = ['CCTV', '央视', 'China', 'CETV', '教育', '卫视频道', '卫视', '其他'];
  const sortedGroups = Object.keys(groups).sort((a, b) => {
    const ia = groupOrder.findIndex(g => a.includes(g));
    const ib = groupOrder.findIndex(g => b.includes(g));
    if (ia >= 0 && ib >= 0) return ia - ib;
    if (ia >= 0) return -1;
    if (ib >= 0) return 1;
    return a.localeCompare(b);
  });
  
  for (const g of sortedGroups) {
    if (groups[g].length === 0) continue;
    html += `<div class="channel-group-title">${g}</div>`;
    groups[g].forEach(ch => {
      const isActive = currentChannel && currentChannel.url === ch.url;
      const initials = ch.name.replace(/[^\u4e00-\u9fa5a-zA-Z0-9]/g, '').substring(0, 2);
      const colors = ['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#1abc9c','#e67e22','#34495e','#16a085','#c0392b'];
      const ci = (initials.charCodeAt(0) + (initials.charCodeAt(1) || 0)) % colors.length;
      
      html += `
        <div class="channel-item ${isActive ? 'active' : ''}" onclick="playChannel(${JSON.stringify(ch).replace(/"/g, '&quot;')})">
          <div class="ch-logo" style="background:${colors[ci]}40;color:${colors[ci]}">${initials}</div>
          <span class="ch-name">${ch.name}</span>
          ${isActive ? '<span class="ch-badge">播放中</span>' : ''}
        </div>`;
    });
  }
  
  // Prepend to existing content (after the count div)
  const existing = document.querySelector('.channel-list > div:first-child');
  const listEl = document.getElementById('channel-list');
  if (existing) {
    listEl.innerHTML = '';
    listEl.innerHTML = existing.outerHTML + html;
  } else {
    listEl.innerHTML = html;
  }
}

function filterChannels() {
  renderChannels();
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tab === tab);
  });
  renderChannels();
}

// Play
function playChannel(channel) {
  currentChannel = channel;
  const video = document.getElementById('player');
  const loading = document.getElementById('loading');
  const errorState = document.getElementById('error-state');
  const emptyState = document.getElementById('empty-state');
  const statusText = document.getElementById('current-status');
  const nameEl = document.getElementById('current-name');
  
  emptyState.style.display = 'none';
  errorState.classList.remove('show');
  loading.classList.add('show');
  nameEl.textContent = channel.name;
  statusText.innerHTML = '<span class="live-dot"></span>正在连接...';
  
  if (hls) { hls.destroy(); hls = null; }
  
  const url = channel.url;
  
  if (url.startsWith('http://')) {
    video.src = url;
    video.play().then(() => {
      loading.classList.remove('show');
      statusText.innerHTML = '<span class="live-dot"></span>播放中';
    }).catch(() => {
      loading.classList.remove('show');
      errorState.classList.add('show');
      statusText.textContent = '播放失败';
    });
    return;
  }
  
  if (Hls.isSupported()) {
    hls = new Hls({ maxBufferLength: 30, maxMaxBufferLength: 60, startLevel: -1, debug: false });
    hls.loadSource(url);
    hls.attachMedia(video);
    
    hls.on(Hls.Events.MANIFEST_PARSED, () => {
      loading.classList.remove('show');
      statusText.innerHTML = '<span class="live-dot"></span>播放中';
      video.play().catch(() => {});
    });
    
    hls.on(Hls.Events.ERROR, (event, data) => {
      if (data.fatal) {
        loading.classList.remove('show');
        errorState.classList.add('show');
        statusText.textContent = '连接失败';
        if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
          document.getElementById('error-msg').textContent = '网络错误，该频道可能已下线或不可访问';
          setTimeout(() => hls.startLoad(), 3000);
        } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
          hls.recoverMediaError();
        } else {
          document.getElementById('error-msg').textContent = '播放失败';
        }
      }
    });
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = url;
    video.addEventListener('loadedmetadata', () => {
      loading.classList.remove('show');
      statusText.innerHTML = '<span class="live-dot"></span>播放中';
      video.play().catch(() => {});
    });
    video.addEventListener('error', () => {
      loading.classList.remove('show');
      errorState.classList.add('show');
      statusText.textContent = '播放失败';
    });
  }
}

function playUrl(url, name) {
  playChannel({ url, name, logo: '', group: '', category: '其他' });
}

function retryPlay() {
  if (currentChannel) playChannel(currentChannel);
}

// Keyboard
document.addEventListener('keydown', (e) => {
  const video = document.getElementById('player');
  if (e.key === ' ' && video && document.activeElement.tagName !== 'INPUT') {
    e.preventDefault();
    video.paused ? video.play() : video.pause();
  }
  if (e.key === 'f' && video && document.activeElement.tagName !== 'INPUT') {
    if (document.fullscreenElement) document.exitFullscreen();
    else video.requestFullscreen?.();
  }
});

// Init
loadChannels();
</script>
</body>
</html>
