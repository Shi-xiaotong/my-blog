<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - 页面未找到</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:20px}
.container{max-width:480px}
h1{font-size:6em;font-weight:700;color:#9d7cd8;margin-bottom:16px}
p{font-size:1.1em;color:#94a3b8;margin-bottom:24px;line-height:1.6}
a{display:inline-block;padding:12px 32px;background:#9d7cd8;color:#fff;text-decoration:none;border-radius:8px;font-size:15px;transition:all .2s}
a:hover{background:#7c4dff;transform:translateY(-1px)}
</style>
</head>
<body>
<div class="container">
  <h1>404</h1>
  <p>页面走丢了，可能是链接有误或已被移除。</p>
  <a href="/">返回首页</a>
</div>
</body>
</html>
