<html lang="zh-CN">

<meta charset="UTF-8">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root {
  --primary: #9D7CD8;
  --primary-light: rgba(157, 124, 216, 0.12);
  --bg: #f4f6f9;
  --card-bg: #ffffff;
  --text: #1e293b;
  --text-secondary: #64748b;
  --border: #e2e8f0;
  --radius: 14px;
  --shadow: 0 1px 4px rgba(0,0,0,0.06);
  --shadow-hover: 0 6px 20px rgba(0,0,0,0.10);
}
[data-theme="dark"] {
  --bg: #0f172a;
  --card-bg: #1e293b;
  --text: #e2e8f0;
  --text-secondary: #94a3b8;
  --border: #334155;
  --primary-light: rgba(157, 124, 216, 0.15);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}
.container { max-width: 1200px; margin: 0 auto; padding: 20px; }

/* Header */
.header {
  display: flex; align-items: center; gap: 12px; margin-bottom: 8px;
}
.header h1 { font-size: 1.6em; font-weight: 700; }
.header-right {
  margin-left: auto; display: flex; align-items: center; gap: 12px;
}
.header-sub {
  color: var(--text-secondary); font-size: 14px; margin-bottom: 24px;
}
.back-link {
  display: inline-flex; align-items: center; gap: 6px; color: var(--primary);
  text-decoration: none; font-size: 14px;
}
.back-link:hover { text-decoration: underline; }

/* Theme toggle */
.theme-toggle {
  width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border);
  background: var(--card-bg); color: var(--text); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.theme-toggle svg { width: 18px; height: 18px; }

/* Auth bar */
.auth-bar {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 16px; border-radius: 10px;
  background: var(--card-bg); border: 1px solid var(--border);
  font-size: 13px;
}
.auth-bar .login-btn {
  padding: 4px 12px; border-radius: 6px; border: 1px solid var(--primary);
  background: transparent; color: var(--primary); cursor: pointer;
  font-size: 12px; transition: all 0.15s;
}
.auth-bar .login-btn:hover { background: var(--primary); color: #fff; }
.auth-bar .user-avatar {
  width: 28px; height: 28px; border-radius: 50%; overflow: hidden; flex-shrink: 0;
}
.auth-bar .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
.auth-bar .user-name { font-weight: 600; font-size: 13px; }

/* Search */
.search-bar {
  margin-bottom: 24px;
  display: flex; gap: 8px;
}
.search-bar input {
  flex: 1; padding: 12px 18px; border: 1px solid var(--border);
  border-radius: 10px; font-size: 15px; background: var(--card-bg);
  color: var(--text); outline: none; transition: all 0.2s;
}
.search-bar input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }
.search-bar select {
  padding: 12px 16px; border: 1px solid var(--border); border-radius: 10px;
  background: var(--card-bg); color: var(--text); font-size: 14px; outline: none;
  cursor: pointer;
}

/* Category Section */
.category-section {
  margin-bottom: 28px;
}
.category-header {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 14px; padding-bottom: 8px;
  border-bottom: 2px solid var(--border);
}
.category-header h2 {
  font-size: 1.15em; font-weight: 700;
}
.category-icon { font-size: 1.3em; }
.category-count {
  font-size: 12px; color: var(--text-secondary);
  background: var(--border); padding: 2px 10px; border-radius: 20px;
  margin-left: auto;
}

/* Grid */
.links-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 10px;
}

/* Link Card */
.link-card {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px; border-radius: 10px;
  background: var(--card-bg); border: 1px solid var(--border);
  text-decoration: none; color: var(--text);
  transition: all 0.2s; cursor: pointer;
  position: relative; overflow: hidden;
}
.link-card:hover {
  border-color: var(--primary);
  box-shadow: var(--shadow-hover);
  transform: translateY(-2px);
}
.link-card .favicon {
  width: 22px; height: 22px; border-radius: 4px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; color: var(--primary);
}
.link-card .favicon img { width: 100%; height: 100%; border-radius: 4px; object-fit: contain; }
.link-card .name {
  font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden;
  text-overflow: ellipsis;
}
.link-card .desc {
  display: none; /* shown on hover */
}

/* Locked Category */
.locked-section {
  position: relative;
}
.locked-overlay {
  position: absolute; inset: 0; z-index: 2;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 8px;
  background: var(--card-bg);
  border-radius: var(--radius);
  backdrop-filter: blur(4px);
  cursor: pointer; transition: all 0.3s;
}
.locked-overlay .lock-icon {
  font-size: 32px; color: var(--text-secondary); opacity: 0.6;
}
.locked-overlay .lock-text {
  font-size: 14px; color: var(--text-secondary); font-weight: 500;
}
.locked-overlay .lock-hint {
  font-size: 12px; color: var(--text-secondary); opacity: 0.7;
}
.locked-overlay:hover {
  background: var(--primary-light);
}
.locked-overlay:hover .lock-icon { color: var(--primary); opacity: 1; }
.locked-overlay.unlocked { display: none; }
.locked-overlay.unlocking { display: none; }

/* Private Bookmark */
.private-section {
  border: 2px dashed var(--primary);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 28px;
  display: none;
}
.private-section.visible { display: block; }
.private-header {
  display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
}
.private-header h2 { font-size: 1.15em; font-weight: 700; flex: 1; }
.private-header .edit-btn {
  padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--card-bg); color: var(--text); cursor: pointer;
  font-size: 12px; transition: all 0.15s;
}
.private-header .edit-btn:hover { border-color: var(--primary); color: var(--primary); }

/* Add bookmark form */
.add-form {
  display: none; grid-template-columns: 1fr 1fr auto auto; gap: 8px;
  margin-bottom: 14px; align-items: end;
}
.add-form.visible { display: grid; }
.add-form label { font-size: 12px; color: var(--text-secondary); display: block; margin-bottom: 2px; }
.add-form input, .add-form select {
  width: 100%; padding: 8px 12px; border: 1px solid var(--border);
  border-radius: 8px; background: var(--bg); color: var(--text);
  font-size: 13px; outline: none;
}
.add-form input:focus, .add-form select:focus { border-color: var(--primary); }
.add-form .btn {
  padding: 8px 16px; border: none; border-radius: 8px; cursor: pointer;
  font-size: 13px; transition: all 0.15s; white-space: nowrap;
}
.add-form .btn-primary { background: var(--primary); color: #fff; }
.add-form .btn-primary:hover { filter: brightness(1.1); }
.add-form .btn-cancel { background: transparent; border: 1px solid var(--border); color: var(--text); }
.add-form .btn-cancel:hover { border-color: #ef4444; color: #ef4444; }

/* Empty state */
.empty-state {
  text-align: center; padding: 30px 20px; color: var(--text-secondary); font-size: 14px;
  grid-column: 1 / -1;
}

/* Delete button on private cards */
.link-card .delete-btn {
  display: none;
  position: absolute; top: 4px; right: 4px;
  width: 20px; height: 20px; border-radius: 50%;
  background: #ef4444; color: #fff; border: none;
  font-size: 10px; cursor: pointer; align-items: center; justify-content: center;
  z-index: 1;
}
.link-card .delete-btn:hover { background: #dc2626; }
.private-editing .link-card .delete-btn { display: flex; }

/* Toast */
.toast {
  position: fixed; top: 20px; right: 20px; padding: 10px 20px;
  border-radius: 8px; background: #22c55e; color: #fff; font-size: 14px;
  z-index: 999; animation: fadeInOut 2s;
}
.toast.error { background: #ef4444; }
@keyframes fadeInOut {
  0%{opacity:0;transform:translateY(-10px)}
  10%{opacity:1;transform:translateY(0)}
  80%{opacity:1}
  100%{opacity:0}
}

/* Responsive */
@media (max-width: 640px) {
  .container { padding: 12px; }
  .links-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px; }
  .add-form.visible { grid-template-columns: 1fr; }
  .search-bar { flex-direction: column; }
  .header h1 { font-size: 1.3em; }
}

<script>
// ========== Theme ==========
function toggleTheme(){
  const h=document.documentElement;
  const d=h.getAttribute('data-theme')==='dark';
  h.setAttribute('data-theme',d?'':'dark');
  localStorage.setItem('nav-theme',d?'light':'dark');
}
(function(){
  const s=localStorage.getItem('nav-theme');
  if(s==='dark') document.documentElement.setAttribute('data-theme','dark');
})();

// ========== Auth ==========
function updateAuthBar(){
  const bar=document.getElementById('authState');
  const auth=window._siteAuth;
  if(auth&&auth.isLoggedIn()){
    const u=auth.getUser();
    const name=u?u.display_name||(u.email?u.email.split('@')[0]:''):'用户';
    const avatar=u&&u.avatar_url?`<img src="${u.avatar_url}" alt="">`:'';
    bar.innerHTML=`<div class="user-avatar">${avatar||'<i class="fas fa-user" style="font-size:14px;line-height:28px;text-align:center;display:block;color:var(--primary)"></i>'}</div>
      <span class="user-name">${name}</span>`;
    // Show private section
    document.getElementById('privateSection').classList.add('visible');
    // Unlock locked categories
    unlockCategories();
  }else{
    bar.innerHTML=`<span style="color:var(--text-secondary)">未登录</span>
      <button class="login-btn" onclick="tryLogin()">登录解锁🔓</button>`;
  }
}

function tryLogin(){
  if(window.showSiteLoginModal) showSiteLoginModal();
}

// ========== Locked Categories ==========
function unlockCategories(){
  document.querySelectorAll('.locked-overlay').forEach(el=>{
    el.classList.add('unlocked');
  });
}

// ========== Render ==========
function renderCategories(filterText='', filterCategory=''){
  const container=document.getElementById('categoriesContainer');
  const filterSel=document.getElementById('categoryFilter');
  container.innerHTML='';
  filterSel.innerHTML='<option value="">全部分类</option>';

  CATEGORIES.forEach(cat=>{
    filterSel.innerHTML+=`<option value="${cat.id}">${cat.icon} ${cat.name}</option>`;

    const filtered=cat.sites.filter(s=>{
      const matchName=s.name.toLowerCase().includes(filterText.toLowerCase());
      const matchUrl=s.url.toLowerCase().includes(filterText.toLowerCase());
      const matchCat=!filterCategory||filterCategory===cat.id;
      return (matchName||matchUrl)&&matchCat;
    });

    if(filterCategory&&filterCategory!==cat.id) return;

    const section=document.createElement('div');
    section.className='category-section';
    section.dataset.category=cat.id;
    section.innerHTML=`
      <div class="category-header">
        <span class="category-icon">${cat.icon}</span>
        <h2>${cat.name}</h2>
        <span class="category-count">${cat.sites.length} 个</span>
      </div>
      <div class="links-grid" id="grid-${cat.id}">
        ${filtered.map(s=>`<a href="${s.url}" class="link-card" target="_blank" rel="noopener noreferrer" title="${s.name}">
          <span class="favicon"><img src="${s.icon}" onerror="this.outerHTML='<i class=\\'fas fa-globe\\'></i>'" alt=""></span>
          <span class="name">${s.name}</span>
        </a>`).join('')}
      </div>
    `;

    if(cat.locked){
      section.classList.add('locked-section');
      section.style.position='relative';
      section.innerHTML+=`
        <div class="locked-overlay" id="lock-${cat.id}">
          <div class="lock-icon">🔒</div>
          <div class="lock-text">登录后解锁此分类</div>
          <div class="lock-hint">包含云服务、域名管理等敏感信息</div>
        </div>
      `;
    }

    if(filtered.length===0){
      const grid=section.querySelector('.links-grid');
      if(grid) grid.innerHTML='<div class="empty-state">没有匹配的网站</div>';
    }

    container.appendChild(section);
  });

  // Check auth again after render
  const auth=window._siteAuth;
  if(auth&&auth.isLoggedIn()) unlockCategories();
}

function filterLinks(){
  const text=document.getElementById('searchInput').value;
  const cat=document.getElementById('categoryFilter').value;
  renderCategories(text, cat);
}

// ========== Private Bookmarks ==========
function getPrivateBookmarks(){
  try{
    return JSON.parse(localStorage.getItem('nav_private_bookmarks')||'[]');
  }catch(e){return [];}
}

function savePrivateBookmarks(data){
  localStorage.setItem('nav_private_bookmarks',JSON.stringify(data));
}

function renderPrivateBookmarks(){
  const grid=document.getElementById('privateGrid');
  const bookmarks=getPrivateBookmarks();
  const editing=document.getElementById('privateSection').classList.contains('private-editing');

  if(bookmarks.length===0){
    grid.innerHTML='<div class="empty-state">暂无私有书签，点击「➕ 添加」开始收藏</div>';
    return;
  }

  grid.innerHTML=bookmarks.map((b,i)=>`
    <a href="${b.url}" class="link-card" target="_blank" rel="noopener noreferrer" title="${b.name} — ${b.tag||''}">
      <span class="favicon"><img src="https://www.google.com/s2/favicons?domain=${new URL(b.url).hostname}&sz=32" onerror="this.outerHTML='<i class=\\'fas fa-link\\'></i>'" alt=""></span>
      <span class="name">${b.name}</span>
      ${editing?`<button class="delete-btn" onclick="event.preventDefault();event.stopPropagation();deletePrivateBookmark(${i})">✕</button>`:''}
    </a>
  `).join('');
}

function togglePrivateEdit(){
  const s=document.getElementById('privateSection');
  const btn=document.getElementById('privateEditBtn');
  s.classList.toggle('private-editing');
  const editing=s.classList.contains('private-editing');
  btn.textContent=editing?'✅ 完成':'✏️ 编辑';
  renderPrivateBookmarks();
}

function showAddForm(){
  document.getElementById('addForm').classList.add('visible');
}

function hideAddForm(){
  document.getElementById('addForm').classList.remove('visible');
  document.getElementById('newName').value='';
  document.getElementById('newUrl').value='';
  document.getElementById('newTag').value='';
}

function addPrivateBookmark(){
  const name=document.getElementById('newName').value.trim();
  const url=document.getElementById('newUrl').value.trim();
  const tag=document.getElementById('newTag').value.trim();
  if(!name||!url){showToast('请填写名称和网址','error');return;}
  try{new URL(url);}catch(e){showToast('请输入有效网址','error');return;}

  const bookmarks=getPrivateBookmarks();
  bookmarks.push({name,url,tag:tag||'未分类'});
  savePrivateBookmarks(bookmarks);
  hideAddForm();
  renderPrivateBookmarks();
  showToast('已添加「'+name+'」');
}

function deletePrivateBookmark(index){
  const bookmarks=getPrivateBookmarks();
  const name=bookmarks[index].name;
  bookmarks.splice(index,1);
  savePrivateBookmarks(bookmarks);
  renderPrivateBookmarks();
  showToast('已删除「'+name+'」');
}

// ========== Toast ==========
function showToast(msg,type=''){
  const d=document.createElement('div');
  d.className='toast'+(type?' '+type:'');
  d.textContent=msg;
  document.body.appendChild(d);
  setTimeout(()=>d.remove(),2000);
}

// ========== Init ==========
function init(){
  updateAuthBar();
  renderCategories();
  renderPrivateBookmarks();
  // Re-run on auth change
  window.addEventListener('storage',function(e){
    if(e.key==='anime_token'||e.key==='anime_user'){
      updateAuthBar();
      renderPrivateBookmarks();
    }
  });
}

// Wait for site-auth
var tries=0;
var timer=setInterval(function(){
  tries++;
  if(window._siteAuth){clearInterval(timer);init();}
  if(tries>50){clearInterval(timer);updateAuthBar();renderCategories();renderPrivateBookmarks();}
},100);

// Also handle pjax
document.addEventListener('pjax:complete',function(){
  setTimeout(function(){
    if(window._siteAuth){updateAuthBar();unlockCategories();renderPrivateBookmarks();}
  },200);
});
</script>
</body>
