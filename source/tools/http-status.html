<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="HTTP 状态码速查工具，支持搜索，涵盖所有常见状态码含义。">
<title>HTTP 状态码速查 - 在线工具</title>
<link rel="stylesheet" href="common.css">
<style>
.search-box { max-width: 400px; margin: 0 auto 24px; position: relative; }
.search-box input { width: 100%; padding: 10px 14px 10px 40px; border: 2px solid var(--border); border-radius: 10px; font-size: 15px; background: var(--card-bg); color: var(--text); outline: none; }
.search-box input:focus { border-color: var(--primary); }
.search-box .icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); }
.status-group { margin-bottom: 28px; }
.group-title { font-size: 1.1em; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.group-badge { padding: 2px 10px; border-radius: 12px; font-size: 13px; font-weight: 600; }
.status-card { display: flex; align-items: center; gap: 16px; padding: 12px 16px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 8px; transition: all 0.15s; }
.status-card:hover { border-color: var(--primary); }
.status-card.hidden { display: none; }
.status-code { font-family: 'SF Mono', monospace; font-size: 20px; font-weight: 700; min-width: 50px; }
.status-info h3 { font-size: 15px; margin-bottom: 2px; }
.status-info p { font-size: 13px; color: var(--text-secondary); line-height: 1.4; }
.s1xx .group-badge, .s1xx .status-code { background: #dbeafe; color: #1d4ed8; }
.s2xx .group-badge, .s2xx .status-code { background: #dcfce7; color: #166534; }
.s3xx .group-badge, .s3xx .status-code { background: #fef3c7; color: #92400e; }
.s4xx .group-badge, .s4xx .status-code { background: #fee2e2; color: #991b1b; }
.s5xx .group-badge, .s5xx .status-code { background: #fce7f3; color: #9d174d; }
[data-theme="dark"] .s1xx .group-badge, [data-theme="dark"] .s1xx .status-code { background: #1e3a5f; color: #93c5fd; }
[data-theme="dark"] .s2xx .group-badge, [data-theme="dark"] .s2xx .status-code { background: #14532d; color: #86efac; }
[data-theme="dark"] .s3xx .group-badge, [data-theme="dark"] .s3xx .status-code { background: #78350f; color: #fcd34d; }
[data-theme="dark"] .s4xx .group-badge, [data-theme="dark"] .s4xx .status-code { background: #7f1d1d; color: #fca5a5; }
[data-theme="dark"] .s5xx .group-badge, [data-theme="dark"] .s5xx .status-code { background: #831843; color: #f9a8d4; }
</style>
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
<div class="container">
  <div class="header">
    <a href="/tools/" class="back-link" onclick="history.back();return false;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> 返回工具箱</a>
    <h1>HTTP 状态码速查</h1>
  </div>
  <div class="tool-area">
    <div class="search-box">
      <span class="icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></span>
      <input type="text" id="search" placeholder="搜索状态码或描述..." oninput="filter()">
    </div>
    <div id="statusList"></div>
  </div>
</div>

<script>
function toggleTheme(){const h=document.documentElement;const d=h.getAttribute('data-theme')==='dark';h.setAttribute('data-theme',d?'':'dark');localStorage.setItem('tool-theme',d?'light':'dark');const b=document.querySelector('.theme-toggle');b.innerHTML=d?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>':'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>'}
(function(){const s=localStorage.getItem('tool-theme');if(s==='dark'){document.documentElement.setAttribute('data-theme','dark');document.querySelector('.theme-toggle').innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>'}})()

const statuses = [
  [100,'Continue','客户端应继续发送请求'],
  [101,'Switching Protocols','服务器同意切换协议'],
  [103,'Early Hints','预加载资源提示'],
  [200,'OK','请求成功'],
  [201,'Created','资源创建成功'],
  [204,'No Content','成功但无返回内容'],
  [301,'Moved Permanently','资源永久重定向'],
  [302,'Found','资源临时重定向'],
  [304,'Not Modified','资源未修改，使用缓存'],
  [307,'Temporary Redirect','临时重定向（保持方法）'],
  [308,'Permanent Redirect','永久重定向（保持方法）'],
  [400,'Bad Request','请求参数有误'],
  [401,'Unauthorized','未认证，需要登录'],
  [403,'Forbidden','已认证但无权限访问'],
  [404,'Not Found','资源不存在'],
  [405,'Method Not Allowed','请求方法不被允许'],
  [408,'Request Timeout','请求超时'],
  [409,'Conflict','请求与服务器状态冲突'],
  [410,'Gone','资源已永久删除'],
  [413,'Payload Too Large','请求体过大'],
  [415,'Unsupported Media Type','不支持的媒体类型'],
  [418,"I'm a Teapot","我是茶壶（彩蛋）"],
  [422,'Unprocessable Entity','语义错误，无法处理'],
  [429,'Too Many Requests','请求过于频繁，被限流'],
  [500,'Internal Server Error','服务器内部错误'],
  [502,'Bad Gateway','网关或代理收到无效响应'],
  [503,'Service Unavailable','服务暂时不可用（过载/维护）'],
  [504,'Gateway Timeout','网关或代理超时'],
];

const groups = [
  { range: '1xx', label: '信息响应', cls: 's1xx' },
  { range: '2xx', label: '成功', cls: 's2xx' },
  { range: '3xx', label: '重定向', cls: 's3xx' },
  { range: '4xx', label: '客户端错误', cls: 's4xx' },
  { range: '5xx', label: '服务器错误', cls: 's5xx' },
];

function render() {
  const el = document.getElementById('statusList');
  el.innerHTML = groups.map(g => {
    const items = statuses.filter(s => String(s[0]).startsWith(g.range[0]));
    const cards = items.map(s =>
      `<div class="status-card" data-search="${s[0]} ${s[1]} ${s[2]}"><span class="status-code">${s[0]}</span><div class="status-info"><h3>${s[1]}</h3><p>${s[2]}</p></div></div>`
    ).join('');
    return `<div class="status-group ${g.cls}"><div class="group-title"><span class="group-badge">${g.range}</span> ${g.label}</div>${cards}</div>`;
  }).join('');
}

function filter() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  document.querySelectorAll('.status-card').forEach(card => {
    card.classList.toggle('hidden', q && !card.dataset.search.toLowerCase().includes(q));
  });
  document.querySelectorAll('.status-group').forEach(g => {
    g.style.display = g.querySelectorAll('.status-card:not(.hidden)').length ? '' : 'none';
  });
}

render();
</script>
<script src="track.js"></script>
</body>
</html>
