<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XML 转 JSON - 在线工具</title>
<link rel="stylesheet" href="common.css">
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
<div class="container">
  <div class="header"><a href="/tools/" class="back-link"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> 返回工具箱</a><h1>XML 转 JSON</h1></div>
  <div class="tool-area">
    <div class="section"><label>输入 XML</label><textarea id="input" rows="6" placeholder='<?xml version="1.0"?><root><name>John</name></root>'></textarea></div>
    <button class="btn btn-primary" style="margin-top:12px" onclick="convert()">转换</button>
    <div style="margin-top:12px"><label>结果</label><textarea id="output" rows="10" readonly style="cursor:pointer" onclick="copyText(this.value)" title="点击复制"></textarea></div>
  </div>
</div>
<script>
function toggleTheme(){const h=document.documentElement,d=h.getAttribute('data-theme')==='dark';h.setAttribute('data-theme',d?'':'dark');localStorage.setItem('tool-theme',d?'light':'dark')}
;(function(){const s=localStorage.getItem('tool-theme');if(s==='dark')document.documentElement.setAttribute('data-theme','dark')})();
function showToast(m){const d=document.createElement('div');d.className='toast';d.textContent=m;document.body.appendChild(d);setTimeout(()=>d.remove(),2000)}
function copyText(t){navigator.clipboard.writeText(String(t));showToast('已复制')}
function xmlToJson(xml){
  const obj={};
  if(xml.nodeType===1){
    if(xml.attributes.length>0){obj['@attributes']={};for(let i=0;i<xml.attributes.length;i++){const a=xml.attributes[i];obj['@attributes'][a.nodeName]=a.nodeValue}}
  }else if(xml.nodeType===3){obj=xml.nodeValue}
  const children=xml.childNodes;
  if(children.length===0)obj=xml.nodeType===1?'':obj;
  for(let i=0;i<children.length;i++){
    const child=children[i];const name=child.nodeName;let childJson;
    if(child.nodeType===1)childJson=xmlToJson(child);else childJson=xmlToJson(child);
    if(obj[name]===undefined)obj[name]=childJson;
    else if(Array.isArray(obj[name]))obj[name].push(childJson);
    else obj[name]=[obj[name],childJson];
  }
  return obj;
}
function convert(){
  try{
    const parser=new DOMParser();
    const doc=parser.parseFromString(document.getElementById('input').value,'text/xml');
    const xmlEl=doc.documentElement;
    if(xmlEl.tagName==='parsererror'){document.getElementById('output').value='XML 解析错误';return}
    const json=xmlToJson(xmlEl);
    document.getElementById('output').value=JSON.stringify(json,null,2);
  }catch(e){document.getElementById('output').value='解析失败: '+e.message}
}
</script>
</body>
</html>
