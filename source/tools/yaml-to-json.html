<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="YAML 格式转换为 JSON 工具，支持嵌套结构和数组。">
<title>YAML 转 JSON - 在线工具</title>
<link rel="stylesheet" href="common.css">
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
<div class="container">
  <div class="header"><a href="/tools/" class="back-link" onclick="history.back();return false;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> 返回工具箱</a><h1>YAML 转 JSON</h1></div>
  <div class="tool-area">
    <div class="section"><label>输入 YAML</label><textarea id="input" rows="6" placeholder="name: John&#10;age: 30&#10;city: New York"></textarea></div>
    <button class="btn btn-primary" style="margin-top:12px" onclick="convert()">转换</button>
    <div style="margin-top:12px"><label>结果</label><textarea id="output" rows="10" readonly style="cursor:pointer" onclick="copyText(this.value)" title="点击复制"></textarea></div>
  </div>
</div>
<script>
function toggleTheme(){const h=document.documentElement,d=h.getAttribute('data-theme')==='dark';h.setAttribute('data-theme',d?'':'dark');localStorage.setItem('tool-theme',d?'light':'dark')}
;(function(){const s=localStorage.getItem('tool-theme');if(s==='dark')document.documentElement.setAttribute('data-theme','dark')})();
function showToast(m){const d=document.createElement('div');d.className='toast';d.textContent=m;document.body.appendChild(d);setTimeout(()=>d.remove(),2000)}
function copyText(t){navigator.clipboard.writeText(String(t));showToast('已复制')}
function parseYaml(str){
  const result={};let currentKey=null;let isArray=false;
  str.split('\n').forEach(line=>{
    const trimmed=line.trim();
    if(!trimmed||trimmed.startsWith('#'))return;
    if(trimmed.startsWith('- ')){
      if(currentKey&&!result[currentKey])result[currentKey]=[];
      if(currentKey){
        const val=trimmed.slice(2).trim();
        result[currentKey].push(parseYamlValue(val));
      }
      return;
    }
    const m=trimmed.match(/^(\w[\w\s-]*?)\s*:\s*(.*)/);
    if(m){currentKey=m[1].trim();const val=m[2].trim();if(val)result[currentKey]=parseYamlValue(val);else result[currentKey]={}}
  });
  return result;
}
function parseYamlValue(v){
  if(v===''||v==='~'||v==='null')return null;
  if(v==='true')return true;if(v==='false')return false;
  if(!isNaN(v)&&v!=='')return Number(v);
  if((v.startsWith('"')&&v.endsWith('"'))||(v.startsWith("'")&&v.endsWith("'")))return v.slice(1,-1);
  return v;
}
function convert(){
  try{
    const yamlStr=document.getElementById('input').value;
    const json=parseYaml(yamlStr);
    document.getElementById('output').value=JSON.stringify(json,null,2);
  }catch(e){document.getElementById('output').value='解析失败: '+e.message}
}
</script>
</body>
</html>
