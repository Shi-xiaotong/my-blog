<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Unicode 与中文互转工具，支持中文编码与解码。">
<title>Unicode 编解码 - 在线工具</title>
<link rel="stylesheet" href="common.css">
<style>
.panels { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
@media (max-width: 768px) { .panels { grid-template-columns: 1fr; } }
.panels textarea { min-height: 250px; font-family: 'SF Mono', monospace; font-size: 13px; line-height: 1.6; }
.btn-row { display: flex; gap: 12px; justify-content: center; margin-bottom: 16px; flex-wrap: wrap; }
.options { display: flex; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; }
.options label { display: flex; align-items: center; gap: 4px; cursor: pointer; }
</style>
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
<div class="container">
  <div class="header">
    <a href="/tools/" class="back-link" onclick="history.back();return false;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> 返回工具箱</a>
    <h1>Unicode 编解码</h1>
  </div>
  <div class="tool-area">
    <div class="options">
      <label>格式:</label>
      <label><input type="radio" name="fmt" value="u" checked onchange="encodeUnicode()"> \uXXXX</label>
      <label><input type="radio" name="fmt" value="hex" onchange="encodeUnicode()"> &#xXXXX;</label>
      <label><input type="radio" name="fmt" value="dec" onchange="encodeUnicode()"> &#DDDD;</label>
    </div>
    <div class="panels">
      <div>
        <label>原文</label>
        <textarea id="plainInput" placeholder="输入中文或任意文本..." oninput="encodeUnicode()">你好世界</textarea>
      </div>
      <div>
        <label>Unicode 编码</label>
        <textarea id="unicodeInput" placeholder="你好世界" oninput="decodeUnicode()"></textarea>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="encodeUnicode()">编码 →</button>
      <button class="btn btn-primary" onclick="decodeUnicode()">← 解码</button>
      <button class="btn btn-outline" onclick="copyText(document.getElementById('unicodeInput').value)">复制编码</button>
    </div>
  </div>
</div>

<script>
function toggleTheme(){const h=document.documentElement;const d=h.getAttribute('data-theme')==='dark';h.setAttribute('data-theme',d?'':'dark');localStorage.setItem('tool-theme',d?'light':'dark');const b=document.querySelector('.theme-toggle');b.innerHTML=d?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>':'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>'}
(function(){const s=localStorage.getItem('tool-theme');if(s==='dark'){document.documentElement.setAttribute('data-theme','dark');document.querySelector('.theme-toggle').innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>'}})()
function showToast(msg){const d=document.createElement('div');d.className='toast';d.textContent=msg;document.body.appendChild(d);setTimeout(()=>d.remove(),2000)}
function copyText(t){if(t)navigator.clipboard.writeText(t);showToast('已复制')}

function getFormat() { return document.querySelector('input[name="fmt"]:checked').value; }

function encodeUnicode() {
  const text = document.getElementById('plainInput').value;
  if (!text) { document.getElementById('unicodeInput').value = ''; return; }
  const fmt = getFormat();
  let result = '';
  for (const ch of text) {
    const code = ch.codePointAt(0);
    if (code > 127) {
      if (fmt === 'u') result += '\\u' + code.toString(16).padStart(4, '0');
      else if (fmt === 'hex') result += '&#x' + code.toString(16) + ';';
      else result += '&#' + code + ';';
    } else {
      result += ch;
    }
  }
  document.getElementById('unicodeInput').value = result;
}

function decodeUnicode() {
  const text = document.getElementById('unicodeInput').value;
  if (!text) { document.getElementById('plainInput').value = ''; return; }
  try {
    const decoded = text
      .replace(/\\u([0-9a-fA-F]{4,6})/g, (_, hex) => String.fromCodePoint(parseInt(hex, 16)))
      .replace(/&#x([0-9a-fA-F]+);/g, (_, hex) => String.fromCodePoint(parseInt(hex, 16)))
      .replace(/&#(\d+);/g, (_, dec) => String.fromCodePoint(parseInt(dec)));
    document.getElementById('plainInput').value = decoded;
  } catch(e) {}
}

encodeUnicode();
</script>
<script src="track.js"></script>
</body>
</html>
