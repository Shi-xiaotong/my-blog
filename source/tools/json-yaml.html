<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="JSON 与 YAML 格式互相转换工具，支持嵌套结构和数组。">
<title>JSON YAML 互转 - 在线工具</title>
<link rel="stylesheet" href="common.css">
<style>
.panels { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
@media (max-width: 768px) { .panels { grid-template-columns: 1fr; } }
.panels textarea { min-height: 300px; font-family: 'SF Mono', monospace; font-size: 13px; line-height: 1.6; }
.btn-row { display: flex; gap: 12px; justify-content: center; margin-bottom: 16px; flex-wrap: wrap; }
.error { color: #ef4444; font-size: 13px; margin-top: 8px; }
</style>
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
<div class="container">
  <div class="header">
    <a href="/tools/" class="back-link" onclick="history.back();return false;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> 返回工具箱</a>
    <h1>JSON YAML 互转</h1>
  </div>
  <div class="tool-area">
    <div class="panels">
      <div>
        <label>JSON</label>
        <textarea id="jsonInput" placeholder='{"name": "test", "items": [1, 2, 3]}'></textarea>
      </div>
      <div>
        <label>YAML</label>
        <textarea id="yamlInput" placeholder="name: test&#10;items:&#10;  - 1&#10;  - 2&#10;  - 3"></textarea>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="jsonToYaml()">JSON → YAML</button>
      <button class="btn btn-primary" onclick="yamlToJson()">YAML → JSON</button>
      <button class="btn btn-outline" onclick="copyText(document.getElementById('jsonInput').value)">复制 JSON</button>
      <button class="btn btn-outline" onclick="copyText(document.getElementById('yamlInput').value)">复制 YAML</button>
    </div>
    <div id="error" class="error"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
<script>
function toggleTheme(){const h=document.documentElement;const d=h.getAttribute('data-theme')==='dark';h.setAttribute('data-theme',d?'':'dark');localStorage.setItem('tool-theme',d?'light':'dark');const b=document.querySelector('.theme-toggle');b.innerHTML=d?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>':'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>'}
(function(){const s=localStorage.getItem('tool-theme');if(s==='dark'){document.documentElement.setAttribute('data-theme','dark');document.querySelector('.theme-toggle').innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>'}})()
function showToast(msg){const d=document.createElement('div');d.className='toast';d.textContent=msg;document.body.appendChild(d);setTimeout(()=>d.remove(),2000)}
function copyText(t){if(t)navigator.clipboard.writeText(t);showToast('已复制')}

function jsonToYaml() {
  const err = document.getElementById('error');
  err.textContent = '';
  try {
    const obj = JSON.parse(document.getElementById('jsonInput').value);
    document.getElementById('yamlInput').value = jsyaml.dump(obj, { indent: 2, lineWidth: -1 });
  } catch(e) { err.textContent = 'JSON 解析错误: ' + e.message; }
}

function yamlToJson() {
  const err = document.getElementById('error');
  err.textContent = '';
  try {
    const obj = jsyaml.load(document.getElementById('yamlInput').value);
    document.getElementById('jsonInput').value = JSON.stringify(obj, null, 2);
  } catch(e) { err.textContent = 'YAML 解析错误: ' + e.message; }
}
</script>
<script src="track.js"></script>
</body>
</html>
