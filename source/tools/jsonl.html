<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="JSON Lines 转换器，JSONL 与 JSON 数组互相转换。">
<title>JSONL 转换器 - 在线工具</title>
<link rel="stylesheet" href="common.css">
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
<div class="container">
  <div class="header"><a href="/tools/" class="back-link"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> 返回工具箱</a><h1>JSONL 转换器</h1></div>
  <div class="tool-area">
    <div class="section"><label>输入（每行一个 JSON 对象）</label><textarea id="input" rows="6" placeholder='{"name":"Alice","age":25}\n{"name":"Bob","age":30}'></textarea></div>
    <div class="row" style="margin-top:12px"><button class="btn btn-primary" onclick="toJSON()">转为 JSON 数组</button><button class="btn btn-outline" onclick="toJSONL()">转为 JSONL</button></div>
    <div style="margin-top:12px"><label>结果</label><textarea id="output" rows="6" readonly style="cursor:pointer" onclick="copyText(this.value)" title="点击复制"></textarea></div>
  </div>
</div>
<script>
function toggleTheme(){const h=document.documentElement,d=h.getAttribute('data-theme')==='dark';h.setAttribute('data-theme',d?'':'dark');localStorage.setItem('tool-theme',d?'light':'dark')}
;(function(){const s=localStorage.getItem('tool-theme');if(s==='dark')document.documentElement.setAttribute('data-theme','dark')})();
function showToast(m){const d=document.createElement('div');d.className='toast';d.textContent=m;document.body.appendChild(d);setTimeout(()=>d.remove(),2000)}
function copyText(t){navigator.clipboard.writeText(String(t));showToast('已复制')}
function toJSON(){
  const lines=document.getElementById('input').value.trim().split('\n').filter(l=>l.trim());
  try{document.getElementById('output').value=JSON.stringify(lines.map(l=>JSON.parse(l.trim())),null,2)}catch(e){document.getElementById('output').value='解析错误: '+e.message}
}
function toJSONL(){
  const input=document.getElementById('input').value.trim();
  try{const arr=JSON.parse(input);if(!Array.isArray(arr))throw new Error('需要 JSON 数组');document.getElementById('output').value=arr.map(o=>JSON.stringify(o)).join('\n')}catch(e){document.getElementById('output').value='解析错误: '+e.message}
}
</script>
</body>
</html>
