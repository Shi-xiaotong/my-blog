<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="JSON 字符串转义与反转义工具，处理 JSON 中的特殊字符。">
<title>JSON 字符串转义 - 在线工具</title>
<link rel="stylesheet" href="common.css">
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
<div class="container">
  <div class="header"><a href="/tools/" class="back-link"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> 返回工具箱</a><h1>JSON 字符串转义</h1></div>
  <div class="tool-area">
    <div class="section"><label>输入文本</label><textarea id="input" rows="4" placeholder="输入普通文本"></textarea></div>
    <div class="row" style="margin-top:12px"><button class="btn btn-primary" onclick="escapeStr()">转义</button><button class="btn btn-outline" onclick="unescapeStr()">反转义</button></div>
    <div style="margin-top:12px"><label>结果</label><div class="result-box" id="output" style="word-break:break-all;min-height:40px;font-family:'SF Mono',monospace;font-size:14px;cursor:pointer" onclick="copyText(this.textContent)" title="点击复制"></div></div>
  </div>
</div>
<script>
function toggleTheme(){const h=document.documentElement,d=h.getAttribute('data-theme')==='dark';h.setAttribute('data-theme',d?'':'dark');localStorage.setItem('tool-theme',d?'light':'dark')}
;(function(){const s=localStorage.getItem('tool-theme');if(s==='dark')document.documentElement.setAttribute('data-theme','dark')})();
function showToast(m){const d=document.createElement('div');d.className='toast';d.textContent=m;document.body.appendChild(d);setTimeout(()=>d.remove(),2000)}
function copyText(t){navigator.clipboard.writeText(String(t));showToast('已复制')}
function escapeStr(){const v=document.getElementById('input').value;document.getElementById('output').textContent=JSON.stringify(v)}
function unescapeStr(){const v=document.getElementById('input').value.trim();try{document.getElementById('output').textContent=JSON.parse(v)}catch(e){document.getElementById('output').textContent='反转义失败: 无效的 JSON 字符串'}}
</script>
</body>
</html>
