<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 简历优化 - 在线工具</title>
<link rel="stylesheet" href="common.css">
<style>
.form-row { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
.form-row label { display: flex; flex-direction: column; gap: 4px; font-size: 13px; flex: 1; min-width: 140px; }
.form-row input, .form-row select { padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; background: var(--card-bg); color: var(--text); font-size: 14px; }
.input-area textarea { min-height: 180px; resize: vertical; font-size: 14px; line-height: 1.6; font-family: inherit; }
.action-btns { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.action-btns .btn { flex: 1; min-width: 120px; }
.output-area { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 20px; min-height: 200px; font-size: 14px; line-height: 1.8; position: relative; }
.output-area .placeholder { color: var(--text-secondary); }
.score-badge { display: inline-flex; align-items: center; gap: 8px; padding: 8px 20px; border-radius: 20px; font-size: 28px; font-weight: 700; margin: 12px 0; }
.score-high { background: #dcfce7; color: #16a34a; }
.score-mid { background: #fef9c3; color: #ca8a04; }
.score-low { background: #fee2e2; color: #dc2626; }
[data-theme="dark"] .score-high { background: #052e16; color: #4ade80; }
[data-theme="dark"] .score-mid { background: #422006; color: #facc15; }
[data-theme="dark"] .score-low { background: #450a0a; color: #f87171; }
.section-block { margin: 16px 0; padding: 14px; border: 1px solid var(--border); border-radius: 8px; background: var(--card-bg); }
.section-block h3 { margin: 0 0 10px; font-size: 15px; color: var(--primary); }
.tabs { display: flex; gap: 4px; margin-bottom: 16px; border-bottom: 2px solid var(--border); }
.tab { padding: 10px 20px; background: none; border: none; color: var(--text-secondary); cursor: pointer; font-size: 14px; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.15s; }
.tab.active { color: var(--primary); border-bottom-color: var(--primary); }
.tab:hover { color: var(--primary); }
</style>
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
<div class="container">
  <div class="header">
    <a href="/tools/" class="back-link"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> 返回工具箱</a>
    <h1>AI 简历优化</h1>
  </div>
  <div class="tool-area">
    <div class="input-area">
      <label>粘贴简历内容</label>
      <textarea id="resume" placeholder="将你的简历内容粘贴到这里...&#10;&#10;包括：个人信息、教育背景、工作经历、技能、项目经验等"></textarea>
    </div>

    <div class="form-row">
      <label>
        目标岗位
        <input type="text" id="position" placeholder="例如：前端工程师、产品经理">
      </label>
      <label>
        工作年限
        <select id="experience">
          <option value="">不限</option>
          <option value="应届生">应届生</option>
          <option value="1-3年">1-3年</option>
          <option value="3-5年">3-5年</option>
          <option value="5-10年">5-10年</option>
          <option value="10年以上">10年以上</option>
        </select>
      </label>
      <label>
        期望薪资
        <input type="text" id="salary" placeholder="例如：15-20K">
      </label>
    </div>

    <div class="action-btns">
      <button class="btn btn-primary" id="btnAnalyze" onclick="doAction('analyze')">📊 简历诊断</button>
      <button class="btn btn-outline" id="btnSelf" onclick="doAction('self')">✍️ 生成自我评价</button>
      <button class="btn btn-outline" id="btnInterview" onclick="doAction('interview')">🎤 模拟面试题</button>
    </div>

    <label>分析结果</label>
    <div class="output-area" id="output">
      <span class="placeholder">粘贴简历内容，选择功能后点击按钮</span>
    </div>
  </div>
</div>

<script>
function toggleTheme(){const h=document.documentElement;const d=h.getAttribute('data-theme')==='dark';h.setAttribute('data-theme',d?'':'dark');localStorage.setItem('theme',d?'light':'dark');const b=document.querySelector('.theme-toggle');b.innerHTML=d?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>':'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>'}
(function(){const s=localStorage.getItem('theme');if(s==='dark'){document.documentElement.setAttribute('data-theme','dark');document.querySelector('.theme-toggle').innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>'}})()
function showToast(msg){const d=document.createElement('div');d.className='toast';d.textContent=msg;document.body.appendChild(d);setTimeout(()=>d.remove(),2000)}

const AI_ENDPOINT = 'https://ai.233002.xyz';

const SYSTEM_PROMPTS = {
  analyze: `你是一位资深HR和职业规划师。请对用户的简历进行全面诊断分析。
请严格按以下JSON格式返回，不要有其他内容：
{
  "score": 75,
  "strengths": ["优势1", "优势2"],
  "weaknesses": ["不足1", "不足2"],
  "suggestions": ["建议1", "建议2", "建议3"],
  "optimized": "优化后的简历核心内容（用markdown格式，突出亮点）"
}
评分标准：内容完整性、量化成果、关键词匹配、格式规范、亮点突出。
目标岗位：{position}，工作年限：{experience}，期望薪资：{salary}`,

  self: `你是一位简历写作专家。请根据用户提供的简历信息，生成一段专业的自我评价。
要求：
- 150-200字
- 突出核心竞争力和职业亮点
- 语言精炼、专业
- 与目标岗位高度匹配
目标岗位：{position}
直接输出自我评价内容即可，用markdown格式。`,

  interview: `你是一位资深面试官。根据用户的简历和目标岗位，生成10道高概率面试题。
包括：
- 3道自我介绍/行为面试题
- 4道专业技能题
- 2道项目经验深挖题
- 1道情景/压力面试题
每道题附带简短的答题思路提示。
目标岗位：{position}，工作年限：{experience}
用markdown格式输出。`
};

function getSystemPrompt(action) {
  let prompt = SYSTEM_PROMPTS[action];
  prompt = prompt.replace('{position}', document.getElementById('position').value || '未指定');
  prompt = prompt.replace('{experience}', document.getElementById('experience').value || '未指定');
  prompt = prompt.replace('{salary}', document.getElementById('salary').value || '未指定');
  return prompt;
}

async function doAction(action) {
  const resume = document.getElementById('resume').value.trim();
  if (!resume) { showToast('请先粘贴简历内容'); return; }

  const btn = document.getElementById(action === 'analyze' ? 'btnAnalyze' : action === 'self' ? 'btnSelf' : 'btnInterview');
  const output = document.getElementById('output');
  const origText = btn.textContent;

  // Disable all buttons
  document.querySelectorAll('.action-btns .btn').forEach(b => b.disabled = true);
  btn.textContent = '分析中...';
  output.innerHTML = '<span class="placeholder">AI 正在分析，请稍候...</span>';

  try {
    const res = await fetch(AI_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: [
          { role: 'system', content: getSystemPrompt(action) },
          { role: 'user', content: resume }
        ],
        temperature: 0.7,
        max_tokens: 2500
      })
    });

    if (!res.ok) throw new Error('API error: ' + res.status);
    const data = await res.json();
    const content = data?.choices?.[0]?.message?.content || '';

    if (action === 'analyze') {
      output.innerHTML = renderAnalysis(content);
    } else {
      output.innerHTML = `<div style="font-size:14px;line-height:1.8">${renderMarkdown(content)}</div>`;
    }
  } catch (e) {
    output.innerHTML = `<span style="color:#ef4444">分析失败: ${e.message}</span>`;
  }

  document.querySelectorAll('.action-btns .btn').forEach(b => b.disabled = false);
  btn.textContent = origText;
}

function renderAnalysis(content) {
  try {
    const jsonMatch = content.match(/\{[\s\S]*\}/);
    if (!jsonMatch) return `<div style="font-size:14px;line-height:1.8">${renderMarkdown(content)}</div>`;

    const data = JSON.parse(jsonMatch[0]);
    const score = data.score || 0;
    const scoreClass = score >= 80 ? 'score-high' : score >= 60 ? 'score-mid' : 'score-low';

    let html = `<div style="text-align:center"><span class="score-badge ${scoreClass}">${score} 分</span></div>`;

    if (data.strengths?.length) {
      html += `<div class="section-block"><h3>✅ 优势亮点</h3>`;
      html += data.strengths.map(s => `<div style="margin:4px 0">• ${s}</div>`).join('');
      html += `</div>`;
    }

    if (data.weaknesses?.length) {
      html += `<div class="section-block"><h3>⚠️ 待改进</h3>`;
      html += data.weaknesses.map(s => `<div style="margin:4px 0">• ${s}</div>`).join('');
      html += `</div>`;
    }

    if (data.suggestions?.length) {
      html += `<div class="section-block"><h3>💡 优化建议</h3>`;
      html += data.suggestions.map((s, i) => `<div style="margin:4px 0">${i + 1}. ${s}</div>`).join('');
      html += `</div>`;
    }

    if (data.optimized) {
      html += `<div class="section-block"><h3>📝 优化版本</h3>`;
      html += `<div style="font-size:14px;line-height:1.8">${renderMarkdown(data.optimized)}</div>`;
      html += `</div>`;
    }

    return html;
  } catch (e) {
    return `<div style="font-size:14px;line-height:1.8">${renderMarkdown(content)}</div>`;
  }
}

function renderMarkdown(md) {
  return md
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/^### (.*$)/gm, '<h3 style="margin:16px 0 8px;font-size:1.1em">$1</h3>')
    .replace(/^## (.*$)/gm, '<h2 style="margin:20px 0 10px;font-size:1.2em;border-bottom:1px solid var(--border);padding-bottom:6px">$1</h2>')
    .replace(/^# (.*$)/gm, '<h1 style="margin:24px 0 12px;font-size:1.4em">$1</h1>')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/`([^`]+)`/g, '<code style="background:var(--bg);padding:2px 6px;border-radius:4px;font-size:13px">$1</code>')
    .replace(/^- (.*$)/gm, '<li style="margin:4px 0;padding-left:8px">• $1</li>')
    .replace(/^\d+\. (.*$)/gm, '<li style="margin:4px 0;padding-left:8px">$1</li>')
    .replace(/\n\n/g, '<br><br>')
    .replace(/\n/g, '<br>');
}
</script>
<script src="track.js"></script>
</body>
</html>
