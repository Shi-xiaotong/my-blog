<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="JSON 格式转换为 XML 工具，支持嵌套对象和数组。">
<title>JSON 转 XML - 在线工具</title>
<link rel="stylesheet" href="common.css">
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
<div class="container">
  <div class="header"><a href="/tools/" class="back-link"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> 返回工具箱</a><h1>JSON 转 XML</h1></div>
  <div class="tool-area">
    <div class="section"><label>输入 JSON</label><textarea id="input" rows="6" placeholder='{"name":"John","age":30,"city":"New York"}'></textarea></div>
    <button class="btn btn-primary" style="margin-top:12px" onclick="convert()">转换</button>
    <div style="margin-top:12px"><label>结果</label><textarea id="output" rows="10" readonly style="cursor:pointer" onclick="copyText(this.value)" title="点击复制"></textarea></div>
  </div>
</div>
<script>
function toggleTheme(){const h=document.documentElement,d=h.getAttribute('data-theme')==='dark';h.setAttribute('data-theme',d?'':'dark');localStorage.setItem('tool-theme',d?'light':'dark')}
;(function(){const s=localStorage.getItem('tool-theme');if(s==='dark')document.documentElement.setAttribute('data-theme','dark')})();
function showToast(m){const d=document.createElement('div');d.className='toast';d.textContent=m;document.body.appendChild(d);setTimeout(()=>d.remove(),2000)}
function copyText(t){navigator.clipboard.writeText(String(t));showToast('已复制')}
function jsonToXml(obj,rootName='root'){
  let xml=`<?xml version="1.0" encoding="UTF-8"?>\n<${rootName}>`;
  function build(node,parentName){
    if(node===null||node===undefined)xml+=`<${parentName}></${parentName}>`;
    else if(typeof node==='object'){
      if(Array.isArray(node)){
        node.forEach((item,i)=>build(item,parentName));
      }else{
        for(const[key,val]of Object.entries(node)){
          if(Array.isArray(val)){val.forEach(v=>build(v,key));continue}
          build(val,key)
        }
      }
    }else xml+=`<${parentName}>${String(node).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}</${parentName}>`;
  }
  for(const[key,val]of Object.entries(obj))build(val,key);
  xml+=`</${rootName}>`;return xml;
}
function convert(){
  try{document.getElementById('output').value=jsonToXml(JSON.parse(document.getElementById('input').value),'data')}catch(e){document.getElementById('output').value='JSON 解析失败: '+e.message}
}
</script>
</body>
</html>
