<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="URL Slug 生成器，支持中文文本转 URL 友好的 slug 格式。">
<title>URL Slug 生成器 - 在线工具</title>
<link rel="stylesheet" href="common.css">
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
<div class="container">
  <div class="header"><a href="/tools/" class="back-link" onclick="history.back();return false;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> 返回工具箱</a><h1>URL Slug 生成器</h1></div>
  <div class="tool-area">
    <div class="section"><label>输入文本</label><textarea id="input" rows="3" placeholder="你好，这是一个示例文本！" oninput="generate()"></textarea></div>
    <div style="margin-top:12px"><label>生成的 Slug</label><div class="result-box" id="output" style="font-family:'SF Mono',monospace;font-size:16px;cursor:pointer" onclick="copyText(this.textContent)" title="点击复制"></div></div>
  </div>
</div>
<script>
function toggleTheme(){const h=document.documentElement,d=h.getAttribute('data-theme')==='dark';h.setAttribute('data-theme',d?'':'dark');localStorage.setItem('tool-theme',d?'light':'dark')}
;(function(){const s=localStorage.getItem('tool-theme');if(s==='dark')document.documentElement.setAttribute('data-theme','dark')})();
function showToast(m){const d=document.createElement('div');d.className='toast';d.textContent=m;document.body.appendChild(d);setTimeout(()=>d.remove(),2000)}
function copyText(t){navigator.clipboard.writeText(String(t));showToast('已复制')}
function generate(){
  const input=document.getElementById('input').value;
  if(!input){document.getElementById('output').textContent='';return}
  const slug=input
    .normalize('NFD').replace(/[̀-ͯ]/g,'')
    .replace(/[^\w\s-]/g,'')
    .replace(/[\s_]+/g,'-')
    .replace(/^-+|-+$/g,'')
    .toLowerCase();
  document.getElementById('output').textContent=slug||'无有效字符';
}
</script>
</body>
</html>
