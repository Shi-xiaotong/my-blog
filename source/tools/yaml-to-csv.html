<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="YAML 数据转换为 CSV 表格工具，自动提取键名为表头。">
<title>YAML 转 CSV - 在线工具</title>
<link rel="stylesheet" href="common.css">
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
<div class="container">
  <div class="header"><a href="/tools/" class="back-link" onclick="history.back();return false;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> 返回工具箱</a><h1>YAML 转 CSV</h1></div>
  <div class="tool-area">
    <div class="section"><label>输入 YAML 数组</label><textarea id="input" rows="6" placeholder="- name: John&#10;  age: 30&#10;- name: Jane&#10;  age: 25"></textarea></div>
    <button class="btn btn-primary" style="margin-top:12px" onclick="convert()">转换</button>
    <div style="margin-top:12px"><label>结果</label><textarea id="output" rows="10" readonly style="cursor:pointer" onclick="copyText(this.value)" title="点击复制"></textarea></div>
  </div>
</div>
<script>
function toggleTheme(){const h=document.documentElement,d=h.getAttribute('data-theme')==='dark';h.setAttribute('data-theme',d?'':'dark');localStorage.setItem('tool-theme',d?'light':'dark')}
;(function(){const s=localStorage.getItem('tool-theme');if(s==='dark')document.documentElement.setAttribute('data-theme','dark')})();
function showToast(m){const d=document.createElement('div');d.className='toast';d.textContent=m;document.body.appendChild(d);setTimeout(()=>d.remove(),2000)}
function copyText(t){navigator.clipboard.writeText(String(t));showToast('已复制')}
function parseSimpleYaml(str){
  const items=[];let current={};let keys=[];
  str.split('\n').forEach(line=>{
    if(!line.trim()){if(Object.keys(current).length>0){items.push(current);current={};keys=[]}return}
    const indent=line.search(/\S/);
    if(indent===0){
      if(line.trim().startsWith('- ')){
        if(Object.keys(current).length>0){items.push(current);current={};keys=[]}
        const kv=line.trim().slice(2).match(/^([^:]+?):\s*(.*)/);
        if(kv){const k=kv[1].trim();let v=kv[2].trim();if(v===''||v==='~'||v==='null')v=null;current[k]=v;keys.push(k)}
      }
    }else{
      const kv=line.trim().match(/^([^:]+?):\s*(.*)/);
      if(kv){const k=kv[1].trim();let v=kv[2].trim();if(v===''||v==='~'||v==='null')v=null;else if(v==='true')v=true;else if(v==='false')v=false;else if(!isNaN(v))v=Number(v);else v=v.replace(/^["']|["']$/g,'');current[k]=v;if(!keys.includes(k))keys.push(k)}
    }
  });
  if(Object.keys(current).length>0)items.push(current);
  return{items,keys};
}
function csvEscape(v){const s=String(v);return s.includes(',')||s.includes('"')||s.includes('\n')?'"'+s.replace(/"/g,'""')+'"':s}
function convert(){
  try{
    const{items,keys}=parseSimpleYaml(document.getElementById('input').value);
    if(items.length===0){document.getElementById('output').value='未能解析到数据';return}
    let out=[keys.join(',')];
    items.forEach(item=>out.push(keys.map(k=>csvEscape(item[k]??'')).join(',')));
    document.getElementById('output').value=out.join('\n');
  }catch(e){document.getElementById('output').value='解析失败: '+e.message}
}
</script>
</body>
</html>
