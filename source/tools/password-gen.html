<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>密码生成器 - 在线工具</title>
<link rel="stylesheet" href="common.css">
<style>
.slider-row { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.slider-row input[type="range"] { flex: 1; accent-color: var(--primary); }
.slider-val { font-size: 18px; font-weight: 700; min-width: 40px; text-align: center; }
.checkbox-group { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
.checkbox-group label { display: flex; align-items: center; gap: 6px; font-size: 14px; color: var(--text); cursor: pointer; }
.checkbox-group input[type="checkbox"] { accent-color: var(--primary); width: 16px; height: 16px; }
.strength-bar { height: 6px; border-radius: 3px; background: var(--border); margin: 12px 0; overflow: hidden; }
.strength-fill { height: 100%; border-radius: 3px; transition: width 0.3s, background 0.3s; }
.strength-text { font-size: 13px; margin-bottom: 16px; }
.pw-list { list-style: none; }
.pw-item { display: flex; align-items: center; justify-content: space-between; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; margin-bottom: 8px; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 14px; word-break: break-all; }
.pw-item .btn { padding: 4px 10px; font-size: 12px; flex-shrink: 0; margin-left: 8px; }
</style>
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
<div class="container">
  <div class="header">
    <a href="/tools/" class="back-link"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> 返回工具箱</a>
    <h1>密码生成器</h1>
  </div>
  <div class="tool-area">
    <label>密码长度: <span id="lenVal">16</span></label>
    <div class="slider-row">
      <span style="font-size:13px;color:var(--text-secondary)">8</span>
      <input type="range" id="length" min="8" max="128" value="16" oninput="document.getElementById('lenVal').textContent=this.value">
      <span style="font-size:13px;color:var(--text-secondary)">128</span>
    </div>

    <div class="checkbox-group">
      <label><input type="checkbox" id="upper" checked> 大写字母</label>
      <label><input type="checkbox" id="lower" checked> 小写字母</label>
      <label><input type="checkbox" id="digits" checked> 数字</label>
      <label><input type="checkbox" id="special" checked> 特殊字符</label>
    </div>

    <div class="row">
      <div>
        <label>生成数量</label>
        <select id="count">
          <option value="1">1 个</option>
          <option value="3">3 个</option>
          <option value="5" selected>5 个</option>
          <option value="10">10 个</option>
        </select>
      </div>
    </div>

    <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
    <div class="strength-text" id="strengthText"></div>

    <button class="btn btn-primary" onclick="generate()" style="margin-bottom:16px">生成密码</button>

    <ul class="pw-list" id="pwList"></ul>
  </div>
</div>

<script>
function toggleTheme(){const h=document.documentElement;const d=h.getAttribute('data-theme')==='dark';h.setAttribute('data-theme',d?'':'dark');localStorage.setItem('tool-theme',d?'light':'dark');const b=document.querySelector('.theme-toggle');b.innerHTML=d?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>':'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>'}
(function(){const s=localStorage.getItem('tool-theme');if(s==='dark'){document.documentElement.setAttribute('data-theme','dark');const b=document.querySelector('.theme-toggle');if(b)b.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>'}})()
function showToast(msg){const d=document.createElement('div');d.className='toast';d.textContent=msg;document.body.appendChild(d);setTimeout(()=>d.remove(),2000)}
function copyText(t){navigator.clipboard.writeText(t);showToast('已复制')}

function getStrength(len, hasUpper, hasLower, hasDigits, hasSpecial) {
  let pool = 0;
  if (hasUpper) pool += 26;
  if (hasLower) pool += 26;
  if (hasDigits) pool += 10;
  if (hasSpecial) pool += 32;
  const entropy = len * Math.log2(pool || 1);
  if (entropy < 28) return { level: '弱', color: '#ef4444', width: '25%', text: '密码强度: 弱' };
  if (entropy < 60) return { level: '中', color: '#f59e0b', width: '50%', text: '密码强度: 中等' };
  if (entropy < 120) return { level: '强', color: '#22c55e', width: '75%', text: '密码强度: 强' };
  return { level: '极强', color: '#3b82f6', width: '100%', text: '密码强度: 极强' };
}

function generate() {
  const len = parseInt(document.getElementById('length').value);
  const useUpper = document.getElementById('upper').checked;
  const useLower = document.getElementById('lower').checked;
  const useDigits = document.getElementById('digits').checked;
  const useSpecial = document.getElementById('special').checked;
  const count = parseInt(document.getElementById('count').value);

  let chars = '';
  if (useUpper) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  if (useLower) chars += 'abcdefghijklmnopqrstuvwxyz';
  if (useDigits) chars += '0123456789';
  if (useSpecial) chars += '!@#$%^&*()_+-=[]{}|;:,.<>?';

  if (!chars) { showToast('请至少选择一种字符类型'); return; }

  const strength = getStrength(len, useUpper, useLower, useDigits, useSpecial);
  document.getElementById('strengthFill').style.width = strength.width;
  document.getElementById('strengthFill').style.background = strength.color;
  document.getElementById('strengthText').textContent = strength.text;
  document.getElementById('strengthText').style.color = strength.color;

  const list = document.getElementById('pwList');
  list.innerHTML = '';
  for (let i = 0; i < count; i++) {
    let pw = '';
    const arr = new Uint32Array(len);
    crypto.getRandomValues(arr);
    for (let j = 0; j < len; j++) pw += chars[arr[j] % chars.length];
    const li = document.createElement('li');
    li.className = 'pw-item';
    li.innerHTML = `<span style="flex:1;overflow-wrap:break-word">${pw}</span><button class="btn btn-outline" onclick="copyText('${pw.replace(/'/g,"\\'")}')">复制</button>`;
    list.appendChild(li);
  }
}

// Generate on load
generate();
</script>
<script src="track.js"></script>
</body>
</html>
