<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="JSON 格式化工具，支持格式化、压缩、转义、校验，纯浏览器端运行。">
<title>JSON 格式化 - 在线工具</title>
<link rel="stylesheet" href="common.css">
<style>
.output { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 14px; min-height: 200px; white-space: pre-wrap; word-break: break-all; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; overflow: auto; max-height: 500px; }
.error { color: #ef4444; padding: 10px; font-size: 14px; }
.string { color: #16a34a; }
.number { color: #ea580c; }
.boolean { color: #9333ea; }
.null { color: #ef4444; }
.key { color: var(--primary); }
</style>
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
<div class="container">
  <div class="header">
    <a href="/tools/" class="back-link" onclick="history.back();return false;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> 返回工具箱</a>
    <h1>JSON 格式化</h1>
  </div>
  <div class="tool-area">
    <div class="row" style="margin-bottom:16px">
      <div>
        <label>缩进大小</label>
        <select id="indent">
          <option value="2">2 空格</option>
          <option value="4">4 空格</option>
          <option value="tab">Tab</option>
        </select>
      </div>
    </div>
    <label>输入 JSON</label>
    <textarea id="input" rows="8" placeholder='在此粘贴 JSON...' style="margin-bottom:12px"></textarea>
    <div class="row" style="margin-bottom:16px">
      <button class="btn btn-primary" onclick="doFormat()">格式化</button>
      <button class="btn btn-outline" onclick="doMinify()">压缩</button>
      <button class="btn btn-outline" onclick="doEscape()">转义</button>
      <button class="btn btn-outline" onclick="copyResult()">复制</button>
    </div>
    <div id="error" class="error"></div>
    <label>输出</label>
    <div id="output" class="output"></div>
  </div>
</div>

<script>
function toggleTheme(){const h=document.documentElement;const d=h.getAttribute('data-theme')==='dark';h.setAttribute('data-theme',d?'':'dark');localStorage.setItem('tool-theme',d?'light':'dark');const b=document.querySelector('.theme-toggle');b.innerHTML=d?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>':'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>'}
(function(){const s=localStorage.getItem('tool-theme');if(s==='dark'){document.documentElement.setAttribute('data-theme','dark');const b=document.querySelector('.theme-toggle');if(b)b.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>'}})()
function showToast(msg){const d=document.createElement('div');d.className='toast';d.textContent=msg;document.body.appendChild(d);setTimeout(()=>d.remove(),2000)}
function copyText(t){navigator.clipboard.writeText(t);showToast('已复制')}

let rawResult = '';

function syntaxHighlight(json) {
  return json.replace(/("(\\u[a-fA-F0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?|\bnull\b)/g, function(match) {
    let cls = 'number';
    if (/^"/.test(match)) {
      if (/:$/.test(match)) {
        cls = 'key';
      } else {
        cls = 'string';
      }
    } else if (/true|false/.test(match)) {
      cls = 'boolean';
    } else if (/null/.test(match)) {
      cls = 'null';
    }
    return '<span class="' + cls + '">' + match + '</span>';
  });
}

function doFormat() {
  const input = document.getElementById('input').value.trim();
  const errEl = document.getElementById('error');
  const outEl = document.getElementById('output');
  errEl.textContent = '';
  if (!input) { outEl.innerHTML = ''; return; }
  try {
    const obj = JSON.parse(input);
    const indentSel = document.getElementById('indent').value;
    const indent = indentSel === 'tab' ? '\t' : parseInt(indentSel);
    rawResult = JSON.stringify(obj, null, indent);
    outEl.innerHTML = syntaxHighlight(rawResult);
  } catch(e) {
    outEl.innerHTML = '';
    errEl.innerHTML = '<span style="color:#ef4444">JSON 解析错误:</span> ' + e.message;
  }
}

function doMinify() {
  const input = document.getElementById('input').value.trim();
  const errEl = document.getElementById('error');
  const outEl = document.getElementById('output');
  errEl.textContent = '';
  if (!input) { outEl.innerHTML = ''; return; }
  try {
    const obj = JSON.parse(input);
    rawResult = JSON.stringify(obj);
    outEl.innerHTML = syntaxHighlight(rawResult);
  } catch(e) {
    outEl.innerHTML = '';
    errEl.innerHTML = '<span style="color:#ef4444">JSON 解析错误:</span> ' + e.message;
  }
}

function copyResult() {
  if (rawResult) copyText(rawResult);
}

function doEscape() {
  const input = document.getElementById('input').value.trim();
  const errEl = document.getElementById('error');
  const outEl = document.getElementById('output');
  errEl.textContent = '';
  if (!input) { outEl.innerHTML = ''; return; }
  try {
    const obj = JSON.parse(input);
    rawResult = JSON.stringify(JSON.stringify(obj));
    outEl.innerHTML = syntaxHighlight(rawResult);
  } catch(e) {
    rawResult = JSON.stringify(input);
    outEl.innerHTML = syntaxHighlight(rawResult);
  }
}
</script>
<script src="track.js"></script>
</body>
</html>
