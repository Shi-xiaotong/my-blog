<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>万年历</title>
<link rel="stylesheet" href="/tools/common.css">
<style>
/* ─── Page specific — fully glassmorphism ─── */
body { background: transparent; min-height: 100vh; }

/* Header */
.cal-header {
  text-align: center;
  padding: 32px 0 8px;
}
.cal-header h1 {
  font-size: 28px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--primary, #2563EB), var(--accent, #F97316));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 4px;
}
.cal-header p {
  color: var(--text-secondary);
  font-size: 14px;
}

/* Nav */
.cal-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}
.cal-nav .month-year {
  font-size: 20px;
  font-weight: 600;
  color: var(--text);
}
.cal-nav .month-year .lunar-month {
  font-size: 13px;
  color: var(--text-secondary);
  font-weight: 400;
  margin-left: 8px;
}
.cal-nav-btn {
  width: 40px; height: 40px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--card-bg);
  backdrop-filter: blur(8px);
  color: var(--text);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s var(--ease-out);
  font-size: 16px;
}
.cal-nav-btn:hover {
  border-color: var(--primary);
  background: var(--primary-light);
  color: var(--primary);
}
.cal-nav-btn:active { transform: scale(0.92); }
.cal-today-btn {
  padding: 6px 16px;
  min-height: 36px;
  border-radius: 18px;
  border: 1px solid var(--border);
  background: var(--card-bg);
  backdrop-filter: blur(8px);
  color: var(--text);
  cursor: pointer;
  font-size: 13px;
  transition: all 0.2s var(--ease-out);
}
.cal-today-btn:hover {
  border-color: var(--primary);
  color: var(--primary);
}

/* Calendar Grid */
.cal-grid {
  background: var(--card-bg);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  box-shadow: var(--glass-shadow);
}
.cal-weekdays {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  border-bottom: 1px solid var(--border);
}
.cal-weekday {
  padding: 10px 4px;
  text-align: center;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
}
.cal-weekday:first-child, .cal-weekday:last-child {
  color: var(--error);
  opacity: 0.7;
}
.cal-days {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
}
.cal-day {
  position: relative;
  min-height: 80px;
  padding: 6px 8px;
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.15s var(--ease-out);
}
.cal-day:nth-child(7n) { border-right: none; }
.cal-day:nth-child(n+36) { border-bottom: none; }
.cal-day:hover { background: var(--primary-light); }
.cal-day.other-month { opacity: 0.35; }
.cal-day.other-month:hover { opacity: 0.5; }
.cal-day.today {
  background: var(--primary-light);
  border-color: var(--primary);
  box-shadow: inset 0 0 0 1px var(--primary);
}
.cal-day.today .day-num {
  background: var(--primary);
  color: #fff;
  border-radius: 50%;
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
}
.cal-day.selected {
  background: var(--accent-light);
  border-color: var(--accent);
}
.day-num {
  font-size: 15px;
  font-weight: 500;
  color: var(--text);
}
.day-lunar {
  font-size: 11px;
  color: var(--text-tertiary, #94A3B8);
  margin-top: 2px;
  line-height: 1.2;
}
.day-term {
  font-size: 10px;
  color: var(--accent);
  font-weight: 500;
  margin-top: 1px;
}
.day-event {
  font-size: 10px;
  color: var(--text-tertiary);
  margin-top: 1px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.day-festival {
  color: var(--error);
  font-weight: 500;
}

/* Info Panel */
.cal-info {
  margin-top: 16px;
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 12px;
}
.cal-info-card {
  background: var(--card-bg);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  box-shadow: var(--glass-shadow);
  display: flex;
  align-items: flex-start;
  gap: 12px;
  transition: all 0.2s var(--ease-out);
  position: relative;
  overflow: hidden;
}
.cal-info-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
}
.cal-info-card.info-primary::before { background: linear-gradient(90deg, #2563EB, #818CF8); }
.cal-info-card.info-accent::before { background: linear-gradient(90deg, #F97316, #FB923C); }
.cal-info-card.info-term::before { background: linear-gradient(90deg, #22C55E, #4ADE80); }
.cal-info-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--glass-shadow-hover);
}
.cal-info-card .info-icon {
  font-size: 28px;
  flex-shrink: 0;
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 10px;
}
.cal-info-card.info-primary .info-icon { background: rgba(37,99,235,0.1); }
.cal-info-card.info-accent .info-icon { background: rgba(249,115,22,0.1); }
.cal-info-card.info-term .info-icon { background: rgba(34,197,94,0.1); }
.cal-info-card .info-body { flex: 1; min-width: 0; }
.cal-info-card .info-label {
  font-size: 11px;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 2px;
}
.cal-info-card .info-value {
  font-size: 18px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.3;
}
.cal-info-card .info-sub {
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 2px;
}

/* Selector */
.cal-jump {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  align-items: center;
}
.cal-jump input,
.cal-jump select {
  padding: 8px 12px;
  min-height: 40px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 14px;
  background: var(--card-bg);
  backdrop-filter: blur(8px);
  color: var(--text);
  outline: none;
  font-family: inherit;
  transition: border-color 0.15s var(--ease-out);
}
.cal-jump input:focus,
.cal-jump select:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-light);
}
.cal-jump input { width: 80px; }
.cal-jump select { flex: 1; }

/* Legend */
.cal-legend {
  display: flex;
  gap: 16px;
  margin-bottom: 16px;
  flex-wrap: wrap;
  font-size: 12px;
  color: var(--text-secondary);
}
.cal-legend span {
  display: flex; align-items: center; gap: 4px;
}
.cal-legend .dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  display: inline-block;
}
.dot.today-dot { background: var(--primary); }
.dot.term-dot { background: var(--accent); }
.dot.festival-dot { background: var(--error); }

/* Responsive */
@media (max-width: 640px) {
  .cal-day { min-height: 60px; padding: 4px 6px; }
  .day-num { font-size: 13px; }
  .day-lunar { font-size: 10px; display: none; }
  .day-term { font-size: 9px; }
  .cal-weekday { font-size: 11px; padding: 8px 2px; }
  .cal-info { grid-template-columns: 1fr; }
  .cal-nav .month-year { font-size: 16px; }
}

/* Print */
@media print {
  .cal-nav-btn, .cal-today-btn, .cal-jump { display: none; }
  .cal-grid { box-shadow: none; border: 1px solid #ccc; }
}
</style>
</head>
<body>

<div class="container">
  <div class="cal-header">
    <h1>📅 万年历</h1>
    <p>公历 · 农历 · 节气 · 宜忌</p>
  </div>

  <div class="cal-jump">
    <input type="number" id="jumpYear" min="1900" max="2100" value="2026">
    <select id="jumpMonth">
      <option value="0">一月</option><option value="1">二月</option><option value="2">三月</option>
      <option value="3">四月</option><option value="4">五月</option><option value="5">六月</option>
      <option value="6">七月</option><option value="7">八月</option><option value="8">九月</option>
      <option value="9">十月</option><option value="10">十一月</option><option value="11">十二月</option>
    </select>
    <button class="cal-today-btn" onclick="goToDate()">跳转</button>
  </div>

  <div class="cal-legend">
    <span><span class="dot today-dot"></span> 今天</span>
    <span><span class="dot term-dot"></span> 节气</span>
    <span><span class="dot festival-dot"></span> 节日</span>
  </div>

  <div class="cal-nav">
    <button class="cal-nav-btn" onclick="prevMonth()" aria-label="上月">‹</button>
    <div class="month-year" id="monthYear">2026年7月 <span class="lunar-month" id="lunarMonthLabel">农历五月</span></div>
    <div style="display:flex;gap:8px">
      <button class="cal-today-btn" onclick="goToday()">今天</button>
      <button class="cal-nav-btn" onclick="nextMonth()" aria-label="下月">›</button>
    </div>
  </div>

  <div class="cal-grid" id="calGrid">
    <div class="cal-weekdays">
      <div class="cal-weekday">日</div>
      <div class="cal-weekday">一</div>
      <div class="cal-weekday">二</div>
      <div class="cal-weekday">三</div>
      <div class="cal-weekday">四</div>
      <div class="cal-weekday">五</div>
      <div class="cal-weekday">六</div>
    </div>
    <div class="cal-days" id="calDays"></div>
  </div>

  <div class="cal-info" id="calInfo">
    <div class="cal-info-card info-primary">
      <div class="info-icon">🌙</div>
      <div class="info-body">
        <div class="info-label">农历</div>
        <div class="info-value" id="infoLunar">—</div>
        <div class="info-sub" id="infoLunarYear">—</div>
      </div>
    </div>
    <div class="cal-info-card info-accent">
      <div class="info-icon">🐉</div>
      <div class="info-body">
        <div class="info-label">生肖 · 干支</div>
        <div class="info-value" id="infoZodiac">—</div>
        <div class="info-sub" id="infoZodiacYear">—</div>
      </div>
    </div>
    <div class="cal-info-card info-term">
      <div class="info-icon">🌿</div>
      <div class="info-body">
        <div class="info-label">节气</div>
        <div class="info-value" id="infoTerm">—</div>
        <div class="info-sub" id="infoTermDate">—</div>
      </div>
    </div>
  </div>
</div>

<script>
// ─── Lunar Calendar Data ───
// Lunar year info array (1900-2100)
// Each entry encodes: leap month (bit 0-3), month days (bit 4-15 for 12 months), leap month days (bit 16-19)
var lunarInfo = [
  0x04bd8,0x04ae0,0x0a570,0x054d5,0x0d260,0x0d950,0x16554,0x056a0,0x09ad0,0x055d2, //1900-1909
  0x04ae0,0x0a5b6,0x0a4d0,0x0d250,0x1d255,0x0b540,0x0d6a0,0x0ada2,0x095b0,0x14977, //1910-1919
  0x04970,0x0a4b0,0x0b4b5,0x06a50,0x06d40,0x1ab54,0x02b60,0x09570,0x052f2,0x04970, //1920-1929
  0x06566,0x0d4a0,0x0ea50,0x16a95,0x05ad0,0x02b60,0x186e3,0x092e0,0x1c8d7,0x0c950, //1930-1939
  0x0d4a0,0x1d8a6,0x0b550,0x056a0,0x1a5b4,0x025d0,0x092d0,0x0d2b2,0x0a950,0x0b557, //1940-1949
  0x06ca0,0x0b550,0x15355,0x04da0,0x0a5b0,0x14573,0x052b0,0x0a9a8,0x0e950,0x06aa0, //1950-1959
  0x0aea6,0x0ab50,0x04b60,0x0aae4,0x0a570,0x05260,0x0f263,0x0d950,0x05b57,0x056a0, //1960-1969
  0x096d0,0x04dd5,0x04ad0,0x0a4d0,0x0d4d4,0x0d250,0x0d558,0x0b540,0x0b6a0,0x195a6, //1970-1979
  0x095b0,0x049b0,0x0a974,0x0a4b0,0x0b27a,0x06a50,0x06d40,0x0af46,0x0ab60,0x09570, //1980-1989
  0x04af5,0x04970,0x064b0,0x074a3,0x0ea50,0x06b58,0x05ac0,0x0ab60,0x096d5,0x092e0, //1990-1999
  0x0c960,0x0d954,0x0d4a0,0x0da50,0x07552,0x056a0,0x0abb7,0x025d0,0x092d0,0x0cab5, //2000-2009
  0x0a950,0x0b4a0,0x0baa4,0x0ad50,0x055d9,0x04ba0,0x0a5b0,0x15176,0x052b0,0x0a930, //2010-2019
  0x07954,0x06aa0,0x0ad50,0x05b52,0x04b60,0x0a6e6,0x0a4e0,0x0d260,0x0ea65,0x0d530, //2020-2029
  0x05aa0,0x076a3,0x096d0,0x04afb,0x04ad0,0x0a4d0,0x1d0b6,0x0d250,0x0d520,0x0dd45, //2030-2039
  0x0b5a0,0x056d0,0x055b2,0x049b0,0x0a577,0x0a4b0,0x0aa50,0x1b255,0x06d20,0x0ada0, //2040-2049
  0x14b63,0x09370,0x049f8,0x04970,0x064b0,0x168a6,0x0ea50,0x06aa0,0x1a6c4,0x0aae0, //2050-2059
  0x092e0,0x0d2e3,0x0c960,0x0d557,0x0d4a0,0x0da50,0x05d55,0x056a0,0x0a6d0,0x055d4, //2060-2069
  0x052d0,0x0a9b8,0x0a950,0x0b4a0,0x0b6a6,0x0ad50,0x055a0,0x0aba4,0x0a5b0,0x052b0, //2070-2079
  0x0b273,0x06930,0x07337,0x06aa0,0x0ad50,0x14b55,0x04b60,0x0a570,0x054e4,0x0d160, //2080-2089
  0x0e968,0x0d520,0x0daa0,0x16aa6,0x056d0,0x04ae0,0x0a9d4,0x0a4d0,0x0d150,0x0f252, //2090-2099
  0x0d520 //2100
];

var Gan = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
var Zhi = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
var Animals = ['鼠','牛','虎','兔','龙','蛇','马','羊','猴','鸡','狗','猪'];
var LunarDayNames = ['初一','初二','初三','初四','初五','初六','初七','初八','初九','初十','十一','十二','十三','十四','十五','十六','十七','十八','十九','二十','廿一','廿二','廿三','廿四','廿五','廿六','廿七','廿八','廿九','三十'];
var LunarMonthNames = ['正','二','三','四','五','六','七','八','九','十','冬','腊'];

// Solar terms
var TermNames = ['小寒','大寒','立春','雨水','惊蛰','春分','清明','谷雨','立夏','小满','芒种','夏至','小暑','大暑','立秋','处暑','白露','秋分','寒露','霜降','立冬','小雪','大雪','冬至'];
// Simplified term calculation (uses approximate dates)
var TermDates = [
  [5,20],[4,19],[5,20],[3,19],[5,20],[4,20],[4,19],[4,19],[5,20],[5,20],[5,20],[5,20],
  [6,22],[5,22],[7,22],[7,22],[7,22],[7,22],[8,22],[7,22],[7,21],[7,21],[7,21],[7,21]
]; // Not accurate, but modern terms need full astronomical calc - simplified per month

// Major Chinese festivals (lunar)
var Festivals = {
  '1-1': '春节', '1-15': '元宵节',
  '5-5': '端午节', '7-7': '七夕节',
  '7-15': '中元节', '8-15': '中秋节',
  '9-9': '重阳节', '12-30': '除夕',
  '12-29': '除夕'
};

// Major solar festivals
var SolarFestivals = {
  '1-1': '元旦', '2-14': '情人节',
  '3-8': '妇女节', '3-12': '植树节',
  '4-1': '愚人节', '5-1': '劳动节',
  '5-4': '青年节', '6-1': '儿童节',
  '7-1': '建党节', '8-1': '建军节',
  '9-10': '教师节', '10-1': '国庆节',
  '12-25': '圣诞节'
};

// ─── Lunar conversion helpers ───
function lunarLeapMonth(y) { return lunarInfo[y-1900] & 0xf; }
function lunarYearDays(y) {
  var sum = 348; // 12 * 29
  for (var i = 0x8000; i > 0x8; i >>= 1) sum += (lunarInfo[y-1900] & i) ? 1 : 0;
  return sum + lunarLeapDays(y);
}
function lunarLeapDays(y) {
  var lm = lunarLeapMonth(y);
  return lm ? ((lunarInfo[y-1900] & 0x10000) ? 30 : 29) : 0;
}
function lunarMonthDays(y, m) {
  return (lunarInfo[y-1900] & (0x10000 >> m)) ? 30 : 29;
}

// Reference: 1900-01-31 = lunar 1900-01-01
var LunarRefDate = new Date(1900, 0, 31);
var LunarRefYear = 1900;
var LunarRefMonth = 1;
var LunarRefDay = 1;

function solarToLunar(year, month, day) {
  var baseDate = new Date(1900, 0, 31);
  var targetDate = new Date(year, month, day);
  var offset = Math.round((targetDate - baseDate) / 86400000);
  if (offset < 0) return { year: 0, month: 0, day: 0, isLeap: false };

  var i, temp = 0, ly = 1900;
  for (i = 1900; i < 2101 && offset > 0; i++) {
    temp = lunarYearDays(i);
    offset -= temp;
    ly = i;
  }
  if (offset < 0) { offset += temp; }
  else { ly = i; }

  var leap = lunarLeapMonth(ly);
  var isLeap = false;

  for (i = 1; i <= 12 && offset > 0; i++) {
    if (leap > 0 && i === (leap + 1) && !isLeap) {
      --i;
      isLeap = true;
      temp = lunarLeapDays(ly);
    } else {
      temp = lunarMonthDays(ly, i);
    }
    if (isLeap && i === (leap + 1)) isLeap = false;
    offset -= temp;
  }

  if (offset === 0 && leap > 0 && i === leap + 1) {
    if (isLeap) { isLeap = false; }
    else { isLeap = true; --i; }
  }
  if (offset < 0) { offset += temp; --i; }

  var lm = i;
  var ld = offset + 1;

  // Ganzhi cycle
  var gzY = (ly - 4) % 10;
  var gzZ = (ly - 4) % 12;
  var gzStr = Gan[(gzY + 10) % 10] + Zhi[(gzZ + 12) % 12];

  return {
    year: ly,
    month: lm,
    day: ld,
    isLeap: isLeap,
    gzYear: gzStr,
    animal: Animals[(ly - 4) % 12],
    monthName: (isLeap ? '闰' : '') + LunarMonthNames[lm - 1] + '月',
    dayName: LunarDayNames[ld - 1] || ld + '日'
  };
}

function findTerm(year, month, day) {
  // Simplified: check if date matches known solar term dates
  var idx = month * 2;
  // Two terms per month, roughly on 4th-8th and 19th-23rd
  var candidates = [];
  for (var t = 0; t < 24; t++) {
    var tm = Math.floor(t / 2);
    if (tm !== month) continue;
    var td = t % 2 === 0 ? [5,6,7,8] : [19,20,21,22,23];
    if (td.indexOf(day) !== -1) candidates.push(TermNames[t]);
  }
  return candidates.length > 0 ? candidates[0] : '';
}

function getFestival(lYear, lMonth, lDay, sMonth, sDay) {
  var key = lMonth + '-' + lDay;
  if (Festivals[key]) return Festivals[key];
  var sk = sMonth + '-' + sDay;
  if (SolarFestivals[sk]) return SolarFestivals[sk];
  return '';
}

// ─── State ───
var viewYear = new Date().getFullYear();
var viewMonth = new Date().getMonth();
var selectedDate = new Date();

// ─── Render ───
function render() {
  // Update nav
  var lm = lunarMonthOfDate(viewYear, viewMonth, 15);
  document.getElementById('monthYear').innerHTML = viewYear + '年' + (viewMonth + 1) + '月' +
    ' <span class="lunar-month">' + lm.monthName + '</span>';
  document.getElementById('jumpYear').value = viewYear;
  document.getElementById('jumpMonth').value = viewMonth;

  // Calendar grid
  var firstDay = new Date(viewYear, viewMonth, 1).getDay();
  var daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
  var today = new Date();
  var html = '';

  // Previous month padding
  var prevMonthDays = new Date(viewYear, viewMonth, 0).getDate();
  for (var i = firstDay - 1; i >= 0; i--) {
    var d = prevMonthDays - i;
    html += renderDay(viewYear, viewMonth - 1, d, true);
  }

  // Current month
  for (var d = 1; d <= daysInMonth; d++) {
    var isToday = viewYear === today.getFullYear() && viewMonth === today.getMonth() && d === today.getDate();
    html += renderDay(viewYear, viewMonth, d, false, isToday);
  }

  // Next month padding
  var remaining = 42 - (firstDay + daysInMonth);
  for (var d = 1; d <= remaining; d++) {
    html += renderDay(viewYear, viewMonth + 1, d, true);
  }

  document.getElementById('calDays').innerHTML = html;

  // Update info panel
  updateInfo(selectedDate);
}

function renderDay(year, month, day, isOther, isToday) {
  var dt = new Date(year, month, day);
  var lunar = solarToLunar(year, month, day);
  var term = findTerm(year, month, day);
  var fest = getFestival(lunar.year, lunar.month, lunar.day, month + 1, day);
  var isSelected = selectedDate && year === selectedDate.getFullYear() && month === selectedDate.getMonth() && day === selectedDate.getDate();

  var cls = 'cal-day';
  if (isOther) cls += ' other-month';
  if (isToday) cls += ' today';
  if (isSelected && !isOther) cls += ' selected';

  var lunarDisplay = '';
  if (lunar.day === 1) lunarDisplay = lunar.monthName;
  else if (lunar.day <= 10) lunarDisplay = lunar.dayName;

  var termDisplay = term ? '<div class="day-term">' + term + '</div>' : '';
  var festDisplay = fest ? '<div class="day-event' + (fest.indexOf('节') !== -1 ? ' day-festival' : '') + '">' + fest + '</div>' : '';

  return '<div class="' + cls + '" data-year="' + year + '" data-month="' + month + '" data-day="' + day + '" onclick="selectDate(this)">' +
    '<div class="day-num">' + day + '</div>' +
    (lunarDisplay ? '<div class="day-lunar">' + lunarDisplay + '</div>' : '') +
    termDisplay +
    festDisplay +
    '</div>';
}

function lunarMonthOfDate(year, month, day) {
  return solarToLunar(year, month, Math.min(day, new Date(year, month + 1, 0).getDate()));
}

function selectDate(el) {
  var y = parseInt(el.dataset.year);
  var m = parseInt(el.dataset.month);
  var d = parseInt(el.dataset.day);
  selectedDate = new Date(y, m, d);
  render();
}

function updateInfo(dt) {
  var y = dt.getFullYear(), m = dt.getMonth(), d = dt.getDate();
  var lunar = solarToLunar(y, m, d);
  var term = findTerm(y, m, d);
  var fest = getFestival(lunar.year, lunar.month, lunar.day, m + 1, d);

  var lunarStr = lunar.monthName + ' ' + lunar.dayName;
  if (lunar.isLeap) lunarStr = '闰' + lunarStr;
  document.getElementById('infoLunar').textContent = fest || lunarStr;
  document.getElementById('infoLunarYear').textContent = lunar.gzYear + '年 [' + lunar.animal + '年] ' + (fest ? lunarStr : '');

  document.getElementById('infoZodiac').textContent = lunar.animal;
  document.getElementById('infoZodiacYear').textContent = lunar.gzYear + '年 · 属' + lunar.animal;

  document.getElementById('infoTerm').textContent = term || '无';
  document.getElementById('infoTermDate').textContent = term ? (m + 1) + '月' + d + '日' : '—';
}

function prevMonth() {
  viewMonth--;
  if (viewMonth < 0) { viewMonth = 11; viewYear--; }
  render();
}

function nextMonth() {
  viewMonth++;
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  render();
}

function goToday() {
  var now = new Date();
  viewYear = now.getFullYear();
  viewMonth = now.getMonth();
  selectedDate = now;
  render();
}

function goToDate() {
  var y = parseInt(document.getElementById('jumpYear').value);
  var m = parseInt(document.getElementById('jumpMonth').value);
  if (y >= 1900 && y <= 2100 && m >= 0 && m <= 11) {
    viewYear = y;
    viewMonth = m;
    render();
  }
}

// Init
goToday();
</script>
