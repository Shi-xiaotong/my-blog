<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSV JSON 互转 - 在线工具</title>
<link rel="stylesheet" href="common.css">
<style>
.panels { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
@media (max-width: 768px) { .panels { grid-template-columns: 1fr; } }
.panels textarea { min-height: 300px; font-family: 'SF Mono', monospace; font-size: 13px; line-height: 1.6; }
.btn-row { display: flex; gap: 12px; justify-content: center; margin-bottom: 16px; flex-wrap: wrap; }
.error { color: #ef4444; font-size: 13px; margin-top: 8px; }
</style>
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
<div class="container">
  <div class="header">
    <a href="/tools/" class="back-link"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> 返回工具箱</a>
    <h1>CSV JSON 互转</h1>
  </div>
  <div class="tool-area">
    <div class="panels">
      <div>
        <label>CSV</label>
        <textarea id="csvInput" placeholder="name,age,city&#10;Alice,30,Beijing&#10;Bob,25,Shanghai"></textarea>
      </div>
      <div>
        <label>JSON</label>
        <textarea id="jsonInput" placeholder='[{"name":"Alice","age":"30","city":"Beijing"}]'></textarea>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="csvToJson()">CSV → JSON</button>
      <button class="btn btn-primary" onclick="jsonToCsv()">JSON → CSV</button>
      <button class="btn btn-outline" onclick="copyText(document.getElementById('csvInput').value)">复制 CSV</button>
      <button class="btn btn-outline" onclick="copyText(document.getElementById('jsonInput').value)">复制 JSON</button>
    </div>
    <div id="error" class="error"></div>
  </div>
</div>

<script>
function toggleTheme(){const h=document.documentElement;const d=h.getAttribute('data-theme')==='dark';h.setAttribute('data-theme',d?'':'dark');localStorage.setItem('theme',d?'light':'dark');const b=document.querySelector('.theme-toggle');b.innerHTML=d?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>':'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>'}
(function(){const s=localStorage.getItem('theme');if(s==='dark'){document.documentElement.setAttribute('data-theme','dark');document.querySelector('.theme-toggle').innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>'}})()
function showToast(msg){const d=document.createElement('div');d.className='toast';d.textContent=msg;document.body.appendChild(d);setTimeout(()=>d.remove(),2000)}
function copyText(t){if(t)navigator.clipboard.writeText(t);showToast('已复制')}

function parseCsvLine(line, sep) {
  const result = [];
  let current = '';
  let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (inQuotes) {
      if (ch === '"' && line[i+1] === '"') { current += '"'; i++; }
      else if (ch === '"') { inQuotes = false; }
      else { current += ch; }
    } else {
      if (ch === '"') { inQuotes = true; }
      else if (ch === sep) { result.push(current); current = ''; }
      else { current += ch; }
    }
  }
  result.push(current);
  return result;
}

function csvToJson() {
  const err = document.getElementById('error');
  err.textContent = '';
  const csv = document.getElementById('csvInput').value.trim();
  if (!csv) return;
  const lines = csv.split('\n').filter(l => l.trim());
  const sep = csv.includes('\t') ? '\t' : ',';
  const headers = parseCsvLine(lines[0], sep);
  const result = [];
  for (let i = 1; i < lines.length; i++) {
    const values = parseCsvLine(lines[i], sep);
    const obj = {};
    headers.forEach((h, idx) => { obj[h.trim()] = (values[idx] || '').trim(); });
    result.push(obj);
  }
  document.getElementById('jsonInput').value = JSON.stringify(result, null, 2);
}

function jsonToCsv() {
  const err = document.getElementById('error');
  err.textContent = '';
  try {
    const arr = JSON.parse(document.getElementById('jsonInput').value);
    if (!Array.isArray(arr) || arr.length === 0) { err.textContent = 'JSON 必须是非空数组'; return; }
    const headers = [...new Set(arr.flatMap(obj => Object.keys(obj)))];
    const escape = v => {
      const s = v === null || v === undefined ? '' : String(v);
      return s.includes(',') || s.includes('"') || s.includes('\n') ? '"' + s.replace(/"/g, '""') + '"' : s;
    };
    const csv = [headers.map(escape).join(',')];
    arr.forEach(obj => { csv.push(headers.map(h => escape(obj[h])).join(',')); });
    document.getElementById('csvInput').value = csv.join('\n');
  } catch(e) { err.textContent = 'JSON 解析错误: ' + e.message; }
}
</script>
<script src="track.js"></script>
</body>
</html>
