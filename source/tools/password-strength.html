<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="密码强度检测工具，评估密码安全性并给出改进建议。">
<title>密码强度检测 - 在线工具</title>
<link rel="stylesheet" href="common.css">
<style>
.strength-bar{height:8px;border-radius:4px;margin:12px 0;transition:width 0.3s,background 0.3s}
.check-item{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:14px}
.check-item::before{content:'✗';color:#ef4444;font-weight:bold}
.check-item.pass::before{content:'✓';color:#22c55e}
</style>
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
<div class="container">
  <div class="header"><a href="/tools/" class="back-link"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> 返回工具箱</a><h1>密码强度检测</h1></div>
  <div class="tool-area">
    <div class="section">
      <input type="password" id="input" placeholder="输入密码进行检测" style="font-size:18px;padding:14px" oninput="check()">
      <div class="strength-bar" id="bar" style="width:0%"></div>
      <div id="score" style="font-size:16px;font-weight:bold;margin-bottom:12px"></div>
      <div id="checks"></div>
    </div>
  </div>
</div>
<script>
function toggleTheme(){const h=document.documentElement,d=h.getAttribute('data-theme')==='dark';h.setAttribute('data-theme',d?'':'dark');localStorage.setItem('tool-theme',d?'light':'dark')}
;(function(){const s=localStorage.getItem('tool-theme');if(s==='dark')document.documentElement.setAttribute('data-theme','dark')})();
function check(){
  const pw=document.getElementById('input').value;
  const checks=[
    {label:'至少 8 位',pass:pw.length>=8},
    {label:'包含大写字母',pass:/[A-Z]/.test(pw)},
    {label:'包含小写字母',pass:/[a-z]/.test(pw)},
    {label:'包含数字',pass:/\d/.test(pw)},
    {label:'包含特殊字符',pass:/[^A-Za-z0-9]/.test(pw)},
    {label:'至少 12 位',pass:pw.length>=12},
  ];
  document.getElementById('checks').innerHTML=checks.map(c=>'<div class="check-item'+(c.pass?' pass':'')+'">'+c.label+'</div>').join('');
  const score=checks.filter(c=>c.pass).length;
  const levels=[{w:'0%',c:'#e5e7eb'},{w:'15%',c:'#ef4444'},{w:'30%',c:'#f97316'},{w:'50%',c:'#eab308'},{w:'70%',c:'#84cc16'},{w:'85%',c:'#22c55e'},{w:'100%',c:'#10b981'}];
  const l=levels[score]||levels[0];
  const bar=document.getElementById('bar');bar.style.width=l.w;bar.style.background=l.c;
  document.getElementById('score').textContent=pw?'强度等级: '+['未检测','极弱','弱','一般','较强','强','非常强'][score]:'';
  document.getElementById('score').style.color=l.c;
}
</script>
</body>
</html>
