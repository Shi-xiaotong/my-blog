<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="字数统计工具，支持中英文字符数、单词数、行数、段落数统计。">
<title>字数统计工具 - 在线工具</title>
<link rel="stylesheet" href="common.css">
<style>
textarea.main-input { height: 260px; resize: vertical; font-size: 15px; line-height: 1.6; }
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin-top: 20px; }
.stat-item { background: var(--primary-light); padding: 14px; border-radius: 10px; text-align: center; }
.stat-item .num { font-size: 28px; font-weight: 700; color: var(--primary); }
.stat-item .lbl { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
.freq-table { margin-top: 20px; width: 100%; border-collapse: collapse; }
.freq-table th, .freq-table td { padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border); font-size: 14px; }
.freq-table th { color: var(--text-secondary); font-size: 12px; font-weight: 600; text-transform: uppercase; }
.freq-bar { height: 6px; background: var(--primary); border-radius: 3px; transition: width 0.3s; }
</style>
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
<div class="container">
  <div class="header">
    <a href="/tools/" class="back-link"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> 返回工具箱</a>
    <h1>字数统计工具</h1>
  </div>
  <div class="tool-area">
    <textarea class="main-input" id="input" placeholder="在此输入或粘贴文本，实时统计字数..."></textarea>
    <div class="stats-grid" id="stats"></div>
    <h3 style="margin-top:24px;font-size:15px;color:var(--text-secondary)">字符频率 (Top 10)</h3>
    <table class="freq-table" id="freqTable">
      <thead><tr><th>#</th><th>字符</th><th>次数</th><th style="width:40%">频率</th></tr></thead>
      <tbody id="freqBody"></tbody>
    </table>
  </div>
</div>

<script>
function toggleTheme(){const h=document.documentElement;const d=h.getAttribute('data-theme')==='dark';h.setAttribute('data-theme',d?'':'dark');localStorage.setItem('tool-theme',d?'light':'dark');const b=document.querySelector('.theme-toggle');b.innerHTML=d?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>':'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>'}
(function(){const s=localStorage.getItem('tool-theme');if(s==='dark'){document.documentElement.setAttribute('data-theme','dark');const b=document.querySelector('.theme-toggle');if(b)b.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>'}})()
function showToast(msg){const d=document.createElement('div');d.className='toast';d.textContent=msg;document.body.appendChild(d);setTimeout(()=>d.remove(),2000)}

const input = document.getElementById('input');
input.addEventListener('input', update);

function update() {
  const text = input.value;
  const totalChars = text.length;
  const noSpaces = text.replace(/\s/g, '').length;
  const chinese = (text.match(/[一-鿿㐀-䶿]/g) || []).length;
  const englishWords = (text.match(/[a-zA-Z]+/g) || []).length;
  const lines = text ? text.split('\n').length : 0;
  const paragraphs = text ? text.split(/\n\s*\n/).filter(p => p.trim()).length : 0;
  const readMin = (chinese / 350).toFixed(1);

  document.getElementById('stats').innerHTML = [
    { num: totalChars, lbl: '总字符数' },
    { num: noSpaces, lbl: '不含空格' },
    { num: chinese, lbl: '中文字符' },
    { num: englishWords, lbl: '英文单词' },
    { num: lines, lbl: '行数' },
    { num: paragraphs, lbl: '段落数' },
    { num: readMin + ' 分钟', lbl: '阅读时间' },
  ].map(s => `<div class="stat-item"><div class="num">${s.num}</div><div class="lbl">${s.lbl}</div></div>`).join('');

  // Frequency
  const freq = {};
  for (const ch of text.replace(/\s/g, '')) {
    freq[ch] = (freq[ch] || 0) + 1;
  }
  const sorted = Object.entries(freq).sort((a, b) => b[1] - a[1]).slice(0, 10);
  const maxFreq = sorted.length ? sorted[0][1] : 1;
  document.getElementById('freqBody').innerHTML = sorted.map(([ch, count], i) =>
    `<tr><td>${i+1}</td><td style="font-size:18px">${ch}</td><td>${count}</td><td><div class="freq-bar" style="width:${(count/maxFreq*100)}%"></div></td></tr>`
  ).join('') || '<tr><td colspan="4" style="text-align:center;color:var(--text-secondary)">暂无数据</td></tr>';
}
</script>
<script src="track.js"></script>
</body>
</html>
