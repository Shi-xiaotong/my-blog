<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Base58 编码与解码工具，常用于比特币等加密货币，纯浏览器端运行。">
<title>Base58 编解码 - 在线工具</title>
<link rel="stylesheet" href="common.css">
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
<div class="container">
  <div class="header"><a href="/tools/" class="back-link" onclick="history.back();return false;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> 返回工具箱</a><h1>Base58 编解码</h1></div>
  <div class="tool-area">
    <div class="section"><label>输入文本</label><textarea id="input" rows="4" placeholder="输入文本或 Base58 字符串"></textarea></div>
    <div class="row" style="margin-top:12px"><button class="btn btn-primary" onclick="encode()">编码</button><button class="btn btn-outline" onclick="decode()">解码</button></div>
    <div style="margin-top:12px"><label>结果</label><div class="result-box" id="output" style="word-break:break-all;min-height:40px;font-family:'SF Mono',monospace;font-size:14px;cursor:pointer" onclick="copyText(this.textContent)" title="点击复制"></div></div>
  </div>
</div>
<script>
function toggleTheme(){const h=document.documentElement,d=h.getAttribute('data-theme')==='dark';h.setAttribute('data-theme',d?'':'dark');localStorage.setItem('tool-theme',d?'light':'dark')}
;(function(){const s=localStorage.getItem('tool-theme');if(s==='dark')document.documentElement.setAttribute('data-theme','dark')})();
function showToast(m){const d=document.createElement('div');d.className='toast';d.textContent=m;document.body.appendChild(d);setTimeout(()=>d.remove(),2000)}
function copyText(t){navigator.clipboard.writeText(String(t));showToast('已复制')}
const ALPHABET='123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz';
function encode(){
  const input=document.getElementById('input').value;
  if(!input){document.getElementById('output').textContent='';return}
  try{
    const bytes=new TextEncoder().encode(input);
    let num=BigInt(0);
    for(const b of bytes){num=num*BigInt(256)+BigInt(b)}
    let result='';
    while(num>0n){const idx=Number(num%BigInt(ALPHABET.length));result=ALPHABET[idx]+result;num/=BigInt(ALPHABET.length)}
    for(const b of bytes){if(b===0)result='1'+result;else break}
    document.getElementById('output').textContent=result;
  }catch(e){document.getElementById('output').textContent='编码失败: '+e.message}
}
function decode(){
  const input=document.getElementById('input').value.trim();
  if(!input){document.getElementById('output').textContent='';return}
  try{
    let num=BigInt(0);
    for(const c of input){const idx=ALPHABET.indexOf(c);if(idx===-1){document.getElementById('output').textContent='无效的 Base58 字符: '+c;return};num=num*BigInt(ALPHABET.length)+BigInt(idx)}
    let result='';
    while(num>0n){result=String.fromCharCode(Number(num%256n))+result;num/=256n}
    for(const c of input){if(c==='1')result='\x00'+result;else break}
    document.getElementById('output').textContent=result;
  }catch(e){document.getElementById('output').textContent='解码失败: '+e.message}
}
</script>
</body>
</html>
