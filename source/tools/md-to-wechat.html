<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Markdown 转微信公众号排版工具，生成可直接粘贴的 HTML 代码。">
<title>Markdown 转公众号排版 - 在线工具</title>
<link rel="stylesheet" href="common.css">
<style>
.preview-area{background:#fff;color:#333;border:1px solid var(--border);border-radius:8px;padding:24px;min-height:200px;line-height:1.8;font-size:15px}
.preview-area h1,.preview-area h2,.preview-area h3{color:#1a1a1a;margin:16px 0 8px}
.preview-area code{background:#f5f5f5;padding:2px 6px;border-radius:4px;font-size:13px}
.preview-area pre{background:#f5f5f5;padding:12px;border-radius:8px;overflow-x:auto}
.preview-area pre code{background:none;padding:0}
.preview-area blockquote{border-left:3px solid #3b82f6;padding-left:12px;color:#666;margin:8px 0}
.preview-area a{color:#3b82f6;text-decoration:none}
.preview-area img{max-width:100%;border-radius:8px}
.preview-area table{border-collapse:collapse;width:100%;margin:8px 0}
.preview-area th,.preview-area td{border:1px solid #ddd;padding:8px;text-align:left}
.preview-area th{background:#f5f5f5}
</style>
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
<div class="container">
  <div class="header"><a href="/tools/" class="back-link"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> 返回工具箱</a><h1>Markdown 转公众号排版</h1></div>
  <div class="tool-area">
    <div class="section"><label>输入 Markdown</label><textarea id="input" rows="8" placeholder="# 标题&#10;&#10;正文内容...&#10;&#10;**加粗** *斜体*"></textarea></div>
    <button class="btn btn-primary" style="margin-top:12px" onclick="convert()">转换</button>
    <div style="margin-top:12px"><label>预览</label><div class="preview-area" id="output"></div></div>
    <div style="margin-top:12px"><button class="btn btn-outline" onclick="copyHtml()">复制 HTML</button></div>
  </div>
</div>
<script>
function toggleTheme(){const h=document.documentElement,d=h.getAttribute('data-theme')==='dark';h.setAttribute('data-theme',d?'':'dark');localStorage.setItem('tool-theme',d?'light':'dark')}
;(function(){const s=localStorage.getItem('tool-theme');if(s==='dark')document.documentElement.setAttribute('data-theme','dark')})();
function showToast(m){const d=document.createElement('div');d.className='toast';d.textContent=m;document.body.appendChild(d);setTimeout(()=>d.remove(),2000)}
function copyText(t){navigator.clipboard.writeText(String(t));showToast('已复制')}
function mdToHtml(md){
  let html=md;
  html=html.replace(/^### (.+)$/gm,'<h3>$1</h3>');
  html=html.replace(/^## (.+)$/gm,'<h2>$1</h2>');
  html=html.replace(/^# (.+)$/gm,'<h1>$1</h1>');
  html=html.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  html=html.replace(/\*(.+?)\*/g,'<em>$1</em>');
  html=html.replace(/`([^`]+)`/g,'<code>$1</code>');
  html=html.replace(/```([\s\S]*?)```/g,'<pre><code>$1</code></pre>');
  html=html.replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>');
  html=html.replace(/^\- (.+)$/gm,'<li>$1</li>');
  html=html.replace(/(<li>.*<\/li>)/s,'<ul>$1</ul>');
  html=html.replace(/^\d+\. (.+)$/gm,'<li>$1</li>');
  html=html.replace(/\!\[([^\]]*)\]\(([^)]+)\)/g,'<img src="$2" alt="$1">');
  html=html.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2">$1</a>');
  html=html.replace(/^---$/gm,'<hr>');
  html=html.replace(/\n\n/g,'<br><br>');
  return html;
}
function convert(){document.getElementById('output').innerHTML=mdToHtml(document.getElementById('input').value)}
function copyHtml(){const h=document.getElementById('output').innerHTML;copyText(h)}
</script>
</body>
</html>
