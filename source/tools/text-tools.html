<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文本去重/排序/清理 - 在线工具</title>
<link rel="stylesheet" href="common.css">
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
<div class="container">
  <div class="header"><a href="/tools/" class="back-link"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> 返回工具箱</a><h1>文本去重/排序/清理</h1></div>
  <div class="tool-area">
    <div class="section"><label>输入文本（每行一条）</label><textarea id="input" rows="6" placeholder="line1&#10;line2&#10;line1&#10;line3"></textarea></div>
    <div class="row" style="margin-top:12px;flex-wrap:wrap">
      <button class="btn btn-primary" onclick="process('dedup')">去重</button>
      <button class="btn btn-primary" onclick="process('sort')">升序</button>
      <button class="btn btn-outline" onclick="process('sortDesc')">降序</button>
      <button class="btn btn-outline" onclick="process('uniq')">唯一行</button>
      <button class="btn btn-outline" onclick="process('trim')">去空格</button>
      <button class="btn btn-outline" onclick="process('blank')">去空行</button>
      <button class="btn btn-outline" onclick="process('number')">行号</button>
      <button class="btn btn-outline" onclick="process('reverse')">反转</button>
    </div>
    <div style="margin-top:12px"><label>结果</label><textarea id="output" rows="6" readonly style="cursor:pointer" onclick="copyText(this.value)" title="点击复制"></textarea></div>
    <div style="margin-top:8px;font-size:13px;color:var(--text-secondary)">原始: <span id="origCount">0</span> 行 → 结果: <span id="resultCount">0</span> 行</div>
  </div>
</div>
<script>
function toggleTheme(){const h=document.documentElement,d=h.getAttribute('data-theme')==='dark';h.setAttribute('data-theme',d?'':'dark');localStorage.setItem('tool-theme',d?'light':'dark')}
;(function(){const s=localStorage.getItem('tool-theme');if(s==='dark')document.documentElement.setAttribute('data-theme','dark')})();
function showToast(m){const d=document.createElement('div');d.className='toast';d.textContent=m;document.body.appendChild(d);setTimeout(()=>d.remove(),2000)}
function copyText(t){navigator.clipboard.writeText(String(t));showToast('已复制')}
function process(type){
  const lines=document.getElementById('input').value.split('\n');
  document.getElementById('origCount').textContent=lines.length;
  let result;
  switch(type){
    case'dedup':result=[...new Set(lines)];break;
    case'sort':result=[...lines].sort();break;
    case'sortDesc':result=[...lines].sort().reverse();break;
    case'uniq':result=lines.filter(l=>lines.indexOf(l)===lines.lastIndexOf(l));break;
    case'trim':result=lines.map(l=>l.trim());break;
    case'blank':result=lines.filter(l=>l.trim());break;
    case'number':result=lines.map((l,i)=>(i+1)+'. '+l);break;
    case'reverse':result=[...lines].reverse();break;
  }
  document.getElementById('output').value=result.join('\n');
  document.getElementById('resultCount').textContent=result.length;
}
</script>
</body>
</html>
