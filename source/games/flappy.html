<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Bird - 小游戏</title>
<link rel="stylesheet" href="common.css">
<script src="ai.js"></script>
<style>
.game-container { max-width: 400px; margin: 0 auto; }
.game-area { display: flex; justify-content: center; margin: 16px 0; position: relative; }
.game-area canvas { border-radius: 12px; border: 2px solid var(--border); cursor: pointer; touch-action: manipulation; }
.start-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 12px; z-index: 5; }
.start-overlay h2 { font-size: 2em; margin-bottom: 12px; }
.start-overlay p { color: var(--text-secondary); margin-bottom: 20px; }
.tip { text-align: center; font-size: 13px; color: var(--text-secondary); margin-top: 8px; }
</style>
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
<div class="container">
  <div class="header">
    <a href="/games/" class="back-link"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> 返回游戏</a>
    <h1>Flappy Bird</h1>
  </div>
  <div class="score-bar">
    <div class="score-item"><div class="score-label">分数</div><div class="score-value" id="score">0</div></div>
    <div class="score-item"><div class="score-label">最高</div><div class="score-value" id="best">0</div></div>
  </div>
  <div class="game-container">
    <div class="game-area">
      <canvas id="canvas" width="320" height="480"></canvas>
      <div class="start-overlay" id="startOverlay">
        <h2>Flappy Bird</h2>
        <p>点击或按空格开始</p>
        <button class="btn btn-primary" onclick="startGame()">开始游戏</button>
      </div>
    </div>
    <p class="tip">点击屏幕 / 空格键 控制飞行</p>
  </div>
</div>

<script>
function toggleTheme(){const h=document.documentElement;const d=h.getAttribute('data-theme')==='light';h.setAttribute('data-theme',d?'':'light');localStorage.setItem('game-theme',d?'dark':'light');const b=document.querySelector('.theme-toggle');b.innerHTML=d?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>':'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>'}
(function(){const s=localStorage.getItem('game-theme');if(s==='light'){document.documentElement.setAttribute('data-theme','light');document.querySelector('.theme-toggle').innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>'}})()

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

let bird, pipes, score, best, gameState, frameCount, gravity, jumpForce, pipeSpeed, pipeGap, pipeWidth, pipeInterval;

best = parseInt(localStorage.getItem('best_flappy')) || 0;
document.getElementById('best').textContent = best;

function initBird() {
  bird = { x: 80, y: H / 2, vy: 0, radius: 12, rotation: 0 };
}

function resetGame() {
  initBird();
  pipes = [];
  score = 0;
  frameCount = 0;
  aiComment = '';
  gravity = 0.35;
  jumpForce = -6.5;
  pipeSpeed = 2.2;
  pipeGap = 130;
  pipeWidth = 50;
  pipeInterval = 90;
  document.getElementById('score').textContent = '0';
  document.getElementById('startOverlay').style.display = 'none';
  gameState = 'playing';
}

function startGame() {
  resetGame();
  gameLoop();
}

function flap() {
  if (gameState === 'idle') { startGame(); return; }
  if (gameState === 'playing') { bird.vy = jumpForce; }
  if (gameState === 'dead') { resetGame(); gameLoop(); }
}

function spawnPipe() {
  const gapY = 80 + Math.random() * (H - pipeGap - 160);
  pipes.push({ x: W, gapY, scored: false });
}

function update() {
  if (gameState !== 'playing') return;
  frameCount++;

  // Bird physics
  bird.vy += gravity;
  bird.y += bird.vy;
  bird.rotation = Math.min(Math.max(bird.vy * 3, -30), 90) * Math.PI / 180;

  // Spawn pipes
  if (frameCount % pipeInterval === 0) spawnPipe();

  // Update pipes
  pipes.forEach(p => p.x -= pipeSpeed);
  pipes = pipes.filter(p => p.x + pipeWidth > -10);

  // Score
  pipes.forEach(p => {
    if (!p.scored && p.x + pipeWidth < bird.x) { p.scored = true; score++; document.getElementById('score').textContent = score; }
  });

  // Collision detection
  const b = bird;
  // Ground / ceiling
  if (b.y + b.radius > H || b.y - b.radius < 0) { die(); return; }
  // Pipes
  for (const p of pipes) {
    if (b.x + b.radius > p.x && b.x - b.radius < p.x + pipeWidth) {
      if (b.y - b.radius < p.gapY || b.y + b.radius > p.gapY + pipeGap) { die(); return; }
    }
  }
}

let aiComment = '';

async function die() {
  gameState = 'dead';
  if (score > best) { best = score; localStorage.setItem('best_flappy', best); document.getElementById('best').textContent = best; }
  // AI 点评
  if (typeof getGameComment === 'function') {
    getGameComment('Flappy Bird', score, score > 10).then(msg => { if (msg) aiComment = msg; });
  }
}

function draw() {
  // Sky
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#70c5ce');
  grad.addColorStop(1, '#d4f1f4');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Ground
  ctx.fillStyle = '#ded895';
  ctx.fillRect(0, H - 20, W, 20);
  ctx.fillStyle = '#5d8a3c';
  ctx.fillRect(0, H - 20, W, 5);

  // Pipes
  ctx.fillStyle = '#73bf2e';
  pipes.forEach(p => {
    // Top pipe
    ctx.fillStyle = '#73bf2e';
    ctx.fillRect(p.x, 0, pipeWidth, p.gapY);
    ctx.fillStyle = '#5da825';
    ctx.fillRect(p.x - 3, p.gapY - 20, pipeWidth + 6, 20);
    // Bottom pipe
    ctx.fillStyle = '#73bf2e';
    ctx.fillRect(p.x, p.gapY + pipeGap, pipeWidth, H - p.gapY - pipeGap);
    ctx.fillStyle = '#5da825';
    ctx.fillRect(p.x - 3, p.gapY + pipeGap, pipeWidth + 6, 20);
  });

  // Bird
  ctx.save();
  ctx.translate(bird.x, bird.y);
  ctx.rotate(bird.rotation);
  // Body
  ctx.fillStyle = '#f7dc6f';
  ctx.beginPath();
  ctx.ellipse(0, 0, bird.radius, bird.radius - 2, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#d4ac0d';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  // Eye
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(5, -3, 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(6, -3, 2.5, 0, Math.PI * 2);
  ctx.fill();
  // Beak
  ctx.fillStyle = '#e74c3c';
  ctx.beginPath();
  ctx.moveTo(bird.radius, -2);
  ctx.lineTo(bird.radius + 8, 2);
  ctx.lineTo(bird.radius, 6);
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  // Game over text
  if (gameState === 'dead') {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 32px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Game Over', W/2, H/2 - 30);
    ctx.font = '18px -apple-system, sans-serif';
    ctx.fillStyle = '#ddd';
    ctx.fillText('得分: ' + score, W/2, H/2 + 10);
    ctx.font = '14px -apple-system, sans-serif';
    ctx.fillStyle = '#aaa';
    ctx.fillText('点击重新开始', W/2, H/2 + 40);
    if (aiComment) {
      ctx.font = '13px -apple-system, sans-serif';
      ctx.fillStyle = '#fbbf24';
      ctx.fillText(aiComment, W/2, H/2 + 65);
    }
  }
}

function gameLoop() {
  update();
  draw();
  if (gameState === 'playing') requestAnimationFrame(gameLoop);
  else if (gameState === 'dead') draw();
}

canvas.addEventListener('click', flap);
canvas.addEventListener('touchstart', e => { e.preventDefault(); flap(); }, {passive: false});
document.addEventListener('keydown', e => { if (e.code === 'Space') { e.preventDefault(); flap(); } });

// Initial draw
initBird();
draw();
</script>
<script src="track.js"></script>
</body>
</html>
