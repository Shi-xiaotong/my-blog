<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>记忆翻牌 - 小游戏</title>
<link rel="stylesheet" href="common.css">
<style>
.game-container { max-width: 460px; margin: 0 auto; }
.board { display: grid; gap: 8px; margin: 16px 0; perspective: 1000px; }
.board.easy { grid-template-columns: repeat(4, 1fr); }
.board.medium { grid-template-columns: repeat(5, 1fr); }
.board.hard { grid-template-columns: repeat(6, 1fr); }
.card { aspect-ratio: 1; cursor: pointer; position: relative; transform-style: preserve-3d; transition: transform 0.4s; }
.card.flipped { transform: rotateY(180deg); }
.card.matched { transform: rotateY(180deg); opacity: 0.6; pointer-events: none; }
.card-face, .card-back { position: absolute; inset: 0; border-radius: 8px; display: flex; align-items: center; justify-content: center; backface-visibility: hidden; border: 2px solid var(--border); }
.card-back { background: var(--primary); z-index: 1; }
.card-back svg { width: 50%; height: 50%; color: rgba(255,255,255,0.5); }
.card-face { background: var(--card-bg); transform: rotateY(180deg); }
.card-face svg { width: 60%; height: 60%; }
.difficulty { display: flex; gap: 8px; margin-bottom: 16px; justify-content: center; }
.diff-btn { padding: 6px 16px; border: 1px solid var(--border); border-radius: 8px; background: var(--card-bg); color: var(--text); cursor: pointer; font-size: 13px; transition: all 0.15s; }
.diff-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
.win-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 100; }
.win-box { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 32px; text-align: center; max-width: 320px; }
.win-box h2 { margin-bottom: 12px; font-size: 1.5em; }
.win-box p { color: var(--text-secondary); margin-bottom: 16px; }
.win-stats { display: flex; gap: 24px; justify-content: center; margin-bottom: 20px; }
.win-stat .num { font-size: 28px; font-weight: 700; color: var(--primary); font-family: 'SF Mono', monospace; }
.win-stat .lbl { font-size: 12px; color: var(--text-secondary); }
</style>
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
<div class="container">
  <div class="header">
    <a href="/games/" class="back-link"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> 返回游戏</a>
    <h1>记忆翻牌</h1>
  </div>
  <div class="score-bar">
    <div class="score-item"><div class="score-label">步数</div><div class="score-value" id="moves">0</div></div>
    <div class="score-item"><div class="score-label">配对</div><div class="score-value" id="pairs">0/8</div></div>
    <div class="score-item"><div class="score-label">时间</div><div class="score-value" id="timer">0:00</div></div>
  </div>
  <div class="difficulty">
    <button class="diff-btn active" data-diff="easy" onclick="setDifficulty('easy')">简单 (4x4)</button>
    <button class="diff-btn" data-diff="medium" onclick="setDifficulty('medium')">中等 (5x4)</button>
    <button class="diff-btn" data-diff="hard" onclick="setDifficulty('hard')">困难 (6x6)</button>
  </div>
  <div class="game-container">
    <div class="board" id="board"></div>
    <div style="text-align:center"><button class="btn btn-primary" onclick="newGame()">新游戏</button></div>
  </div>
</div>

<div class="win-overlay" id="winOverlay" style="display:none">
  <div class="win-box">
    <h2>Congratulations</h2>
    <p>你完成了所有配对</p>
    <div class="win-stats">
      <div class="win-stat"><div class="num" id="winMoves">0</div><div class="lbl">步数</div></div>
      <div class="win-stat"><div class="num" id="winTime">0:00</div><div class="lbl">用时</div></div>
    </div>
    <button class="btn btn-primary" onclick="closeWin();newGame()">再来一局</button>
  </div>
</div>

<script>
function toggleTheme(){const h=document.documentElement;const d=h.getAttribute('data-theme')==='light';h.setAttribute('data-theme',d?'':'light');localStorage.setItem('game-theme',d?'dark':'light');const b=document.querySelector('.theme-toggle');b.innerHTML=d?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>':'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>'}
(function(){const s=localStorage.getItem('game-theme');if(s==='light'){document.documentElement.setAttribute('data-theme','light');document.querySelector('.theme-toggle').innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>'}})()

const ICONS = [
  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/></svg>',
  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>',
  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>',
  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>',
  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>',
  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/></svg>',
  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>',
  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>',
  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>',
  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>',
  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>',
  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><circle cx="12" cy="12" r="10"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15 8.5 22 9.3 17 14 18 21 12 17.8 6 21 7 14 2 9.3 9 8.5"/></svg>',
  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3h7v7H3zM14 3h7v7h-7zM14 14h7v7h-7zM3 14h7v7H3z"/></svg>',
  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/><path d="M12 6v6l4 2"/></svg>',
  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22 6 12 13 2 6"/></svg>',
  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="2.18"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/></svg>',
  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>',
];

const COLORS = ['#3b82f6','#ef4444','#22c55e','#f59e0b','#a855f7','#ec4899','#06b6d4','#f97316','#84cc16','#6366f1','#14b8a6','#e11d48','#0ea5e9','#d946ef','#8b5cf6','#fbbf24','#10b981','#e74c3c'];

const BACK_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7V4h16v3M9 20h6M12 4v16"/></svg>';

let difficulty = 'easy';
let cards = [], flipped = [], matched = new Set();
let moves = 0, pairs = 0, totalPairs = 0;
let seconds = 0, timerInterval = null;
let locked = false;

const diffConfig = { easy: {cols:4, rows:4}, medium: {cols:5, rows:4}, hard: {cols:6, rows:6} };

function setDifficulty(d) {
  difficulty = d;
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.toggle('active', b.dataset.diff === d));
  newGame();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; }
  return arr;
}

function newGame() {
  const {cols, rows} = diffConfig[difficulty];
  totalPairs = (cols * rows) / 2;
  const iconIndices = shuffle([...Array(ICONS.length).keys()]).slice(0, totalPairs);
  const pairsArr = shuffle([...iconIndices, ...iconIndices]);

  cards = pairsArr.map((iconIdx, i) => ({ id: i, iconIdx, color: COLORS[iconIdx] }));
  flipped = []; matched = new Set(); moves = 0; pairs = 0; seconds = 0; locked = false;

  clearInterval(timerInterval);
  timerInterval = null;
  document.getElementById('timer').textContent = '0:00';
  render();
}

function render() {
  const {cols, rows} = diffConfig[difficulty];
  const board = document.getElementById('board');
  board.className = 'board ' + difficulty;

  board.innerHTML = cards.map((c, i) => {
    const isFlipped = flipped.includes(i) || matched.has(i);
    const isMatched = matched.has(i);
    return `<div class="card ${isFlipped ? 'flipped' : ''} ${isMatched ? 'matched' : ''}" onclick="flipCard(${i})">
      <div class="card-face"><div style="color:${c.color}">${ICONS[c.iconIdx]}</div></div>
      <div class="card-back">${BACK_ICON}</div>
    </div>`;
  }).join('');

  document.getElementById('moves').textContent = moves;
  document.getElementById('pairs').textContent = pairs + '/' + totalPairs;
}

function flipCard(i) {
  if (locked || flipped.includes(i) || matched.has(i) || flipped.length >= 2) return;

  if (!timerInterval) {
    timerInterval = setInterval(() => { seconds++; const m = Math.floor(seconds/60); const s = seconds%60; document.getElementById('timer').textContent = m + ':' + String(s).padStart(2,'0'); }, 1000);
  }

  flipped.push(i);
  render();

  if (flipped.length === 2) {
    moves++;
    const [a, b] = flipped;
    if (cards[a].iconIdx === cards[b].iconIdx) {
      matched.add(a); matched.add(b);
      pairs++;
      flipped = [];
      render();
      if (pairs === totalPairs) { clearInterval(timerInterval); setTimeout(showWin, 500); }
    } else {
      locked = true;
      setTimeout(() => { flipped = []; locked = false; render(); }, 800);
    }
  }
}

function showWin() {
  document.getElementById('winMoves').textContent = moves;
  const m = Math.floor(seconds/60), s = seconds%60;
  document.getElementById('winTime').textContent = m + ':' + String(s).padStart(2,'0');
  document.getElementById('winOverlay').style.display = 'flex';
}

function closeWin() { document.getElementById('winOverlay').style.display = 'none'; }

newGame();
</script>
</body>
</html>
