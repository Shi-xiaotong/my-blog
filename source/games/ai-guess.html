<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 猜图 - 小游戏</title>
<link rel="stylesheet" href="common.css">
<style>
.game-container { max-width: 600px; margin: 0 auto; }
.image-area { text-align: center; margin: 16px 0; min-height: 300px; display: flex; align-items: center; justify-content: center; background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
.image-area img { max-width: 100%; max-height: 400px; border-radius: 12px; }
.image-area .placeholder { color: var(--text-secondary); padding: 40px; }
.guess-area { display: flex; gap: 8px; margin-bottom: 16px; }
.guess-area input { flex: 1; padding: 12px 16px; border: 2px solid var(--border); border-radius: 10px; font-size: 15px; background: var(--card-bg); color: var(--text); outline: none; }
.guess-area input:focus { border-color: var(--primary); }
.hint-area { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-bottom: 16px; min-height: 60px; }
.hint-area .msg { padding: 6px 0; font-size: 14px; border-bottom: 1px solid var(--border); }
.hint-area .msg:last-child { border-bottom: none; }
.hint-area .msg.system { color: var(--text-secondary); }
.hint-area .msg.correct { color: var(--accent); font-weight: 600; }
.hint-area .msg.wrong { color: var(--danger); }
.hint-area .msg.ai { color: var(--primary); }
.score-display { display: flex; gap: 16px; justify-content: center; margin-bottom: 16px; }
.score-item { text-align: center; }
.score-item .num { font-size: 28px; font-weight: 700; font-family: 'SF Mono', monospace; color: var(--primary); }
.score-item .lbl { font-size: 12px; color: var(--text-secondary); }
.loading { display: flex; flex-direction: column; align-items: center; gap: 12px; color: var(--text-secondary); padding: 40px; }
.loading .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.win-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 100; }
.win-box { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 32px; text-align: center; max-width: 360px; }
.win-box h2 { margin-bottom: 8px; }
.win-box p { color: var(--text-secondary); margin-bottom: 16px; }
.tip { text-align: center; font-size: 12px; color: var(--text-secondary); margin-top: 8px; }
</style>
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
<div class="container">
  <div class="header">
    <a href="/games/" class="back-link"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> 返回游戏</a>
    <h1>AI 猜图</h1>
  </div>
  <div class="game-container">
    <div class="score-display">
      <div class="score-item"><div class="num" id="round">0</div><div class="lbl">轮次</div></div>
      <div class="score-item"><div class="num" id="score">0</div><div class="lbl">得分</div></div>
      <div class="score-item"><div class="num" id="streak">0</div><div class="lbl">连胜</div></div>
    </div>

    <div class="image-area" id="imageArea">
      <div class="placeholder">点击「新的一轮」开始游戏</div>
    </div>

    <div class="hint-area" id="hintArea"></div>

    <div class="guess-area">
      <input type="text" id="guessInput" placeholder="猜猜这张图的描述词..." onkeydown="if(event.key==='Enter')makeGuess()">
      <button class="btn btn-primary" onclick="makeGuess()">猜</button>
    </div>

    <div style="display:flex;gap:8px;justify-content:center">
      <button class="btn btn-primary" id="newBtn" onclick="newRound()">新的一轮</button>
      <button class="btn btn-outline" onclick="skipRound()">跳过 (看答案)</button>
      <button class="btn btn-outline" onclick="getAIHint()">AI 提示</button>
    </div>
    <p class="tip">AI 会根据图片描述生成一张图，你需要猜出原始描述</p>
  </div>
</div>

<div class="win-overlay" id="overlay" style="display:none">
  <div class="win-box">
    <h2 id="winTitle"></h2>
    <p id="winMsg"></p>
    <button class="btn btn-primary" onclick="closeOverlay();newRound()">再来一轮</button>
  </div>
</div>

<script>
function toggleTheme(){const h=document.documentElement;const d=h.getAttribute('data-theme')==='light';h.setAttribute('data-theme',d?'':'light');localStorage.setItem('game-theme',d?'dark':'light');const b=document.querySelector('.theme-toggle');b.innerHTML=d?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>':'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>'}
(function(){const s=localStorage.getItem('game-theme');if(s==='light'){document.documentElement.setAttribute('data-theme','light');document.querySelector('.theme-toggle').innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>'}})()

const AI_ENDPOINT = 'https://ai.233002.xyz';
let secretPrompt = '', imageUrl = '', score = 0, round = 0, streak = 0, attempts = 0, guessed = false;

const CATEGORIES = [
  { cat: '动物', prompts: ['A majestic lion resting on a rock in the savanna, golden hour light', 'A cute red panda sitting on a tree branch, bamboo forest background', 'A group of penguins walking on ice, arctic landscape, clear sky', 'A colorful parrot flying through a tropical rainforest', 'A sleeping cat curled up on a windowsill, rainy day outside', 'A dolphin jumping out of the ocean at sunset', 'An owl with big eyes sitting on a branch at night, moonlight', 'A butterfly landing on a colorful flower, macro photography'] },
  { cat: '风景', prompts: ['A serene mountain lake reflecting snow-capped peaks, sunrise', 'A lavender field stretching to the horizon, purple sunset', 'A waterfall hidden in a dense tropical jungle, misty atmosphere', 'A sandy beach with crystal clear turquoise water, palm trees', 'A misty forest path with sunlight filtering through trees', 'A desert with sand dunes under a starry night sky', 'A cherry blossom tree in full bloom, Japanese garden', 'A coastal cliff with crashing waves, dramatic clouds'] },
  { cat: '城市', prompts: ['A futuristic city at night with neon lights and flying cars', 'A cozy European street cafe with outdoor seating, autumn leaves', 'A busy Asian street market with colorful lanterns at dusk', 'A modern skyscraper reflecting sunset clouds, city skyline', 'A quiet cobblestone alley with old brick buildings, morning fog', 'A rooftop garden overlooking a city, urban oasis concept'] },
  { cat: '食物', prompts: ['A delicious pizza fresh from a wood-fired oven, melted cheese', 'A colorful fruit smoothie bowl topped with berries and granola', 'A steaming cup of latte with beautiful foam art, cafe setting', 'A plate of sushi arranged artistically, Japanese restaurant', 'A chocolate cake with rich ganache, professional food photography', 'Fresh bread loaves cooling on a rustic wooden rack, bakery'] },
  { cat: '奇幻', prompts: ['A dragon flying over a medieval castle, dramatic sunset sky', 'A magical forest with glowing mushrooms and fairy lights', 'A wizard casting a spell with glowing runes, dark tower background', 'An underwater city with bioluminescent buildings, deep ocean', 'A floating island with waterfalls cascading into clouds', 'A robot sitting in a garden of mechanical flowers, steampunk'] },
];

function getRandomPrompt() {
  const cat = CATEGORIES[Math.floor(Math.random() * CATEGORIES.length)];
  return cat.prompts[Math.floor(Math.random() * cat.prompts.length)];
}

function addHint(msg, type) {
  const el = document.getElementById('hintArea');
  const div = document.createElement('div');
  div.className = 'msg ' + type;
  div.textContent = msg;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

async function newRound() {
  round++;
  attempts = 0;
  guessed = false;
  secretPrompt = getRandomPrompt();
  document.getElementById('round').textContent = round;
  document.getElementById('hintArea').innerHTML = '';
  document.getElementById('guessInput').value = '';
  document.getElementById('guessInput').disabled = false;
  document.getElementById('overlay').style.display = 'none';

  // Show loading
  document.getElementById('imageArea').innerHTML = '<div class="loading"><div class="spinner"></div><p>AI 正在生成图片...</p></div>';
  addHint('新的一轮开始！AI 正在画图...', 'system');

  try {
    const res = await fetch(AI_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'agnes-image-2.1-flash',
        endpoint: 'images/generations',
        prompt: secretPrompt,
        size: '1024x768',
        extra_body: { response_format: 'url' }
      })
    });

    if (!res.ok) throw new Error('API error');
    const data = await res.json();
    imageUrl = data?.data?.[0]?.url;

    if (imageUrl) {
      document.getElementById('imageArea').innerHTML = `<img src="${imageUrl}" alt="AI Generated">`;
      addHint('图片已生成！猜猜它的描述词是什么？', 'system');
    } else {
      throw new Error('No image URL');
    }
  } catch (e) {
    document.getElementById('imageArea').innerHTML = '<div class="placeholder" style="color:#ef4444">图片生成失败，请重试</div>';
    addHint('生成失败: ' + e.message, 'wrong');
  }
}

async function makeGuess() {
  if (guessed) return;
  const input = document.getElementById('guessInput');
  const guess = input.value.trim();
  if (!guess) return;

  attempts++;
  addHint('你的猜测: ' + guess, 'system');

  // Use AI to evaluate the guess
  try {
    const res = await fetch(AI_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'agnes-2.0-flash',
        messages: [
          { role: 'system', content: 'You are an image description evaluator. Compare the user\'s guess with the actual description. Reply with ONLY a JSON object: {"match": true/false, "similarity": 0-100, "feedback": "brief comment in Chinese"}. Be generous - if the main subject matches, consider it correct.' },
          { role: 'user', content: `Actual description: "${secretPrompt}"\nUser guess: "${guess}"` }
        ],
        temperature: 0.3,
        max_tokens: 100
      })
    });

    const data = await res.json();
    const content = data?.choices?.[0]?.message?.content || '';

    // Parse response
    let result;
    try {
      const jsonMatch = content.match(/\{[\s\S]*\}/);
      result = JSON.parse(jsonMatch ? jsonMatch[0] : content);
    } catch {
      result = { match: content.includes('true'), similarity: 50, feedback: content };
    }

    if (result.match || result.similarity >= 80) {
      guessed = true;
      const points = Math.max(10, 100 - attempts * 15);
      score += points;
      streak++;
      document.getElementById('score').textContent = score;
      document.getElementById('streak').textContent = streak;
      addHint('猜对了! +' + points + ' 分', 'correct');
      input.disabled = true;

      // Show win overlay
      setTimeout(() => {
        document.getElementById('winTitle').textContent = '猜对了!';
        document.getElementById('winMsg').textContent = `答案: ${secretPrompt}\n得分: +${points} | 连胜: ${streak}`;
        document.getElementById('overlay').style.display = 'flex';
      }, 800);
    } else {
      addHint(result.feedback || '不太对，再试试', 'wrong');
      if (attempts >= 3) addHint('提示: 试试描述图片中的主要物体', 'ai');
      if (attempts >= 5) addHint('提示: ' + secretPrompt.split(' ').slice(0, 3).join(' ') + '...', 'ai');
    }
  } catch (e) {
    // Fallback: simple keyword matching
    const guessWords = guess.toLowerCase().split(/\s+/);
    const promptWords = secretPrompt.toLowerCase().split(/\s+/);
    const matches = guessWords.filter(w => promptWords.some(p => p.includes(w) || w.includes(p)));
    const similarity = matches.length / Math.max(guessWords.length, 1) * 100;

    if (similarity >= 60) {
      guessed = true;
      const points = Math.max(10, 100 - attempts * 15);
      score += points;
      streak++;
      document.getElementById('score').textContent = score;
      document.getElementById('streak').textContent = streak;
      addHint('猜对了! +' + points + ' 分', 'correct');
      input.disabled = true;
    } else {
      addHint('不太对，再试试', 'wrong');
    }
  }

  input.value = '';
}

async function getAIHint() {
  if (guessed || !secretPrompt) return;
  addHint('正在获取提示...', 'system');

  try {
    const res = await fetch(AI_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'agnes-2.0-flash',
        messages: [
          { role: 'system', content: 'Give a vague one-sentence hint about the image description without revealing it directly. Use Chinese. Be brief.' },
          { role: 'user', content: `The description is: "${secretPrompt}". Give a hint.` }
        ],
        temperature: 0.8,
        max_tokens: 60
      })
    });
    const data = await res.json();
    const hint = data?.choices?.[0]?.message?.content || '无法获取提示';
    addHint('AI 提示: ' + hint, 'ai');
  } catch {
    addHint('获取提示失败', 'wrong');
  }
}

function skipRound() {
  if (!secretPrompt) return;
  guessed = true;
  streak = 0;
  document.getElementById('streak').textContent = 0;
  document.getElementById('guessInput').disabled = true;
  addHint('答案: ' + secretPrompt, 'system');
}

function closeOverlay() { document.getElementById('overlay').style.display = 'none'; }

newRound();
</script>
<script src="track.js"></script>
</body>
</html>
