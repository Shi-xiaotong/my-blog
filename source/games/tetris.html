<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>俄罗斯方块 - 小游戏</title>
<link rel="stylesheet" href="common.css">
<style>
.game-wrap { display: flex; gap: 20px; justify-content: center; align-items: flex-start; flex-wrap: wrap; }
.main-board { position: relative; }
.main-board canvas { border-radius: 4px; border: 2px solid var(--border); }
.side-panel { display: flex; flex-direction: column; gap: 12px; min-width: 120px; }
.panel-box { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px; text-align: center; }
.panel-box .label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
.panel-box .value { font-size: 20px; font-weight: 700; font-family: 'SF Mono', monospace; color: var(--primary); }
.panel-box canvas { margin: 0 auto; display: block; }
.controls { display: flex; gap: 8px; justify-content: center; margin-top: 16px; flex-wrap: wrap; }
.dpad { display: none; grid-template-columns: repeat(5, 48px); grid-template-rows: repeat(2, 48px); gap: 4px; justify-content: center; margin-top: 12px; }
.dpad button { width: 48px; height: 48px; border: 1px solid var(--border); border-radius: 8px; background: var(--card-bg); color: var(--text); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.dpad button:active { background: var(--primary); color: #fff; }
.dpad .empty { visibility: hidden; }
.tip { text-align: center; font-size: 13px; color: var(--text-secondary); margin-top: 8px; }
.game-over-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.7); display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 4px; z-index: 10; }
.game-over-overlay h2 { font-size: 2em; margin-bottom: 8px; }
.game-over-overlay p { color: var(--text-secondary); margin-bottom: 16px; }
@media (hover: none) and (pointer: coarse) { .dpad { display: grid; } }
@media (max-width: 640px) {
  .side-panel { flex-direction: row; min-width: auto; }
  .panel-box { flex: 1; }
  .main-board canvas { width: 100%; height: auto; }
}
</style>
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
<div class="container">
  <div class="header">
    <a href="/games/" class="back-link"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> 返回游戏</a>
    <h1>俄罗斯方块</h1>
  </div>
  <div class="score-bar">
    <div class="score-item"><div class="score-label">分数</div><div class="score-value" id="score">0</div></div>
    <div class="score-item"><div class="score-label">等级</div><div class="score-value" id="level">1</div></div>
    <div class="score-item"><div class="score-label">消行</div><div class="score-value" id="lines">0</div></div>
    <div class="score-item"><div class="score-label">最高</div><div class="score-value" id="best">0</div></div>
  </div>
  <div class="game-wrap">
    <div class="main-board">
      <canvas id="board" width="300" height="600"></canvas>
      <div class="game-over-overlay" id="gameOver" style="display:none">
        <h2>Game Over</h2>
        <p id="finalScore"></p>
        <button class="btn btn-primary" onclick="newGame()">再来一局</button>
      </div>
    </div>
    <div class="side-panel">
      <div class="panel-box"><div class="label">下一个</div><canvas id="next" width="120" height="120"></canvas></div>
    </div>
  </div>
  <div class="controls">
    <button class="btn btn-primary" onclick="newGame()">新游戏</button>
    <button class="btn btn-outline" id="pauseBtn" onclick="togglePause()">暂停</button>
  </div>
  <div class="dpad">
    <div class="empty"></div>
    <button onclick="rotatePiece()">&#8635;</button>
    <button onclick="hardDrop()">&#8681;</button>
    <button onclick="togglePause()">| |</button>
    <div class="empty"></div>
    <div class="empty"></div>
    <button onclick="movePiece(-1,0)">&#9664;</button>
    <button onclick="movePiece(0,1)">&#9660;</button>
    <button onclick="movePiece(1,0)">&#9654;</button>
    <div class="empty"></div>
  </div>
  <p class="tip">方向键/WASD 移动 | 上/W 旋转 | 空格 硬降</p>
</div>

<script>
function toggleTheme(){const h=document.documentElement;const d=h.getAttribute('data-theme')==='light';h.setAttribute('data-theme',d?'':'light');localStorage.setItem('game-theme',d?'dark':'light');const b=document.querySelector('.theme-toggle');b.innerHTML=d?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>':'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>'}
(function(){const s=localStorage.getItem('game-theme');if(s==='light'){document.documentElement.setAttribute('data-theme','light');document.querySelector('.theme-toggle').innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>'}})()

const COLS = 10, ROWS = 20, CELL = 30;
const COLORS = ['#00f0f0','#f0f000','#a000f0','#f0a000','#00f000','#f00000','#0000f0'];
const SHAPES = [
  [[0,0],[1,0],[2,0],[3,0]], // I
  [[0,0],[1,0],[0,1],[1,1]], // O
  [[1,0],[0,1],[1,1],[2,1]], // T
  [[0,0],[1,0],[1,1],[2,1]], // S
  [[1,0],[2,0],[0,1],[1,1]], // Z
  [[0,0],[0,1],[1,1],[2,1]], // L
  [[2,0],[0,1],[1,1],[2,1]], // J
];

const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');
const nextCanvas = document.getElementById('next');
const nextCtx = nextCanvas.getContext('2d');

let grid, current, currentX, currentY, currentType, nextType;
let score, level, lines, best, paused, gameOver, dropInterval, timer;

function init() {
  best = parseInt(localStorage.getItem('best_tetris')) || 0;
  document.getElementById('best').textContent = best;
  newGame();
}

function newGame() {
  grid = Array.from({length:ROWS}, () => Array(COLS).fill(0));
  score = 0; level = 1; lines = 0; paused = false; gameOver = false;
  dropInterval = 800;
  document.getElementById('gameOver').style.display = 'none';
  document.getElementById('pauseBtn').textContent = '暂停';
  nextType = Math.floor(Math.random() * 7);
  spawnPiece();
  clearInterval(timer);
  timer = setInterval(tick, dropInterval);
  render();
}

function spawnPiece() {
  currentType = nextType;
  nextType = Math.floor(Math.random() * 7);
  current = SHAPES[currentType].map(p => [...p]);
  currentX = 3; currentY = 0;
  if (collides(current, currentX, currentY)) { endGame(); }
  renderNext();
}

function collides(piece, px, py) {
  return piece.some(([x, y]) => {
    const nx = px + x, ny = py + y;
    return nx < 0 || nx >= COLS || ny >= ROWS || (ny >= 0 && grid[ny][nx]);
  });
}

function merge() {
  current.forEach(([x, y]) => {
    const nx = currentX + x, ny = currentY + y;
    if (ny >= 0 && ny < ROWS && nx >= 0 && nx < COLS) grid[ny][nx] = currentType + 1;
  });
}

function clearLines() {
  let cleared = 0;
  for (let r = ROWS - 1; r >= 0; r--) {
    if (grid[r].every(c => c)) { grid.splice(r, 1); grid.unshift(Array(COLS).fill(0)); cleared++; r++; }
  }
  if (cleared) {
    const pts = [0, 100, 300, 500, 800];
    score += (pts[cleared] || 0) * level;
    lines += cleared;
    level = Math.floor(lines / 10) + 1;
    dropInterval = Math.max(50, 800 - (level - 1) * 70);
    clearInterval(timer);
    timer = setInterval(tick, dropInterval);
    document.getElementById('score').textContent = score;
    document.getElementById('level').textContent = level;
    document.getElementById('lines').textContent = lines;
  }
}

function movePiece(dx, dy) {
  if (paused || gameOver) return;
  if (!collides(current, currentX + dx, currentY + dy)) { currentX += dx; currentY += dy; render(); return true; }
  return false;
}

function rotatePiece() {
  if (paused || gameOver) return;
  const rotated = current.map(([x, y]) => [-y, x]);
  // Wall kick
  const kicks = [0, -1, 1, -2, 2];
  for (const kick of kicks) {
    if (!collides(rotated, currentX + kick, currentY)) { current = rotated; currentX += kick; render(); return; }
  }
}

function hardDrop() {
  if (paused || gameOver) return;
  while (movePiece(0, 1)) {}
  lockPiece();
}

function lockPiece() {
  merge();
  clearLines();
  spawnPiece();
  render();
}

function tick() {
  if (paused || gameOver) return;
  if (!movePiece(0, 1)) lockPiece();
}

function togglePause() {
  paused = !paused;
  document.getElementById('pauseBtn').textContent = paused ? '继续' : '暂停';
}

function endGame() {
  gameOver = true;
  clearInterval(timer);
  if (score > best) { best = score; localStorage.setItem('best_tetris', best); }
  document.getElementById('best').textContent = best;
  document.getElementById('finalScore').textContent = '得分: ' + score;
  document.getElementById('gameOver').style.display = 'flex';
}

function render() {
  ctx.fillStyle = '#0f172a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid lines
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  for (let x = 0; x <= COLS; x++) { ctx.beginPath(); ctx.moveTo(x*CELL, 0); ctx.lineTo(x*CELL, ROWS*CELL); ctx.stroke(); }
  for (let y = 0; y <= ROWS; y++) { ctx.beginPath(); ctx.moveTo(0, y*CELL); ctx.lineTo(COLS*CELL, y*CELL); ctx.stroke(); }

  // Locked cells
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    if (grid[r][c]) drawCell(ctx, c, r, COLORS[grid[r][c] - 1]);
  }

  // Ghost piece
  let ghostY = currentY;
  while (!collides(current, currentX, ghostY + 1)) ghostY++;
  if (ghostY !== currentY) {
    current.forEach(([x, y]) => {
      const px = (currentX + x) * CELL, py = (ghostY + y) * CELL;
      ctx.strokeStyle = COLORS[currentType] + '44';
      ctx.lineWidth = 2;
      ctx.strokeRect(px + 1, py + 1, CELL - 2, CELL - 2);
    });
  }

  // Current piece
  current.forEach(([x, y]) => drawCell(ctx, currentX + x, currentY + y, COLORS[currentType]));
}

function drawCell(c, x, y, color) {
  const px = x * CELL, py = y * CELL;
  c.fillStyle = color;
  c.fillRect(px + 1, py + 1, CELL - 2, CELL - 2);
  c.fillStyle = 'rgba(255,255,255,0.2)';
  c.fillRect(px + 1, py + 1, CELL - 2, 3);
  c.fillRect(px + 1, py + 1, 3, CELL - 2);
  c.fillStyle = 'rgba(0,0,0,0.15)';
  c.fillRect(px + 1, py + CELL - 4, CELL - 2, 3);
  c.fillRect(px + CELL - 4, py + 1, 3, CELL - 2);
}

function renderNext() {
  nextCtx.fillStyle = '#0f172a';
  nextCtx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
  const shape = SHAPES[nextType];
  const minX = Math.min(...shape.map(p => p[0]));
  const maxX = Math.max(...shape.map(p => p[0]));
  const minY = Math.min(...shape.map(p => p[1]));
  const maxY = Math.max(...shape.map(p => p[1]));
  const w = maxX - minX + 1, h = maxY - minY + 1;
  const ox = (4 - w) / 2 - minX, oy = (4 - h) / 2 - minY;
  shape.forEach(([x, y]) => drawCell(nextCtx, x + ox, y + oy, COLORS[nextType]));
}

document.addEventListener('keydown', e => {
  if (gameOver) return;
  const map = {ArrowLeft:[-1,0],ArrowRight:[1,0],ArrowDown:[0,1],a:[-1,0],d:[1,0],s:[0,1]};
  if (map[e.key]) { e.preventDefault(); movePiece(...map[e.key]); }
  if (e.key === 'ArrowUp' || e.key === 'w') { e.preventDefault(); rotatePiece(); }
  if (e.key === ' ') { e.preventDefault(); hardDrop(); }
  if (e.key === 'p') { e.preventDefault(); togglePause(); }
});

init();
</script>
<script src="track.js"></script>
</body>
</html>
