<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wordle - 小游戏</title>
<link rel="icon" href="/img/favicon.ico" type="image/x-icon">
<link rel="stylesheet" href="common.css">
<style>
.board { display: grid; grid-template-rows: repeat(6, 1fr); gap: 5px; max-width: 330px; margin: 16px auto; }
.row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
.tile { width: 58px; height: 58px; border: 2px solid var(--border); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 700; text-transform: uppercase; transition: all 0.3s; font-family: 'SF Mono', monospace; }
.tile.filled { border-color: var(--text-secondary); }
.tile.correct { background: #538d4e; border-color: #538d4e; color: #fff; }
.tile.present { background: #b59f3b; border-color: #b59f3b; color: #fff; }
.tile.absent { background: #3a3a3c; border-color: #3a3a3c; color: #fff; }
.tile.reveal { animation: flipIn 0.4s ease; }
@keyframes flipIn { 0% { transform: rotateX(90deg); } 100% { transform: rotateX(0); } }
.tile.pop { animation: pop 0.1s ease; }
@keyframes pop { 50% { transform: scale(1.1); } }
.tile.shake { animation: shake 0.4s ease; }
@keyframes shake { 10%,90% { transform: translateX(-2px); } 30%,70% { transform: translateX(4px); } 50% { transform: translateX(-4px); } }
.keyboard { max-width: 500px; margin: 12px auto; }
.kb-row { display: flex; justify-content: center; gap: 5px; margin-bottom: 5px; }
.key { min-width: 36px; height: 52px; border: none; border-radius: 4px; background: #818384; color: #fff; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; font-family: inherit; }
.key.wide { min-width: 56px; font-size: 11px; }
.key:active { filter: brightness(0.8); }
.key.correct { background: #538d4e; }
.key.present { background: #b59f3b; }
.key.absent { background: #3a3a3c; }
.message { text-align: center; height: 30px; line-height: 30px; font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
.stats-row { display: flex; gap: 24px; justify-content: center; margin: 16px 0; }
.stat { text-align: center; }
.stat .num { font-size: 28px; font-weight: 700; font-family: 'SF Mono', monospace; color: var(--primary); }
.stat .lbl { font-size: 11px; color: var(--text-secondary); }
.dist-bar { display: flex; align-items: center; gap: 8px; margin: 4px 0; font-size: 13px; }
.dist-bar .label { width: 10px; text-align: right; font-family: 'SF Mono', monospace; }
.dist-bar .bar { height: 18px; min-width: 20px; background: var(--primary); border-radius: 3px; display: flex; align-items: center; padding: 0 4px; color: #fff; font-size: 12px; font-weight: 600; }
.win-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 100; }
.win-box { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 32px; text-align: center; max-width: 360px; width: 90%; }
.win-box h2 { margin-bottom: 12px; }
.win-box p { color: var(--text-secondary); margin-bottom: 16px; }
.share-btn { padding: 10px 24px; background: #538d4e; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; margin: 8px 4px; }
@media (max-width: 400px) { .tile { width: 50px; height: 50px; font-size: 24px; } .key { min-width: 28px; height: 46px; font-size: 12px; } }
</style>
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
<div class="container">
  <div class="header">
    <a href="/games/" class="back-link"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> 返回游戏</a>
    <h1>Wordle</h1>
  </div>
  <div class="message" id="message"></div>
  <div class="board" id="board"></div>
  <div class="keyboard" id="keyboard">
    <div class="kb-row"><button class="key" onclick="pressKey('q')">Q</button><button class="key" onclick="pressKey('w')">W</button><button class="key" onclick="pressKey('e')">E</button><button class="key" onclick="pressKey('r')">R</button><button class="key" onclick="pressKey('t')">T</button><button class="key" onclick="pressKey('y')">Y</button><button class="key" onclick="pressKey('u')">U</button><button class="key" onclick="pressKey('i')">I</button><button class="key" onclick="pressKey('o')">O</button><button class="key" onclick="pressKey('p')">P</button></div>
    <div class="kb-row"><button class="key" onclick="pressKey('a')">A</button><button class="key" onclick="pressKey('s')">S</button><button class="key" onclick="pressKey('d')">D</button><button class="key" onclick="pressKey('f')">F</button><button class="key" onclick="pressKey('g')">G</button><button class="key" onclick="pressKey('h')">H</button><button class="key" onclick="pressKey('j')">J</button><button class="key" onclick="pressKey('k')">K</button><button class="key" onclick="pressKey('l')">L</button></div>
    <div class="kb-row"><button class="key wide" onclick="submitGuess()">ENTER</button><button class="key" onclick="pressKey('z')">Z</button><button class="key" onclick="pressKey('x')">X</button><button class="key" onclick="pressKey('c')">C</button><button class="key" onclick="pressKey('v')">V</button><button class="key" onclick="pressKey('b')">B</button><button class="key" onclick="pressKey('n')">N</button><button class="key" onclick="pressKey('m')">M</button><button class="key wide" onclick="deleteKey()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/><line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/></svg></button></div>
  </div>
  <div style="text-align:center;margin-top:12px"><button class="btn btn-outline" onclick="showStats()">统计</button> <button class="btn btn-outline" onclick="newGame()">新游戏</button></div>
</div>

<div class="win-overlay" id="overlay" style="display:none">
  <div class="win-box">
    <h2 id="overlayTitle"></h2>
    <p id="overlayMsg"></p>
    <div class="stats-row" id="overlayStats"></div>
    <div id="overlayDist"></div>
    <div style="margin-top:16px">
      <button class="share-btn" onclick="shareResult()">分享结果</button>
      <button class="btn btn-outline" onclick="closeOverlay()">关闭</button>
    </div>
  </div>
</div>

<script>
function toggleTheme(){const h=document.documentElement;const d=h.getAttribute('data-theme')==='light';h.setAttribute('data-theme',d?'':'light');localStorage.setItem('game-theme',d?'dark':'light');const b=document.querySelector('.theme-toggle');b.innerHTML=d?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>':'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>'}
(function(){const s=localStorage.getItem('game-theme');if(s==='light'){document.documentElement.setAttribute('data-theme','light');document.querySelector('.theme-toggle').innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>'}})()

// Word list (common 5-letter English words)
const WORDS = "about,above,abuse,actor,acute,admit,adopt,adult,after,again,agent,agree,ahead,alarm,album,alert,alien,align,alive,alley,allow,alone,along,alter,among,angel,anger,angle,angry,anime,ankle,annex,antic,apart,apple,apply,arena,argue,arise,armor,array,arrow,aside,asset,atlas,avoid,awake,award,aware,badge,badly,basic,basin,basis,batch,beach,began,begin,being,below,bench,berry,birth,black,blade,blame,bland,blank,blast,blaze,bleed,blend,bless,blind,block,bloom,blown,blues,blunt,board,boast,bones,boost,booth,bound,brain,brand,brave,bread,break,breed,brick,bride,brief,bring,broad,broke,brown,brush,build,bunch,burst,buyer,cabin,cable,candy,cargo,carry,catch,cause,cease,chain,chair,champ,chaos,charm,chart,chase,cheap,check,cheek,cheer,chess,chest,chief,child,chill,china,chunk,civic,civil,claim,class,clean,clear,climb,cling,clock,clone,close,cloud,coach,coast,color,comet,coral,could,count,court,cover,crack,craft,crane,crash,crazy,cream,creek,crime,cross,crowd,crown,crude,crush,curve,cycle,daily,dance,dealt,death,debut,delay,depot,depth,derby,devil,diary,digit,donor,doubt,dough,draft,drain,drama,drank,drape,drawn,dread,dream,dress,dried,drift,drill,drink,drive,droit,drove,drunk,dryer,duchy,dying,eager,eagle,early,earth,eaten,eight,elder,elect,elite,embed,empty,enemy,enjoy,enter,equal,error,essay,event,every,exact,exert,exist,extra,fable,faint,fairy,faith,false,fault,feast,fence,ferry,fetch,fever,fiber,field,fifth,fifty,fight,final,first,fixed,flame,flash,flask,flesh,flick,fling,flint,float,flock,flood,floor,flora,flour,fluid,flush,flute,focal,focus,force,forge,forth,forum,found,frame,frank,fraud,fresh,front,frost,froze,fruit,fully,funds,fused,gauge,genre,giant,given,gland,glare,glass,gleam,glide,globe,gloom,glory,gloss,glove,going,grace,grade,grain,grand,grant,grape,graph,grasp,grass,grave,gravel,great,greed,green,greet,grief,grill,grind,groan,groom,gross,group,grove,grown,guard,guess,guest,guide,guild,guilt,guise,habit,happy,harsh,haste,haven,heart,heavy,hedge,hence,hobby,homer,horse,hotel,house,human,humor,hurry,image,imply,incur,index,indie,input,issue,ivory,jewel,joint,joker,judge,juice,known,label,labor,large,laser,later,laugh,layer,learn,lease,least,leave,legal,lemon,level,lever,light,limit,linen,liver,lobby,local,lodge,logic,login,loose,lover,lower,lucky,lunch,lungly,luxury,lying,magic,major,maker,manor,maple,march,marry,mason,match,mayor,media,mercy,merit,metal,meter,midst,might,minor,minus,mirth,model,money,month,moral,motor,mount,mouse,mouth,movie,music,naive,nerve,never,newly,niche,night,noble,noise,north,noted,novel,nurse,nylon,occur,ocean,offer,often,olive,onset,optic,orbit,order,organ,other,outer,oxide,ozone,paint,panel,panic,paper,party,paste,patch,pause,peace,pearl,penny,phase,phone,photo,piano,piece,pilot,pinch,pitch,pixel,place,plain,plane,plant,plate,plaza,plead,pluck,plumb,plume,plump,plunge,point,polar,pound,power,press,price,pride,prime,prince,print,prior,prize,probe,promo,prone,proof,proud,prove,psalm,pulse,pupil,purge,queen,query,quest,queue,quick,quiet,quota,quote,radar,radio,raise,rally,ranch,range,rapid,ratio,reach,react,ready,realm,rebel,refer,reign,relax,relay,renew,repay,reply,rider,rifle,right,rigid,risky,rival,river,roast,robot,rocky,rouge,rough,round,route,royal,rugby,ruler,rural,sadly,saint,salad,sauce,scale,scare,scene,scent,scope,score,scout,scrap,sense,serve,setup,seven,shade,shaft,shake,shall,shame,shape,share,shark,sharp,shave,shear,sheep,sheer,sheet,shelf,shell,shift,shine,shirt,shock,shoot,shore,short,shout,shove,shown,shrub,siege,sight,since,sixth,sixty,sized,skill,skull,slate,slave,sleek,sleep,slice,slide,slope,small,smart,smell,smile,smoke,snake,solar,solid,solve,sorry,sound,south,space,spare,spark,speak,speed,spend,spent,spice,spine,split,spoke,spoon,sport,spray,squad,stack,staff,stage,stain,stair,stake,stale,stall,stamp,stand,stare,stark,start,state,stays,steak,steal,steam,steel,steep,steer,stern,stick,stiff,still,stock,stoic,stoke,stole,stomp,stone,stood,stool,store,storm,story,stout,stove,strap,straw,stray,strip,stuck,study,stuff,stump,stung,stunt,style,sugar,suite,sunny,super,surge,swamp,swear,sweat,sweep,sweet,swept,swift,swing,sword,swore,sworn,swung,table,taken,taste,teach,teens,tempo,tense,tenth,terms,theft,theme,there,thick,thief,thing,think,third,thorn,those,three,threw,throw,thumb,tiger,tight,tired,title,toast,today,token,total,touch,tough,towel,tower,toxic,trace,track,trail,train,trait,trash,treat,trend,trial,tribe,trick,tried,troop,trout,truck,truly,trunk,trust,truth,tumor,twice,twist,tying,ultra,uncle,under,union,unite,unity,until,upper,upset,urban,usage,usual,utter,vague,valid,value,valve,vault,venue,verse,video,vigor,viola,vinyl,viral,virus,visit,visor,vista,vital,vivid,vocal,vodka,voice,voter,vowel,vulgar,wagon,waist,waste,watch,water,weary,weave,wedge,weigh,weird,wheat,wheel,where,which,while,white,whole,whose,widen,width,witch,woman,world,worry,worse,worst,worth,would,wound,wreak,wrist,write,wrong,wrote,yacht,yearn,yield,young,yours,youth,zebra".split(",");

let target, guesses, currentRow, currentCol, gameOver, won;
let keyStates = {};
let stats;

function init() {
  stats = JSON.parse(localStorage.getItem('wordle_stats') || '{"played":0,"won":0,"streak":0,"maxStreak":0,"dist":[0,0,0,0,0,0]}');
  newGame();
}

function getDailyWord() {
  const today = new Date();
  const dayNum = Math.floor(today.getTime() / 86400000);
  return WORDS[dayNum % WORDS.length].toUpperCase();
}

function newGame() {
  target = getDailyWord();
  guesses = [];
  currentRow = 0;
  currentCol = 0;
  gameOver = false;
  won = false;
  keyStates = {};
  renderBoard();
  renderKeyboard();
  document.getElementById('message').textContent = '';
}

function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = Array.from({length: 6}, (_, r) => {
    const tiles = Array.from({length: 5}, (_, c) => {
      const letter = guesses[r] ? guesses[r][c] || '' : '';
      const state = guesses[r] ? getTileState(r, c) : '';
      return `<div class="tile ${state} ${letter ? 'filled' : ''}">${letter}</div>`;
    }).join('');
    return `<div class="row">${tiles}</div>`;
  }).join('');
}

function getTileState(row, col) {
  const guess = guesses[row];
  if (!guess) return '';
  const letter = guess[col];
  if (letter === target[col]) return 'correct';
  if (target.includes(letter)) return 'present';
  return 'absent';
}

function renderKeyboard() {
  const rows = ['qwertyuiop','asdfghjkl','zxcvbnm'];
  rows.forEach(row => {
    row.split('').forEach(letter => {
      const key = document.querySelector(`.key[onclick="pressKey('${letter}')"]`);
      if (key) {
        key.className = 'key';
        if (keyStates[letter]) key.classList.add(keyStates[letter]);
      }
    });
  });
}

function pressKey(letter) {
  if (gameOver || currentCol >= 5) return;
  const tiles = document.querySelectorAll('.row')[currentRow].querySelectorAll('.tile');
  tiles[currentCol].textContent = letter.toUpperCase();
  tiles[currentCol].classList.add('filled');
  currentCol++;
  // Pop animation
  tiles[currentCol - 1].classList.add('pop');
  setTimeout(() => tiles[currentCol - 1].classList.remove('pop'), 100);
}

function deleteKey() {
  if (gameOver || currentCol <= 0) return;
  currentCol--;
  const tiles = document.querySelectorAll('.row')[currentRow].querySelectorAll('.tile');
  tiles[currentCol].textContent = '';
  tiles[currentCol].classList.remove('filled');
}

function submitGuess() {
  if (gameOver) return;
  if (currentCol < 5) {
    shakeRow();
    showMessage('字母不够');
    return;
  }
  const tiles = document.querySelectorAll('.row')[currentRow].querySelectorAll('.tile');
  const guess = Array.from(tiles).map(t => t.textContent).join('');

  // Check if it's a valid word (simple check: 5 letters)
  if (!WORDS.includes(guess.toLowerCase())) {
    shakeRow();
    showMessage('不在词库中');
    return;
  }

  guesses.push(guess);

  // Reveal tiles with animation
  const targetArr = target.split('');
  const guessArr = guess.split('');
  const result = Array(5).fill('absent');

  // First pass: correct
  for (let i = 0; i < 5; i++) {
    if (guessArr[i] === targetArr[i]) { result[i] = 'correct'; targetArr[i] = null; }
  }
  // Second pass: present
  for (let i = 0; i < 5; i++) {
    if (result[i] === 'correct') continue;
    const idx = targetArr.indexOf(guessArr[i]);
    if (idx !== -1) { result[i] = 'present'; targetArr[idx] = null; }
  }

  // Update key states
  guessArr.forEach((letter, i) => {
    const current = keyStates[letter.toLowerCase()];
    if (result[i] === 'correct') keyStates[letter.toLowerCase()] = 'correct';
    else if (result[i] === 'present' && current !== 'correct') keyStates[letter.toLowerCase()] = 'present';
    else if (!current) keyStates[letter.toLowerCase()] = 'absent';
  });

  // Animate reveal
  tiles.forEach((tile, i) => {
    setTimeout(() => {
      tile.classList.add('reveal', result[i]);
    }, i * 100);
  });

  setTimeout(() => {
    renderKeyboard();

    if (guess === target) {
      won = true;
      gameOver = true;
      const messages = ['Genius', 'Magnificent', 'Impressive', 'Splendid', 'Great', 'Phew'];
      showMessage(messages[currentRow] || 'Nice!');
      saveStats(true);
      setTimeout(() => showOverlay(true), 1200);
    } else if (currentRow >= 5) {
      gameOver = true;
      showMessage(target);
      saveStats(false);
      setTimeout(() => showOverlay(false), 1200);
    }
    currentRow++;
    currentCol = 0;
  }, 550);
}

function shakeRow() {
  const row = document.querySelectorAll('.row')[currentRow];
  row.classList.add('shake');
  setTimeout(() => row.classList.remove('shake'), 400);
}

function showMessage(msg) {
  const el = document.getElementById('message');
  el.textContent = msg;
  setTimeout(() => { if (el.textContent === msg) el.textContent = ''; }, 2000);
}

function saveStats(win) {
  stats.played++;
  if (win) {
    stats.won++;
    stats.streak++;
    stats.maxStreak = Math.max(stats.maxStreak, stats.streak);
    stats.dist[currentRow - 1]++;
  } else {
    stats.streak = 0;
  }
  localStorage.setItem('wordle_stats', JSON.stringify(stats));
}

function showOverlay(win) {
  const el = document.getElementById('overlay');
  document.getElementById('overlayTitle').textContent = win ? '恭喜!' : '游戏结束';
  document.getElementById('overlayMsg').textContent = win ? `你用了 ${currentRow} 次猜对` : `答案是: ${target}`;
  document.getElementById('overlayStats').innerHTML =
    `<div class="stat"><div class="num">${stats.played}</div><div class="lbl">场次</div></div>` +
    `<div class="stat"><div class="num">${stats.played ? Math.round(stats.won/stats.played*100) : 0}%</div><div class="lbl">胜率</div></div>` +
    `<div class="stat"><div class="num">${stats.streak}</div><div class="lbl">连胜</div></div>` +
    `<div class="stat"><div class="num">${stats.maxStreak}</div><div class="lbl">最大连胜</div></div>`;
  const maxDist = Math.max(...stats.dist, 1);
  document.getElementById('overlayDist').innerHTML = stats.dist.map((n, i) =>
    `<div class="dist-bar"><span class="label">${i+1}</span><div class="bar" style="width:${Math.max(n/maxDist*100, 8)}%">${n}</div></div>`
  ).join('');
  el.style.display = 'flex';
}

function showStats() { showOverlay(won); }
function closeOverlay() { document.getElementById('overlay').style.display = 'none'; }

function shareResult() {
  const squares = guesses.map((guess, row) => {
    if (row >= (gameOver && won ? currentRow : currentRow)) return '';
    return guess.split('').map((letter, col) => {
      const state = getTileState(row, col);
      return state === 'correct' ? '🟩' : state === 'present' ? '🟨' : '⬛';
    }).join('');
  }).filter(Boolean).join('\n');
  const text = `Wordle ${won ? currentRow : 'X'}/6\n\n${squares}`;
  navigator.clipboard.writeText(text).then(() => showMessage('已复制到剪贴板'));
}

document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  if (e.key === 'Enter') { e.preventDefault(); submitGuess(); }
  else if (e.key === 'Backspace') { e.preventDefault(); deleteKey(); }
  else if (/^[a-zA-Z]$/.test(e.key)) { pressKey(e.key.toLowerCase()); }
});

init();
</script>
<script src="track.js"></script>
</body>
