<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 绘画猜谜 - 小游戏</title>
<link rel="stylesheet" href="common.css">
<style>
.game-container { max-width: 600px; margin: 0 auto; }
.canvas-wrap { display: flex; justify-content: center; margin: 12px 0; }
.canvas-wrap canvas { border: 2px solid var(--border); border-radius: 8px; cursor: crosshair; touch-action: none; background: #fff; }
.draw-tools { display: flex; gap: 8px; justify-content: center; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
.draw-tools .color-btn { width: 28px; height: 28px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; }
.draw-tools .color-btn.active { border-color: var(--text); box-shadow: 0 0 0 2px var(--bg); }
.draw-tools .size-btn { padding: 4px 10px; border: 1px solid var(--border); border-radius: 6px; background: var(--card-bg); color: var(--text); font-size: 12px; cursor: pointer; }
.draw-tools .size-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
.word-display { text-align: center; font-size: 24px; font-weight: 700; color: var(--primary); margin: 12px 0; padding: 12px; background: var(--primary-light); border-radius: 8px; }
.ai-guess-area { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin: 12px 0; min-height: 80px; }
.ai-guess-area .label { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; }
.ai-guess-area .guess-text { font-size: 16px; font-weight: 600; min-height: 24px; }
.ai-guess-area .guess-text.correct { color: var(--accent); }
.ai-guess-area .guess-text.wrong { color: var(--danger); }
.timer-bar { height: 6px; background: var(--border); border-radius: 3px; margin: 8px 0; overflow: hidden; }
.timer-bar .fill { height: 100%; background: var(--primary); border-radius: 3px; transition: width 1s linear; }
.timer-bar .fill.warning { background: var(--warning); }
.timer-bar .fill.danger { background: var(--danger); }
.loading { display: flex; align-items: center; gap: 8px; color: var(--text-secondary); }
.loading .spinner { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.win-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 100; }
.win-box { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 32px; text-align: center; max-width: 360px; }
.win-box h2 { margin-bottom: 8px; }
.win-box p { color: var(--text-secondary); margin-bottom: 16px; }
@media (max-width: 500px) { .canvas-wrap canvas { width: 100%; height: auto; } }
</style>
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
<div class="container">
  <div class="header">
    <a href="/games/" class="back-link"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> 返回游戏</a>
    <h1>AI 绘画猜谜</h1>
  </div>
  <div class="game-container">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div>得分: <strong id="score">0</strong></div>
      <div>轮次: <strong id="round">0</strong></div>
    </div>
    <div class="timer-bar"><div class="fill" id="timerFill" style="width:100%"></div></div>

    <div class="word-display" id="wordDisplay">点击「新的一轮」开始</div>

    <div class="draw-tools" id="drawTools">
      <div class="color-btn active" style="background:#000" onclick="setColor('#000')"></div>
      <div class="color-btn" style="background:#ef4444" onclick="setColor('#ef4444')"></div>
      <div class="color-btn" style="background:#3b82f6" onclick="setColor('#3b82f6')"></div>
      <div class="color-btn" style="background:#22c55e" onclick="setColor('#22c55e')"></div>
      <div class="color-btn" style="background:#f59e0b" onclick="setColor('#f59e0b')"></div>
      <div class="color-btn" style="background:#a855f7" onclick="setColor('#a855f7')"></div>
      <div style="width:1px;height:20px;background:var(--border)"></div>
      <button class="size-btn active" onclick="setSize(3)">细</button>
      <button class="size-btn" onclick="setSize(6)">中</button>
      <button class="size-btn" onclick="setSize(12)">粗</button>
      <div style="width:1px;height:20px;background:var(--border)"></div>
      <button class="size-btn" onclick="clearCanvas()">清空</button>
    </div>

    <div class="canvas-wrap">
      <canvas id="canvas" width="400" height="400"></canvas>
    </div>

    <div class="ai-guess-area">
      <div class="label">AI 猜测</div>
      <div class="guess-text" id="aiGuess">等待你开始画...</div>
    </div>

    <div style="display:flex;gap:8px;justify-content:center">
      <button class="btn btn-primary" onclick="newRound()">新的一轮</button>
      <button class="btn btn-outline" onclick="askAI()">让 AI 猜</button>
      <button class="btn btn-outline" onclick="skipRound()">跳过</button>
    </div>
    <p class="tip">画出提示词，让 AI 来猜！限时 60 秒</p>
  </div>
</div>

<div class="win-overlay" id="overlay" style="display:none">
  <div class="win-box">
    <h2 id="winTitle"></h2>
    <p id="winMsg"></p>
    <button class="btn btn-primary" onclick="closeOverlay();newRound()">再来一轮</button>
  </div>
</div>

<script>
function toggleTheme(){const h=document.documentElement;const d=h.getAttribute('data-theme')==='light';h.setAttribute('data-theme',d?'':'light');localStorage.setItem('game-theme',d?'dark':'light');const b=document.querySelector('.theme-toggle');b.innerHTML=d?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>':'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>'}
(function(){const s=localStorage.getItem('game-theme');if(s==='light'){document.documentElement.setAttribute('data-theme','light');document.querySelector('.theme-toggle').innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>'}})()

const AI_ENDPOINT = 'https://ai.233002.xyz';
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const WORDS = [
  '太阳', '月亮', '星星', '山', '树', '花', '房子', '猫', '狗', '鱼', '鸟', '汽车', '飞机', '船',
  '苹果', '香蕉', '西瓜', '蛋糕', '冰淇淋', '咖啡', '披萨', '汉堡',
  '太阳镜', '雨伞', '时钟', '钥匙', '书', '吉他', '足球', '篮球',
  '笑脸', '爱心', '闪电', '彩虹', '云', '雪人', '蝴蝶', '蜗牛',
  '钻石', '皇冠', '火箭', '机器人', '恐龙', '独角兽', '美人鱼', '超人',
  '铅笔', '剪刀', '灯泡', '电话', '电脑', '相机', '望远镜', '显微镜',
];

let currentWord = '', score = 0, round = 0, timer = null, timeLeft = 60, drawing = false, guessed = false;
let currentColor = '#000', currentSize = 3;

ctx.fillStyle = '#fff';
ctx.fillRect(0, 0, canvas.width, canvas.height);
ctx.lineCap = 'round';
ctx.lineJoin = 'round';

function setColor(c) {
  currentColor = c;
  document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.color-btn[style*="${c}"]`)?.classList.add('active');
}

function setSize(s) {
  currentSize = s;
  document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.size-btn')[s === 3 ? 0 : s === 6 ? 1 : 2].classList.add('active');
}

function clearCanvas() {
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX || e.touches?.[0]?.clientX) - rect.left;
  const y = (e.clientY || e.touches?.[0]?.clientY) - rect.top;
  return { x: x * (canvas.width / rect.width), y: y * (canvas.height / rect.height) };
}

canvas.addEventListener('mousedown', e => { drawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); });
canvas.addEventListener('mousemove', e => { if (!drawing) return; const p = getPos(e); ctx.strokeStyle = currentColor; ctx.lineWidth = currentSize; ctx.lineTo(p.x, p.y); ctx.stroke(); });
canvas.addEventListener('mouseup', () => drawing = false);
canvas.addEventListener('mouseleave', () => drawing = false);
canvas.addEventListener('touchstart', e => { e.preventDefault(); drawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); }, {passive:false});
canvas.addEventListener('touchmove', e => { e.preventDefault(); if (!drawing) return; const p = getPos(e); ctx.strokeStyle = currentColor; ctx.lineWidth = currentSize; ctx.lineTo(p.x, p.y); ctx.stroke(); }, {passive:false});
canvas.addEventListener('touchend', () => drawing = false);

function newRound() {
  round++;
  guessed = false;
  timeLeft = 60;
  currentWord = WORDS[Math.floor(Math.random() * WORDS.length)];
  document.getElementById('round').textContent = round;
  document.getElementById('wordDisplay').textContent = '画这个: ' + currentWord;
  document.getElementById('aiGuess').textContent = '等待你开始画...';
  document.getElementById('aiGuess').className = 'guess-text';
  document.getElementById('overlay').style.display = 'none';
  clearCanvas();

  clearInterval(timer);
  document.getElementById('timerFill').style.width = '100%';
  document.getElementById('timerFill').className = 'fill';
  timer = setInterval(() => {
    timeLeft--;
    const pct = (timeLeft / 60) * 100;
    const fill = document.getElementById('timerFill');
    fill.style.width = pct + '%';
    fill.className = 'fill' + (pct < 20 ? ' danger' : pct < 40 ? ' warning' : '');
    if (timeLeft <= 0) { clearInterval(timer); if (!guessed) { skipRound(); } }
  }, 1000);
}

async function askAI() {
  if (guessed) return;
  const guessEl = document.getElementById('aiGuess');
  guessEl.innerHTML = '<span class="loading"><span class="spinner"></span>AI 正在看图...</span>';

  try {
    const base64 = canvas.toDataURL('image/png').split(',')[1];
    const res = await fetch(AI_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'agnes-2.0-flash',
        messages: [
          { role: 'system', content: 'You are looking at a simple drawing/sketch. Guess what it depicts in ONE or TWO Chinese words only. Just output the guess, nothing else.' },
          { role: 'user', content: [
            { type: 'text', text: 'What is this drawing of?' },
            { type: 'image_url', image_url: { url: 'data:image/png;base64,' + base64 } }
          ]}
        ],
        temperature: 0.3,
        max_tokens: 20
      })
    });

    const data = await res.json();
    const guess = (data?.choices?.[0]?.message?.content || '').trim().replace(/[。！？.\s]/g, '');

    guessEl.textContent = 'AI 猜: ' + guess;

    // Check if correct
    const wordLower = currentWord.toLowerCase();
    const guessLower = guess.toLowerCase();
    if (guessLower.includes(wordLower) || wordLower.includes(guessLower) || guessLower === wordLower) {
      guessed = true;
      clearInterval(timer);
      const points = Math.max(10, timeLeft + 20);
      score += points;
      document.getElementById('score').textContent = score;
      guessEl.className = 'guess-text correct';
      guessEl.textContent = 'AI 猜对了! ' + guess + ' (+' + points + ' 分)';
      setTimeout(() => {
        document.getElementById('winTitle').textContent = 'AI 猜对了!';
        document.getElementById('winMsg').textContent = `答案: ${currentWord} | 得分: +${points}`;
        document.getElementById('overlay').style.display = 'flex';
      }, 800);
    } else {
      guessEl.className = 'guess-text wrong';
      guessEl.textContent = 'AI 猜: ' + guess + ' (不对，继续画)';
    }
  } catch (e) {
    guessEl.textContent = 'AI 识别失败: ' + e.message;
    guessEl.className = 'guess-text wrong';
  }
}

function skipRound() {
  if (guessed) return;
  guessed = true;
  clearInterval(timer);
  document.getElementById('aiGuess').textContent = '答案: ' + currentWord;
  document.getElementById('aiGuess').className = 'guess-text';
}

function closeOverlay() { document.getElementById('overlay').style.display = 'none'; }

newRound();
</script>
<script src="track.js"></script>
</body>
</html>
