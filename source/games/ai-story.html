<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 故事接龙 - 小游戏</title>
<link rel="icon" href="/img/favicon.ico" type="image/x-icon">
<link rel="stylesheet" href="common.css">
<style>
.game-container { max-width: 600px; margin: 0 auto; }
.story-area { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 16px; max-height: 400px; overflow-y: auto; margin-bottom: 12px; }
.story-segment { margin-bottom: 12px; padding: 10px 14px; border-radius: 8px; font-size: 14px; line-height: 1.8; }
.story-segment.ai { background: var(--bg); border: 1px solid var(--border); }
.story-segment.user { background: var(--primary-light); border: 1px solid var(--primary); }
.story-segment .author { font-size: 12px; font-weight: 600; margin-bottom: 4px; }
.story-segment.ai .author { color: var(--primary); }
.story-segment.user .author { color: var(--accent); }
.story-segment .score-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; margin-left: 8px; }
.story-segment .score-badge.high { background: #14532d; color: #22c55e; }
.story-segment .score-badge.mid { background: #78350f; color: #fbbf24; }
.story-segment .score-badge.low { background: #7f1d1d; color: #fca5a5; }
.input-area { margin-bottom: 12px; }
.input-area textarea { min-height: 80px; resize: vertical; font-size: 14px; line-height: 1.6; }
.status-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-size: 14px; }
.genre-select { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; margin-bottom: 16px; }
.genre-btn { padding: 6px 14px; border: 1px solid var(--border); border-radius: 8px; background: var(--card-bg); color: var(--text); font-size: 12px; cursor: pointer; }
.genre-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
.win-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 100; }
.win-box { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 32px; text-align: center; max-width: 400px; width: 90%; }
.win-box h2 { margin-bottom: 8px; }
.win-box p { color: var(--text-secondary); margin-bottom: 16px; }
</style>
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
<div class="container">
  <div class="header">
    <a href="/games/" class="back-link"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> 返回游戏</a>
    <h1>AI 故事接龙</h1>
  </div>
  <div class="game-container">
    <div class="status-bar">
      <div>得分: <strong id="score">0</strong> | 回合: <strong id="round">0</strong></div>
      <div>AI 评分标准: 创意、连贯、文采</div>
    </div>

    <div class="genre-select">
      <button class="genre-btn active" onclick="setGenre('fantasy')">奇幻</button>
      <button class="genre-btn" onclick="setGenre('scifi')">科幻</button>
      <button class="genre-btn" onclick="setGenre('mystery')">悬疑</button>
      <button class="genre-btn" onclick="setGenre('romance')">言情</button>
      <button class="genre-btn" onclick="setGenre('horror')">恐怖</button>
      <button class="genre-btn" onclick="setGenre('wuxia')">武侠</button>
    </div>

    <div class="story-area" id="storyArea"></div>

    <div class="input-area">
      <textarea id="storyInput" placeholder="接下去写... 发挥你的想象力！" onkeydown="if(event.ctrlKey&&event.key==='Enter')submitSegment()"></textarea>
    </div>

    <div style="display:flex;gap:8px;justify-content:center">
      <button class="btn btn-primary" onclick="newStory()">新故事</button>
      <button class="btn btn-primary" onclick="submitSegment()">我来写 (Ctrl+Enter)</button>
      <button class="btn btn-outline" onclick="aiContinue()">AI 继续</button>
      <button class="btn btn-outline" onclick="endStory()">结束故事</button>
    </div>
    <p class="tip">和 AI 一起写故事，AI 会给你的续写打分！</p>
  </div>
</div>

<div class="win-overlay" id="overlay" style="display:none">
  <div class="win-box">
    <h2 id="winTitle"></h2>
    <p id="winMsg"></p>
    <div id="fullStory" style="max-height:200px;overflow-y:auto;text-align:left;font-size:13px;line-height:1.8;margin:12px 0;padding:12px;background:var(--bg);border-radius:8px"></div>
    <button class="btn btn-primary" onclick="closeOverlay();newStory()">新故事</button>
  </div>
</div>

<script>
function toggleTheme(){const h=document.documentElement;const d=h.getAttribute('data-theme')==='light';h.setAttribute('data-theme',d?'':'light');localStorage.setItem('game-theme',d?'dark':'light');const b=document.querySelector('.theme-toggle');b.innerHTML=d?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>':'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>'}
(function(){const s=localStorage.getItem('game-theme');if(s==='light'){document.documentElement.setAttribute('data-theme','light');document.querySelector('.theme-toggle').innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>'}})()

const AI_ENDPOINT = 'https://ai.233002.xyz';
let genre = 'fantasy', score = 0, round = 0, storySegments = [], storyEnded = false;

const GENRES = {
  fantasy: '奇幻冒险', scifi: '科幻未来', mystery: '悬疑推理',
  romance: '浪漫爱情', horror: '恐怖惊悚', wuxia: '武侠江湖'
};

function setGenre(g) {
  genre = g;
  document.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.genre-btn[onclick="setGenre('${g}')"]`).classList.add('active');
}

function addSegment(author, text, scoreVal) {
  const el = document.getElementById('storyArea');
  const div = document.createElement('div');
  div.className = 'story-segment ' + (author === 'AI' ? 'ai' : 'user');
  let scoreHtml = '';
  if (scoreVal !== undefined && scoreVal !== null) {
    const cls = scoreVal >= 8 ? 'high' : scoreVal >= 5 ? 'mid' : 'low';
    scoreHtml = `<span class="score-badge ${cls}">${scoreVal}/10</span>`;
  }
  div.innerHTML = `<div class="author">${author}${scoreHtml}</div><div>${text}</div>`;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
  storySegments.push({ author, text });
}

async function newStory() {
  round = 0;
  storySegments = [];
  storyEnded = false;
  document.getElementById('storyArea').innerHTML = '';
  document.getElementById('storyInput').value = '';
  document.getElementById('overlay').style.display = 'none';

  addSegment('系统', `题材: ${GENRES[genre]} | AI 正在构思开头...`);

  try {
    const res = await fetch(AI_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'agnes-2.0-flash',
        messages: [
          { role: 'system', content: `你是一个创意写作AI。写一个${GENRES[genre]}故事的开头，2-3句话，设置悬念，让玩家能接着写。只输出故事内容，不要其他说明。` },
          { role: 'user', content: '开始一个故事' }
        ],
        temperature: 1.0,
        max_tokens: 200
      })
    });

    const data = await res.json();
    const opening = data?.choices?.[0]?.message?.content || '从前有座山...';
    // Remove the system message
    document.getElementById('storyArea').innerHTML = '';
    storySegments = [];
    addSegment('AI', opening);
  } catch {
    document.getElementById('storyArea').innerHTML = '';
    storySegments = [];
    addSegment('AI', '从前有座山，山里有座庙，庙里有个老和尚在讲故事...');
  }
}

async function submitSegment() {
  if (storyEnded) return;
  const input = document.getElementById('storyInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  round++;

  addSegment('你', text);

  // AI evaluates and continues
  const storyContext = storySegments.map(s => `${s.author}: ${s.text}`).join('\n');

  try {
    const res = await fetch(AI_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'agnes-2.0-flash',
        messages: [
          { role: 'system', content: `你是故事接龙的AI伙伴。玩家续写了故事，你需要：
1. 给玩家的续写打分(1-10)，考虑创意、连贯性、文采
2. 然后续写2-3句话推进故事
回复格式严格为JSON: {"score": 数字, "comment": "一句话点评", "continuation": "你的续写"}` },
          { role: 'user', content: `故事背景: ${GENRES[genre]}\n\n${storyContext}\n\n请评价最后一段并继续。` }
        ],
        temperature: 0.9,
        max_tokens: 300
      })
    });

    const data = await res.json();
    const content = data?.choices?.[0]?.message?.content || '';

    let result;
    try {
      const jsonMatch = content.match(/\{[\s\S]*\}/);
      result = JSON.parse(jsonMatch ? jsonMatch[0] : content);
    } catch {
      result = { score: 5, comment: '', continuation: content };
    }

    const s = parseInt(result.score) || 5;
    score += s;
    document.getElementById('score').textContent = score;
    document.getElementById('round').textContent = round;

    addSegment('AI', result.continuation || '...', s);
    if (result.comment) addSegment('系统', result.comment);
  } catch {
    addSegment('AI', '(AI 暂时无法回应)');
  }
}

async function aiContinue() {
  if (storyEnded) return;
  const storyContext = storySegments.map(s => `${s.author}: ${s.text}`).join('\n');

  try {
    const res = await fetch(AI_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'agnes-2.0-flash',
        messages: [
          { role: 'system', content: `你是故事接龙的AI。继续推进故事，写2-3句话。保持风格一致，制造悬念或转折。只输出故事内容。` },
          { role: 'user', content: `题材: ${GENRES[genre]}\n\n${storyContext}\n\n继续写。` }
        ],
        temperature: 1.0,
        max_tokens: 200
      })
    });

    const data = await res.json();
    const continuation = data?.choices?.[0]?.message?.content || '...';
    addSegment('AI', continuation);
  } catch {
    addSegment('AI', '(AI 暂时无法回应)');
  }
}

function endStory() {
  if (!storySegments.length) return;
  storyEnded = true;
  const fullText = storySegments.filter(s => s.author !== '系统').map(s => `[${s.author}] ${s.text}`).join('\n\n');
  document.getElementById('winTitle').textContent = '故事完结';
  document.getElementById('winMsg').textContent = `总回合: ${round} | 总得分: ${score}`;
  document.getElementById('fullStory').textContent = fullText;
  document.getElementById('overlay').style.display = 'flex';
}

function closeOverlay() { document.getElementById('overlay').style.display = 'none'; }

newStory();
</script>
<script src="track.js"></script>
</body>
</html>
