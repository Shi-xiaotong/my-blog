<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI猜歌名 - AI Games</title>
<link rel="icon" href="/img/favicon.ico" type="image/x-icon">
<link rel="stylesheet" href="common.css">
<style>
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 0; padding: 0; min-height: 100vh; background: var(--bg); color: var(--text); }
:root { --bg: #0f0f0f; --text: #e0e0e0; --card: #1a1a2e; --accent: #7c3aed; --border: #2a2a4a; }
body.light { --bg: #f5f5f5; --text: #222; --card: #fff; --accent: #7c3aed; --border: #ddd; }
.container { max-width: 600px; margin: 0 auto; padding: 16px; }
.header { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
.header a { color: var(--accent); text-decoration: none; font-size: 14px; }
.theme-btn { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; }
h1 { text-align: center; font-size: 1.6em; margin: 20px 0; }
.clue-card { background: var(--card); border: 2px solid var(--border); border-radius: 16px; padding: 28px; margin: 16px 0; text-align: center; min-height: 100px; display: flex; align-items: center; justify-content: center; font-size: 16px; line-height: 1.8; }
.difficulty-selector { display: flex; gap: 10px; justify-content: center; margin: 20px 0; }
.diff-btn { padding: 10px 24px; border-radius: 8px; border: 2px solid var(--border); background: var(--card); color: var(--text); cursor: pointer; font-size: 15px; transition: all 0.2s; }
.diff-btn:hover, .diff-btn.active { border-color: var(--accent); background: var(--accent); color: #fff; }
.stats { display: flex; justify-content: center; gap: 24px; margin: 12px 0; font-size: 14px; color: #888; }
.stats span { background: var(--card); padding: 4px 12px; border-radius: 12px; border: 1px solid var(--border); }
.input-area { display: flex; gap: 8px; margin-top: 12px; }
.input-area input { flex: 1; padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--card); color: var(--text); font-size: 15px; outline: none; }
.input-area input:focus { border-color: var(--accent); }
.btn { padding: 10px 18px; border-radius: 8px; border: none; background: var(--accent); color: #fff; font-size: 15px; cursor: pointer; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn.secondary { background: var(--card); border: 1px solid var(--border); color: var(--text); }
.history { margin-top: 16px; display: flex; flex-direction: column; gap: 8px; }
.history-item { padding: 8px 12px; border-radius: 8px; font-size: 14px; background: var(--card); border: 1px solid var(--border); display: flex; justify-content: space-between; }
.history-item.correct { border-color: #22c55e; color: #22c55e; }
.history-item.close { border-color: #eab308; color: #eab308; }
.history-item.wrong { border-color: var(--border); color: #888; }
.actions { display: flex; gap: 8px; justify-content: center; margin-top: 16px; flex-wrap: wrap; }
.hidden { display: none; }
.start-screen { text-align: center; padding: 40px 20px; }
.start-screen p { color: #888; margin: 16px 0; }
@keyframes blink { 50% { opacity: 0.3; } }
.loading::after { content: '...'; animation: blink 1s infinite; }
.result { text-align: center; padding: 16px; border-radius: 12px; margin: 12px 0; font-size: 16px; }
.result.win { background: rgba(34,197,94,0.15); border: 1px solid #22c55e; color: #22c55e; }
.result.lose { background: rgba(239,68,68,0.15); border: 1px solid #ef4444; color: #ef4444; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <a href="/games/">← 返回游戏</a>
    <button class="theme-btn" onclick="toggleTheme()">🌓 主题</button>
  </div>

  <h1>🎵 AI猜歌名</h1>

  <div id="startScreen" class="start-screen">
    <p>AI会描述一首歌的线索，你能猜出歌名吗？</p>
    <p>选择难度开始游戏：</p>
    <div class="difficulty-selector">
      <button class="diff-btn" onclick="startGame('简单')">简单</button>
      <button class="diff-btn" onclick="startGame('中等')">中等</button>
      <button class="diff-btn" onclick="startGame('困难')">困难</button>
    </div>
  </div>

  <div id="gameArea" class="hidden">
    <div class="stats">
      <span id="attemptStat">猜测次数：0/5</span>
      <span id="diffStat">难度：-</span>
    </div>
    <div class="clue-card" id="clueCard">加载中<span class="loading"></span></div>
    <div id="resultArea" class="hidden"></div>
    <div id="guessArea">
      <div class="input-area">
        <input type="text" id="guessInput" placeholder="输入你的猜测..."
               onkeydown="if(event.key==='Enter')makeGuess()" maxlength="100">
        <button class="btn" onclick="makeGuess()" id="guessBtn">猜！</button>
      </div>
    </div>
    <div class="history" id="history"></div>
    <div class="actions">
      <button class="btn secondary" onclick="getHint()" id="hintBtn">再给个提示</button>
      <button class="btn secondary" onclick="giveUp()">🏳️ 放弃</button>
      <button class="btn secondary hidden" id="newGameBtn" onclick="location.reload()">再来一局</button>
    </div>
  </div>
</div>

<script src="ai.js"></script>
<script>
const SYSTEM_PROMPT = '你是一个猜歌名游戏主持人。描述一首歌但不说歌名。玩家猜对说"恭喜猜对！"，猜错给提示。描述要有趣，包含歌词片段、歌手信息、年代等线索。用中文。';

let attempts = 0;
const maxAttempts = 5;
let difficulty = '中等';
let hintCount = 0;
let songContext = '';
let gameActive = false;

function toggleTheme() {
  document.body.classList.toggle('light');
  localStorage.setItem('theme', document.body.classList.contains('light') ? 'light' : 'dark');
}
if (localStorage.getItem('theme') === 'light') document.body.classList.add('light');

async function startGame(diff) {
  difficulty = diff;
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('gameArea').classList.remove('hidden');
  document.getElementById('diffStat').textContent = `难度：${diff}`;
  attempts = 0;
  hintCount = 0;
  gameActive = true;
  updateAttemptStat();

  try {
    const diffGuide = {'简单': '选择一首非常著名的华语流行歌曲，给很明显的线索', '中等': '选择一首有一定知名度的歌曲，给中等难度的线索', '困难': '选择一首比较小众或冷门的歌曲，给较隐晦的线索'}[diff];
    const clue = await askAI(`请描述一首歌。${diffGuide}。描述中包含：歌词片段（不直接引用歌名）、歌手特征、发行年代、风格等线索。不要说出歌名。直接给出描述。`, SYSTEM_PROMPT, {temperature: 1.1, max_tokens: 300});
    songContext = clue;
    document.getElementById('clueCard').innerHTML = `💡 <b>线索：</b><br><br>${clue}`;
  } catch(e) {
    document.getElementById('clueCard').innerHTML = '❌ 生成失败，请刷新重试';
  }
}

async function makeGuess() {
  const input = document.getElementById('guessInput');
  const guess = input.value.trim();
  if (!guess || !gameActive) return;
  input.value = '';
  attempts++;
  updateAttemptStat();

  const loader = document.createElement('div');
  loader.className = 'history-item';
  loader.innerHTML = `${guess} <span>判断中<span class="loading"></span></span>`;
  document.getElementById('history').appendChild(loader);

  document.getElementById('guessBtn').disabled = true;
  try {
    const prompt = `歌曲线索：${songContext}\n\n玩家猜的歌名是："${guess}"\n\n请判断是否正确。如果正确回答"正确"开头。如果很接近（如歌手对但歌名错，或歌名部分正确）回答"接近"开头。如果错误回答"错误"开头并给一个小提示。`;
    const result = await askAI(prompt, SYSTEM_PROMPT, {temperature: 0.5, max_tokens: 150});

    if (result.startsWith('正确') || result.includes('恭喜')) {
      loader.className = 'history-item correct';
      loader.innerHTML = `${guess} <span>✅ 正确！</span>`;
      gameActive = false;
      showResult(true, result);
    } else if (result.startsWith('接近') || result.includes('接近')) {
      loader.className = 'history-item close';
      loader.innerHTML = `${guess} <span>🟡 接近了！</span>`;
      addClue(result);
    } else {
      loader.className = 'history-item wrong';
      loader.innerHTML = `${guess} <span>❌ 不对</span>`;
      addClue(result);
    }

    if (attempts >= maxAttempts && gameActive) {
      gameActive = false;
      giveUp();
    }
  } catch(e) {
    loader.innerHTML = `${guess} <span>⚠️ 判断失败</span>`;
    attempts--;
    updateAttemptStat();
  }
  document.getElementById('guessBtn').disabled = false;
}

function addClue(text) {
  const card = document.getElementById('clueCard');
  card.innerHTML += `<br><br>💬 ${text}`;
}

async function getHint() {
  if (!gameActive) return;
  hintCount++;
  try {
    const hint = await askAI(`歌曲线索：${songContext}\n\n请再给一个提示帮助玩家猜出歌名。不要直接说出歌名。提示要和之前的线索不重复。`, SYSTEM_PROMPT, {temperature: 0.9, max_tokens: 100});
    addClue(`🔍 提示${hintCount}：${hint}`);
  } catch(e) { }
}

async function giveUp() {
  if (!gameActive && attempts < maxAttempts) return;
  gameActive = false;
  document.getElementById('guessInput').disabled = true;
  document.getElementById('guessBtn').disabled = true;

  try {
    const answer = await askAI(`歌曲线索：${songContext}\n\n玩家放弃了，请直接说出歌名和歌手，一句话介绍这首歌。`, SYSTEM_PROMPT, {temperature: 0.5, max_tokens: 100});
    showResult(false, answer);
  } catch(e) {
    showResult(false, '无法获取答案');
  }
}

function showResult(win, text) {
  const area = document.getElementById('resultArea');
  area.classList.remove('hidden');
  area.className = `result ${win ? 'win' : 'lose'}`;
  area.innerHTML = win ? `🎉 ${text}` : `🏳️ 答案揭晓：${text}`;
  document.getElementById('guessArea').classList.add('hidden');
  document.getElementById('newGameBtn').classList.remove('hidden');
}

function updateAttemptStat() {
  document.getElementById('attemptStat').textContent = `猜测次数：${attempts}/${maxAttempts}`;
}
</script>
<script src="track.js"></script>
</body>
</html>
