*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg,#f4f6f9);color:var(--text,#1e293b);min-height:100vh}
:root{--bg:#f4f6f9;--card-bg:#fff;--text:#1e293b;--text-secondary:#64748b;--border:#e2e8f0;--radius-lg:14px;--shadow-lg:0 6px 20px rgba(0,0,0,0.1);--primary-light:rgba(157,124,216,0.12);--primary:#9d7cd8;--warning:#eab308;--duration-fast:0.2s;--ease-out:ease-out}
[data-theme="dark"]{--bg:#0f172a;--card-bg:#1e293b;--text:#e2e8f0;--text-secondary:#94a3b8;--border:#334155;--shadow-lg:0 6px 20px rgba(0,0,0,0.4)}
.container{max-width:1200px;margin:0 auto;padding:24px 20px}
.games-page-header{text-align:center;padding:30px 0;}
.games-page-header h1{font-size:2em;margin-bottom:6px}
.games-page-header p{color:var(--text-secondary);font-size:1.1em}
.games-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
.game-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;text-decoration:none;color:var(--text);transition:all var(--duration-fast) var(--ease-out);display:flex;gap:16px}
.game-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px);border-color:var(--primary)}
.game-thumb{width:80px;height:80px;border-radius:var(--radius-lg);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.game-thumb svg{width:40px;height:40px}
.game-meta h3{font-size:17px;margin-bottom:4px}
.game-meta p{font-size:13px;color:var(--text-secondary);line-height:1.5;margin-bottom:6px}
.game-tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;background:var(--primary-light);color:var(--primary)}
.best-score{font-size:12px;color:var(--warning);margin-top:4px}
.footer{text-align:center;padding:40px 0 20px;color:var(--text-secondary);font-size:14px}
.footer a{color:var(--primary);text-decoration:none}
@media(max-width:640px){.games-grid{grid-template-columns:1fr}.game-thumb{width:60px;height:60px}.game-thumb svg{width:30px;height:30px}.container{padding:16px 12px}}
</style>
</head>
