<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>井字棋 - 小游戏</title>
<link rel="stylesheet" href="common.css">
<script src="ai.js"></script>
<style>
.game-container { max-width: 400px; margin: 0 auto; text-align: center; }
.board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; max-width: 300px; margin: 20px auto; }
.cell { width: 96px; height: 96px; background: var(--card-bg); border: 2px solid var(--border); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 48px; font-weight: 700; cursor: pointer; transition: all 0.2s; user-select: none; -webkit-user-select: none; }
.cell:hover:not(.taken) { border-color: var(--primary); background: var(--primary-light); }
.cell.taken { cursor: default; }
.cell.x { color: var(--primary); }
.cell.o { color: #ef4444; }
.cell.win { animation: winPulse 0.6s ease infinite alternate; }
@keyframes winPulse { to { transform: scale(1.05); filter: brightness(1.2); } }
.status { font-size: 18px; font-weight: 600; min-height: 28px; margin: 16px 0; }
.controls { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 16px; }
.mode-btns { display: flex; gap: 8px; justify-content: center; margin-bottom: 16px; }
.mode-btns button { padding: 8px 20px; border: 1px solid var(--border); border-radius: 8px; background: var(--card-bg); color: var(--text); font-size: 14px; cursor: pointer; transition: all 0.15s; }
.mode-btns button.active { background: var(--primary); color: #fff; border-color: var(--primary); }
.score-board { display: flex; gap: 24px; justify-content: center; margin-bottom: 20px; }
.score-item { text-align: center; }
.score-item .num { font-size: 32px; font-weight: 700; font-family: 'SF Mono', monospace; }
.score-item .lbl { font-size: 12px; color: var(--text-secondary); }
.score-x { color: var(--primary); }
.score-o { color: #ef4444; }
.score-d { color: var(--text-secondary); }
@media (max-width: 400px) { .cell { width: 80px; height: 80px; font-size: 40px; } }
</style>
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
<div class="container">
  <div class="header">
    <a href="/games/" class="back-link"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> 返回游戏</a>
    <h1>井字棋</h1>
  </div>
  <div class="game-container">
    <div class="mode-btns">
      <button class="active" onclick="setMode('ai')">人机对战</button>
      <button onclick="setMode('pvp')">双人对战</button>
    </div>
    <div class="score-board">
      <div class="score-item"><div class="num score-x" id="scoreX">0</div><div class="lbl">X (玩家)</div></div>
      <div class="score-item"><div class="num score-d" id="scoreD">0</div><div class="lbl">平局</div></div>
      <div class="score-item"><div class="num score-o" id="scoreO">0</div><div class="lbl">O (电脑)</div></div>
    </div>
    <div class="board" id="board"></div>
    <div class="status" id="status">你的回合 (X)</div>
    <div class="controls">
      <button class="btn btn-primary" onclick="newGame()">新游戏</button>
      <button class="btn btn-outline" onclick="resetScore()">重置分数</button>
    </div>
  </div>
</div>

<script>
function toggleTheme(){const h=document.documentElement;const d=h.getAttribute('data-theme')==='light';h.setAttribute('data-theme',d?'':'light');localStorage.setItem('game-theme',d?'dark':'light');const b=document.querySelector('.theme-toggle');b.innerHTML=d?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>':'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>'}
(function(){const s=localStorage.getItem('game-theme');if(s==='light'){document.documentElement.setAttribute('data-theme','light');document.querySelector('.theme-toggle').innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>'}})()

let board, currentPlayer, gameOver, mode, scores, winLine;

const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

function init() {
  scores = JSON.parse(localStorage.getItem('tictactoe_scores') || '{"x":0,"o":0,"d":0}');
  mode = 'ai';
  updateScoreDisplay();
  newGame();
}

function newGame() {
  board = Array(9).fill('');
  currentPlayer = 'X';
  gameOver = false;
  winLine = null;
  render();
  setStatus(mode === 'ai' ? '你的回合 (X)' : 'X 的回合');
}

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-btns button').forEach(b => b.classList.remove('active'));
  document.querySelector(`.mode-btns button[onclick="setMode('${m}')"]`).classList.add('active');
  newGame();
}

function render() {
  const el = document.getElementById('board');
  el.innerHTML = board.map((v, i) => {
    let cls = 'cell';
    if (v) cls += ' taken ' + v.toLowerCase();
    if (winLine && winLine.includes(i)) cls += ' win';
    return `<div class="${cls}" onclick="playMove(${i})">${v}</div>`;
  }).join('');
}

function setStatus(msg) { document.getElementById('status').textContent = msg; }

function playMove(i) {
  if (gameOver || board[i]) return;
  if (mode === 'ai' && currentPlayer === 'O') return;

  board[i] = currentPlayer;
  render();

  const result = checkWin();
  if (result) { handleResult(result); return; }

  currentPlayer = currentPlayer === 'X' ? 'O' : 'X';

  if (mode === 'ai' && currentPlayer === 'O') {
    setStatus('电脑思考中...');
    setTimeout(aiMove, 300);
  } else {
    setStatus(`${currentPlayer} 的回合`);
  }
}

let moveCount = 0;

async function aiMove() {
  if (gameOver) return;
  const best = minimax(board, 'O', 0);
  board[best.index] = 'O';
  moveCount++;
  render();

  const result = checkWin();
  if (result) { handleResult(result); return; }

  currentPlayer = 'X';
  setStatus('你的回合 (X)');

  // AI 垃圾话（异步，不阻塞）
  if (typeof getTicTacToeTaunt === 'function') {
    getTicTacToeTaunt(moveCount).then(taunt => {
      if (taunt && !gameOver) setStatus('AI: ' + taunt);
    });
  }
}

function checkWin() {
  for (const [a, b, c] of WINS) {
    if (board[a] && board[a] === board[b] && board[a] === board[c]) return { winner: board[a], line: [a, b, c] };
  }
  if (board.every(v => v)) return { winner: 'draw', line: null };
  return null;
}

function handleResult(result) {
  gameOver = true;
  winLine = result.line;
  moveCount = 0;
  render();

  const won = result.winner === 'X';
  const draw = result.winner === 'draw';

  if (draw) {
    setStatus('平局!');
    scores.d++;
  } else if (won) {
    setStatus(mode === 'ai' ? '你赢了!' : 'X 获胜!');
    scores.x++;
  } else {
    setStatus(mode === 'ai' ? '电脑赢了!' : 'O 获胜!');
    scores.o++;
  }

  // AI 点评（异步）
  if (mode === 'ai' && typeof getGameComment === 'function') {
    getGameComment('井字棋', won ? '赢' : draw ? '平' : '输', won).then(msg => {
      if (msg) setStatus(msg);
    });
  }

  localStorage.setItem('tictactoe_scores', JSON.stringify(scores));
  updateScoreDisplay();
}

function updateScoreDisplay() {
  document.getElementById('scoreX').textContent = scores.x;
  document.getElementById('scoreO').textContent = scores.o;
  document.getElementById('scoreD').textContent = scores.d;
}

function resetScore() {
  scores = { x: 0, o: 0, d: 0 };
  localStorage.setItem('tictactoe_scores', JSON.stringify(scores));
  updateScoreDisplay();
}

// Minimax AI
function minimax(boardState, player, depth) {
  const result = checkWinState(boardState);
  if (result === 'O') return { score: 10 - depth };
  if (result === 'X') return { score: depth - 10 };
  if (boardState.every(v => v)) return { score: 0 };

  const moves = [];
  const nextPlayer = player === 'O' ? 'X' : 'O';

  for (let i = 0; i < 9; i++) {
    if (boardState[i]) continue;
    boardState[i] = player;
    const { score } = minimax(boardState, nextPlayer, depth + 1);
    moves.push({ index: i, score });
    boardState[i] = '';
  }

  if (player === 'O') return moves.reduce((best, m) => m.score > best.score ? m : best);
  return moves.reduce((best, m) => m.score < best.score ? m : best);
}

function checkWinState(b) {
  for (const [a, c, d] of WINS) {
    if (b[a] && b[a] === b[c] && b[a] === b[d]) return b[a];
  }
  return null;
}

init();
</script>
<script src="track.js"></script>
</body>
</html>
