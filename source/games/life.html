<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生命游戏 - 小游戏</title>
<link rel="stylesheet" href="common.css">
<style>
.game-container { max-width: 700px; margin: 0 auto; }
.game-area { display: flex; justify-content: center; margin: 16px 0; }
.game-area canvas { border-radius: 4px; border: 1px solid var(--border); cursor: crosshair; touch-action: none; }
.controls { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 12px; align-items: center; }
.controls label { font-size: 13px; color: var(--text-secondary); display: flex; align-items: center; gap: 4px; }
.controls input[type="range"] { width: 80px; }
.stats { display: flex; gap: 20px; justify-content: center; margin-bottom: 12px; font-size: 13px; color: var(--text-secondary); }
.stats span { font-family: 'SF Mono', monospace; color: var(--primary); font-weight: 600; }
.patterns { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; margin-bottom: 12px; }
.patterns button { padding: 4px 10px; border: 1px solid var(--border); border-radius: 6px; background: var(--card-bg); color: var(--text); font-size: 12px; cursor: pointer; }
.patterns button:hover { border-color: var(--primary); color: var(--primary); }
.tip { text-align: center; font-size: 12px; color: var(--text-secondary); margin-top: 8px; }
</style>
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
<div class="container">
  <div class="header">
    <a href="/games/" class="back-link"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> 返回游戏</a>
    <h1>生命游戏</h1>
  </div>
  <div class="stats">
    <div>世代: <span id="gen">0</span></div>
    <div>存活: <span id="alive">0</span></div>
    <div>密度: <span id="density">0%</span></div>
  </div>
  <div class="controls">
    <button class="btn btn-primary" id="playBtn" onclick="togglePlay()">开始</button>
    <button class="btn btn-outline" onclick="step()">单步</button>
    <button class="btn btn-outline" onclick="randomFill()">随机</button>
    <button class="btn btn-outline" onclick="clearGrid()">清空</button>
    <label>速度 <input type="range" id="speed" min="1" max="30" value="10" oninput="updateSpeed()"></label>
    <label>大小 <input type="range" id="cellSize" min="4" max="20" value="8" onchange="resizeGrid()"></label>
  </div>
  <div class="patterns">
    <span style="font-size:12px;color:var(--text-secondary)">预设:</span>
    <button onclick="loadPattern('glider')">滑翔机</button>
    <button onclick="loadPattern('blinker')">闪烁器</button>
    <button onclick="loadPattern('pulsar')">脉冲星</button>
    <button onclick="loadPattern('gosper')">高斯帕枪</button>
    <button onclick="loadPattern('lwss')">轻量飞船</button>
    <button onclick="loadPattern('pentadecathlon')">五年周期</button>
  </div>
  <div class="game-area"><canvas id="canvas"></canvas></div>
  <p class="tip">点击绘制细胞 | 拖动连续绘制 | 右键擦除</p>
</div>

<script>
function toggleTheme(){const h=document.documentElement;const d=h.getAttribute('data-theme')==='light';h.setAttribute('data-theme',d?'':'light');localStorage.setItem('game-theme',d?'dark':'light');const b=document.querySelector('.theme-toggle');b.innerHTML=d?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>':'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>'}
(function(){const s=localStorage.getItem('game-theme');if(s==='light'){document.documentElement.setAttribute('data-theme','light');document.querySelector('.theme-toggle').innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>'}})()

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let cellSize, cols, rows, grid, nextGrid, generation, running, speed, animFrame;

const PATTERNS = {
  glider: [[0,1],[1,2],[2,0],[2,1],[2,2]],
  blinker: [[0,0],[0,1],[0,2]],
  pulsar: [[0,2],[0,3],[0,4],[0,8],[0,9],[0,10],[2,0],[2,5],[2,7],[2,12],[3,0],[3,5],[3,7],[3,12],[4,0],[4,5],[4,7],[4,12],[5,2],[5,3],[5,4],[5,8],[5,9],[5,10],[7,2],[7,3],[7,4],[7,8],[7,9],[7,10],[8,0],[8,5],[8,7],[8,12],[9,0],[9,5],[9,7],[9,12],[10,0],[10,5],[10,7],[10,12],[12,2],[12,3],[12,4],[12,8],[12,9],[12,10]],
  gosper: [[0,24],[1,22],[1,24],[2,12],[2,13],[2,20],[2,21],[2,34],[2,35],[3,11],[3,15],[3,20],[3,21],[3,34],[3,35],[4,0],[4,1],[4,10],[4,16],[4,20],[4,21],[5,0],[5,1],[5,10],[5,14],[5,16],[5,17],[5,22],[5,24],[6,10],[6,16],[6,24],[7,11],[7,15],[8,12],[8,13]],
  lwss: [[0,1],[0,4],[1,0],[2,0],[2,4],[3,0],[3,1],[3,2],[3,3]],
  pentadecathlon: [[0,0],[1,0],[2,-1],[2,1],[3,0],[4,0],[5,0],[6,-1],[6,1],[7,0],[8,0],[9,0],[10,-1],[10,1],[11,0],[12,0],[13,0],[14,-1],[14,1],[15,0]]
};

function init() {
  cellSize = parseInt(document.getElementById('cellSize').value);
  cols = Math.floor(660 / cellSize);
  rows = Math.floor(500 / cellSize);
  canvas.width = cols * cellSize;
  canvas.height = rows * cellSize;
  grid = Array.from({length: rows}, () => Array(cols).fill(0));
  nextGrid = Array.from({length: rows}, () => Array(cols).fill(0));
  generation = 0;
  running = false;
  speed = parseInt(document.getElementById('speed').value);
  draw();
  updateStats();
}

function resizeGrid() {
  const newCellSize = parseInt(document.getElementById('cellSize').value);
  const newCols = Math.floor(660 / newCellSize);
  const newRows = Math.floor(500 / newCellSize);
  const newGrid = Array.from({length: newRows}, () => Array(newCols).fill(0));
  // Copy existing cells
  for (let r = 0; r < Math.min(rows, newRows); r++) for (let c = 0; c < Math.min(cols, newCols); c++) newGrid[r][c] = grid[r][c];
  cellSize = newCellSize; cols = newCols; rows = newRows;
  canvas.width = cols * cellSize; canvas.height = rows * cellSize;
  grid = newGrid;
  nextGrid = Array.from({length: rows}, () => Array(cols).fill(0));
  draw();
}

function countNeighbors(r, c) {
  let count = 0;
  for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
    if (dr === 0 && dc === 0) continue;
    const nr = (r + dr + rows) % rows, nc = (c + dc + cols) % cols;
    count += grid[nr][nc];
  }
  return count;
}

function step() {
  for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) {
    const n = countNeighbors(r, c);
    nextGrid[r][c] = grid[r][c] ? (n === 2 || n === 3 ? 1 : 0) : (n === 3 ? 1 : 0);
  }
  [grid, nextGrid] = [nextGrid, grid];
  generation++;
  draw();
  updateStats();
}

function draw() {
  ctx.fillStyle = '#0f172a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid lines
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= cols; x++) { ctx.beginPath(); ctx.moveTo(x*cellSize, 0); ctx.lineTo(x*cellSize, rows*cellSize); ctx.stroke(); }
  for (let y = 0; y <= rows; y++) { ctx.beginPath(); ctx.moveTo(0, y*cellSize); ctx.lineTo(cols*cellSize, y*cellSize); ctx.stroke(); }

  // Cells
  for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) {
    if (grid[r][c]) {
      const n = countNeighbors(r, c);
      const brightness = Math.min(255, 100 + n * 30);
      ctx.fillStyle = `rgb(${brightness}, ${Math.round(brightness * 0.8)}, ${Math.round(brightness * 0.4)})`;
      ctx.fillRect(c * cellSize + 1, r * cellSize + 1, cellSize - 2, cellSize - 2);
    }
  }
}

function updateStats() {
  let alive = 0;
  for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) alive += grid[r][c];
  document.getElementById('gen').textContent = generation;
  document.getElementById('alive').textContent = alive;
  document.getElementById('density').textContent = (alive / (rows * cols) * 100).toFixed(1) + '%';
}

function togglePlay() {
  running = !running;
  document.getElementById('playBtn').textContent = running ? '暂停' : '开始';
  if (running) runLoop();
}

function runLoop() {
  if (!running) return;
  step();
  setTimeout(runLoop, 1000 / speed);
}

function updateSpeed() { speed = parseInt(document.getElementById('speed').value); }

function randomFill() {
  for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) grid[r][c] = Math.random() < 0.3 ? 1 : 0;
  generation = 0; draw(); updateStats();
}

function clearGrid() {
  for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) grid[r][c] = 0;
  generation = 0; draw(); updateStats();
}

function loadPattern(name) {
  clearGrid();
  const pattern = PATTERNS[name];
  const cx = Math.floor(cols / 2), cy = Math.floor(rows / 2);
  pattern.forEach(([r, c]) => {
    const nr = cy + r, nc = cx + c;
    if (nr >= 0 && nr < rows && nc >= 0 && nc < cols) grid[nr][nc] = 1;
  });
  draw(); updateStats();
}

// Mouse/touch drawing
let isDrawing = false, drawValue = 1;

function getCell(e) {
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX || e.touches?.[0]?.clientX) - rect.left;
  const y = (e.clientY || e.touches?.[0]?.clientY) - rect.top;
  return { c: Math.floor(x / cellSize * (canvas.width / rect.width)), r: Math.floor(y / cellSize * (canvas.height / rect.height)) };
}

canvas.addEventListener('mousedown', e => {
  e.preventDefault();
  const {r, c} = getCell(e);
  if (r >= 0 && r < rows && c >= 0 && c < cols) { isDrawing = true; drawValue = grid[r][c] ? 0 : 1; grid[r][c] = drawValue; draw(); updateStats(); }
});
canvas.addEventListener('mousemove', e => {
  if (!isDrawing) return;
  const {r, c} = getCell(e);
  if (r >= 0 && r < rows && c >= 0 && c < cols) { grid[r][c] = drawValue; draw(); updateStats(); }
});
canvas.addEventListener('mouseup', () => isDrawing = false);
canvas.addEventListener('mouseleave', () => isDrawing = false);
canvas.addEventListener('contextmenu', e => e.preventDefault());

canvas.addEventListener('touchstart', e => { e.preventDefault(); const {r, c} = getCell(e); if (r >= 0 && r < rows && c >= 0 && c < cols) { isDrawing = true; drawValue = grid[r][c] ? 0 : 1; grid[r][c] = drawValue; draw(); updateStats(); } }, {passive:false});
canvas.addEventListener('touchmove', e => { e.preventDefault(); if (!isDrawing) return; const {r, c} = getCell(e); if (r >= 0 && r < rows && c >= 0 && c < cols) { grid[r][c] = drawValue; draw(); updateStats(); } }, {passive:false});
canvas.addEventListener('touchend', () => isDrawing = false);

document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
  if (e.key === 'n') { e.preventDefault(); step(); }
  if (e.key === 'c') { e.preventDefault(); clearGrid(); }
  if (e.key === 'r') { e.preventDefault(); randomFill(); }
});

init();
randomFill();
</script>
</body>
</html>
