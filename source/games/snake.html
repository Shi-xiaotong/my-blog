<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>贪吃蛇 - 小游戏</title>
<link rel="stylesheet" href="common.css">
<style>
.game-container { max-width: 420px; margin: 0 auto; }
.game-area { display: flex; justify-content: center; margin: 16px 0; }
.game-area canvas { border-radius: 8px; border: 2px solid var(--border); background: #0f172a; }
.controls { display: flex; gap: 8px; margin-top: 12px; justify-content: center; flex-wrap: wrap; }
.dpad { display: none; grid-template-columns: repeat(3, 50px); grid-template-rows: repeat(3, 50px); gap: 4px; justify-content: center; margin-top: 12px; }
.dpad button { width: 50px; height: 50px; border: 1px solid var(--border); border-radius: 8px; background: var(--card-bg); color: var(--text); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.dpad button:active { background: var(--primary); color: #fff; }
.dpad .empty { visibility: hidden; }
.tip { text-align: center; font-size: 13px; color: var(--text-secondary); margin-top: 8px; }
@media (hover: none) and (pointer: coarse) { .dpad { display: grid; } }
</style>
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
<div class="container">
  <div class="header">
    <a href="/games/" class="back-link"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> 返回游戏</a>
    <h1>贪吃蛇</h1>
  </div>
  <div class="score-bar">
    <div class="score-item"><div class="score-label">分数</div><div class="score-value" id="score">0</div></div>
    <div class="score-item"><div class="score-label">最高</div><div class="score-value" id="best">0</div></div>
    <div class="score-item"><div class="score-label">长度</div><div class="score-value" id="length">3</div></div>
  </div>
  <div class="game-container">
    <div class="game-area"><canvas id="canvas" width="400" height="400"></canvas></div>
    <div class="dpad">
      <div class="empty"></div>
      <button onclick="setDir(0,-1)">&#9650;</button>
      <div class="empty"></div>
      <button onclick="setDir(-1,0)">&#9664;</button>
      <div class="empty"></div>
      <button onclick="setDir(1,0)">&#9654;</button>
      <div class="empty"></div>
      <button onclick="setDir(0,1)">&#9660;</button>
      <div class="empty"></div>
    </div>
    <div class="controls">
      <button class="btn btn-primary" onclick="newGame()">新游戏</button>
      <button class="btn btn-outline" id="pauseBtn" onclick="togglePause()">暂停</button>
    </div>
    <p class="tip">方向键 / WASD / 滑动控制方向</p>
  </div>
</div>

<script>
function toggleTheme(){const h=document.documentElement;const d=h.getAttribute('data-theme')==='light';h.setAttribute('data-theme',d?'':'light');localStorage.setItem('game-theme',d?'dark':'light');const b=document.querySelector('.theme-toggle');b.innerHTML=d?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>':'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>'}
(function(){const s=localStorage.getItem('game-theme');if(s==='light'){document.documentElement.setAttribute('data-theme','light');document.querySelector('.theme-toggle').innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>'}})()

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const CELL = 20, COLS = 20, ROWS = 20;
let snake, dir, nextDir, food, score, best, speed, timer, paused, alive;

function init() {
  best = parseInt(localStorage.getItem('best_snake')) || 0;
  document.getElementById('best').textContent = best;
  newGame();
}

function newGame() {
  snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dir = {x:1,y:0}; nextDir = {x:1,y:0};
  score = 0; speed = 120; paused = false; alive = true;
  document.getElementById('pauseBtn').textContent = '暂停';
  placeFood();
  render();
  clearInterval(timer);
  timer = setInterval(tick, speed);
}

function placeFood() {
  const occupied = new Set(snake.map(s => s.x + ',' + s.y));
  let pos;
  do { pos = {x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS)}; } while (occupied.has(pos.x+','+pos.y));
  food = pos;
}

function setDir(dx, dy) {
  if (dir.x === -dx && dir.y === -dy) return;
  nextDir = {x:dx, y:dy};
}

function tick() {
  if (paused || !alive) return;
  dir = nextDir;
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS || snake.some(s => s.x === head.x && s.y === head.y)) {
    alive = false;
    clearInterval(timer);
    if (score > best) { best = score; localStorage.setItem('best_snake', best); }
    document.getElementById('best').textContent = best;
    render();
    return;
  }

  snake.unshift(head);
  if (head.x === food.x && head.y === food.y) {
    score += 10;
    placeFood();
    if (speed > 50) { speed -= 2; clearInterval(timer); timer = setInterval(tick, speed); }
  } else {
    snake.pop();
  }
  render();
}

function render() {
  ctx.fillStyle = '#0f172a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid lines
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= COLS; i++) { ctx.beginPath(); ctx.moveTo(i*CELL, 0); ctx.lineTo(i*CELL, ROWS*CELL); ctx.stroke(); }
  for (let i = 0; i <= ROWS; i++) { ctx.beginPath(); ctx.moveTo(0, i*CELL); ctx.lineTo(COLS*CELL, i*CELL); ctx.stroke(); }

  // Food
  ctx.fillStyle = '#ef4444';
  ctx.beginPath();
  ctx.arc(food.x*CELL + CELL/2, food.y*CELL + CELL/2, CELL/2 - 2, 0, Math.PI*2);
  ctx.fill();

  // Snake
  snake.forEach((s, i) => {
    const ratio = 1 - i / snake.length * 0.4;
    const g = Math.round(180 * ratio);
    ctx.fillStyle = i === 0 ? '#22c55e' : `rgb(34, ${g}, 94)`;
    const pad = i === 0 ? 1 : 2;
    ctx.beginPath();
    ctx.roundRect(s.x*CELL + pad, s.y*CELL + pad, CELL - pad*2, CELL - pad*2, i === 0 ? 6 : 4);
    ctx.fill();
  });

  // Eyes on head
  const h = snake[0];
  ctx.fillStyle = '#fff';
  const ex = h.x*CELL + CELL/2 + dir.x*4;
  const ey = h.y*CELL + CELL/2 + dir.y*4;
  ctx.beginPath(); ctx.arc(ex - dir.y*3, ey + dir.x*3, 2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(ex + dir.y*3, ey - dir.x*3, 2, 0, Math.PI*2); ctx.fill();

  document.getElementById('score').textContent = score;
  document.getElementById('length').textContent = snake.length;

  if (!alive) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 32px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Game Over', canvas.width/2, canvas.height/2 - 20);
    ctx.font = '18px -apple-system, sans-serif';
    ctx.fillStyle = '#94a3b8';
    ctx.fillText('得分: ' + score, canvas.width/2, canvas.height/2 + 15);
  }
}

function togglePause() {
  paused = !paused;
  document.getElementById('pauseBtn').textContent = paused ? '继续' : '暂停';
}

document.addEventListener('keydown', e => {
  const map = {ArrowLeft:[-1,0],ArrowRight:[1,0],ArrowUp:[0,-1],ArrowDown:[0,1],a:[-1,0],d:[1,0],w:[0,-1],s:[0,1]};
  if (map[e.key]) { e.preventDefault(); setDir(...map[e.key]); }
  if (e.key === ' ' || e.key === 'p') { e.preventDefault(); togglePause(); }
});

let touchX, touchY;
canvas.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; touchY = e.touches[0].clientY; }, {passive:true});
canvas.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchX;
  const dy = e.changedTouches[0].clientY - touchY;
  if (Math.max(Math.abs(dx), Math.abs(dy)) < 20) return;
  if (Math.abs(dx) > Math.abs(dy)) setDir(dx > 0 ? 1 : -1, 0);
  else setDir(0, dy > 0 ? 1 : -1);
}, {passive:true});

init();
</script>
</body>
</html>
