<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>五子棋 - 小游戏</title>
<link rel="stylesheet" href="common.css">
<script src="ai.js"></script>
<style>
.game-wrap { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; align-items: flex-start; }
.board-container { position: relative; }
canvas#board { display: block; border-radius: 6px; cursor: pointer; box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
.side-panel { min-width: 160px; display: flex; flex-direction: column; gap: 12px; }
.panel-box { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
.panel-box h3 { font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; }
.status-text { font-size: 16px; font-weight: 600; text-align: center; margin: 8px 0; }
.win-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 100; }
.win-box { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 32px; text-align: center; }
.win-box h2 { margin-bottom: 8px; }
.win-box p { color: var(--text-secondary); margin-bottom: 16px; }
@media (max-width: 640px) {
  .game-wrap { flex-direction: column; align-items: center; }
  canvas#board { width: 100% !important; height: auto !important; max-width: 480px; }
  .side-panel { flex-direction: row; flex-wrap: wrap; width: 100%; max-width: 480px; }
  .panel-box { flex: 1; }
}
</style>
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
<div class="container">
  <div class="header">
    <a href="/games/" class="back-link"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> 返回游戏</a>
    <h1>五子棋</h1>
  </div>
  <div class="game-wrap">
    <div class="board-container">
      <canvas id="board" width="480" height="480"></canvas>
    </div>
    <div class="side-panel">
      <div class="panel-box">
        <h3>状态</h3>
        <div class="status-text" id="status">你的回合 (黑棋)</div>
      </div>
      <div class="panel-box">
        <h3>模式</h3>
        <div style="display:flex;gap:4px;flex-direction:column">
          <button class="btn btn-primary" onclick="newGame('ai')">人机对战</button>
          <button class="btn btn-outline" onclick="newGame('pvp')">双人对战</button>
        </div>
      </div>
      <div class="panel-box">
        <h3>操作</h3>
        <div style="display:flex;gap:4px;flex-direction:column">
          <button class="btn btn-outline" onclick="undoMove()">悔棋</button>
          <button class="btn btn-outline" onclick="newGame()">新游戏</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="win-overlay" id="overlay" style="display:none">
  <div class="win-box">
    <h2 id="winTitle"></h2>
    <p id="winMsg"></p>
    <button class="btn btn-primary" onclick="closeOverlay();newGame()">再来一局</button>
  </div>
</div>

<script>
function toggleTheme(){const h=document.documentElement;const d=h.getAttribute('data-theme')==='light';h.setAttribute('data-theme',d?'':'light');localStorage.setItem('game-theme',d?'dark':'light')}
(function(){const s=localStorage.getItem('game-theme');if(s==='light')document.documentElement.setAttribute('data-theme','light')})()

const SIZE = 15;
const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');
const PADDING = 20;
const CELL = (canvas.width - PADDING * 2) / (SIZE - 1);
const STONE_R = CELL * 0.42;

let board, currentPlayer, gameOver, mode, history, winCells, moveCount, hoverPos;
const EMPTY = 0, BLACK = 1, WHITE = 2;

// Star points (天元 + 星位)
const STAR_POINTS = [[3,3],[3,11],[7,7],[11,3],[11,11],[3,7],[7,3],[7,11],[11,7]];

function init() { newGame('ai'); }

function newGame(m) {
  mode = m || mode;
  board = Array.from({length: SIZE}, () => Array(SIZE).fill(EMPTY));
  currentPlayer = BLACK;
  gameOver = false;
  history = [];
  winCells = [];
  moveCount = 0;
  hoverPos = null;
  document.getElementById('overlay').style.display = 'none';
  setStatus(mode === 'ai' ? '你的回合 (黑棋)' : '黑棋落子');
  draw();
}

function setStatus(msg) { document.getElementById('status').textContent = msg; }

function toCanvas(r, c) { return [PADDING + c * CELL, PADDING + r * CELL]; }
function fromCanvas(x, y) {
  const c = Math.round((x - PADDING) / CELL);
  const r = Math.round((y - PADDING) / CELL);
  if (r < 0 || r >= SIZE || c < 0 || c >= SIZE) return null;
  return [r, c];
}

function draw() {
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.width;
  const h = canvas.height;
  ctx.clearRect(0, 0, w, h);

  // Board background
  ctx.fillStyle = '#d4a574';
  ctx.beginPath();
  ctx.roundRect(0, 0, w, h, 6);
  ctx.fill();

  // Grid lines
  ctx.strokeStyle = '#8b6914';
  ctx.lineWidth = 1;
  for (let i = 0; i < SIZE; i++) {
    const [x1, y1] = toCanvas(i, 0);
    const [x2, y2] = toCanvas(i, SIZE - 1);
    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
    const [x3, y3] = toCanvas(0, i);
    const [x4, y4] = toCanvas(SIZE - 1, i);
    ctx.beginPath(); ctx.moveTo(x3, y3); ctx.lineTo(x4, y4); ctx.stroke();
  }

  // Star points
  ctx.fillStyle = '#8b6914';
  for (const [r, c] of STAR_POINTS) {
    const [x, y] = toCanvas(r, c);
    ctx.beginPath(); ctx.arc(x, y, 3.5, 0, Math.PI * 2); ctx.fill();
  }

  // Hover indicator
  if (hoverPos && !gameOver) {
    const [r, c] = hoverPos;
    if (board[r][c] === EMPTY) {
      const [x, y] = toCanvas(r, c);
      ctx.fillStyle = currentPlayer === BLACK ? 'rgba(0,0,0,0.2)' : 'rgba(255,255,255,0.3)';
      ctx.beginPath(); ctx.arc(x, y, STONE_R, 0, Math.PI * 2); ctx.fill();
    }
  }

  // Stones
  for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) {
    if (board[r][c] === EMPTY) continue;
    const [x, y] = toCanvas(r, c);
    const isBlack = board[r][c] === BLACK;
    const isLast = history.length && history[history.length-1][0] === r && history[history.length-1][1] === c;
    const isWin = winCells.some(([wr, wc]) => wr === r && wc === c);

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.beginPath(); ctx.arc(x + 2, y + 2, STONE_R, 0, Math.PI * 2); ctx.fill();

    // Stone body
    const grad = ctx.createRadialGradient(x - STONE_R * 0.3, y - STONE_R * 0.3, STONE_R * 0.1, x, y, STONE_R);
    if (isBlack) {
      grad.addColorStop(0, '#666');
      grad.addColorStop(1, '#111');
    } else {
      grad.addColorStop(0, '#fff');
      grad.addColorStop(1, '#ccc');
    }
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(x, y, STONE_R, 0, Math.PI * 2); ctx.fill();

    // Last move marker
    if (isLast) {
      ctx.fillStyle = 'rgba(239,68,68,0.7)';
      ctx.beginPath(); ctx.arc(x, y, 4, 0, Math.PI * 2); ctx.fill();
    }

    // Win highlight
    if (isWin) {
      ctx.strokeStyle = '#ef4444';
      ctx.lineWidth = 2.5;
      ctx.beginPath(); ctx.arc(x, y, STONE_R + 2, 0, Math.PI * 2); ctx.stroke();
    }
  }
}

// Mouse events
canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const pos = fromCanvas((e.clientX - rect.left) * scaleX, (e.clientY - rect.top) * scaleY);
  hoverPos = pos;
  draw();
});

canvas.addEventListener('mouseleave', () => { hoverPos = null; draw(); });

canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const pos = fromCanvas((e.clientX - rect.left) * scaleX, (e.clientY - rect.top) * scaleY);
  if (pos) placeStone(pos[0], pos[1]);
});

// Touch events
canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const touch = e.changedTouches[0];
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const pos = fromCanvas((touch.clientX - rect.left) * scaleX, (touch.clientY - rect.top) * scaleY);
  if (pos) placeStone(pos[0], pos[1]);
});

function placeStone(r, c) {
  if (gameOver || board[r][c] !== EMPTY) return;
  if (mode === 'ai' && currentPlayer === WHITE) return;

  board[r][c] = currentPlayer;
  history.push([r, c, currentPlayer]);
  moveCount++;

  const win = checkWin(r, c, currentPlayer);
  if (win) {
    winCells = win;
    gameOver = true;
    draw();
    const isBlack = currentPlayer === BLACK;
    const title = mode === 'ai' ? (isBlack ? '你赢了!' : 'AI 赢了!') : (isBlack ? '黑棋获胜!' : '白棋获胜!');
    showOverlay(title, moveCount + ' 手');
    return;
  }

  if (moveCount >= SIZE * SIZE) {
    gameOver = true;
    draw();
    showOverlay('平局', '棋盘已满');
    return;
  }

  currentPlayer = currentPlayer === BLACK ? WHITE : BLACK;
  draw();

  if (mode === 'ai' && currentPlayer === WHITE) {
    setStatus('AI 思考中...');
    setTimeout(aiMove, 30);
  } else {
    setStatus(currentPlayer === BLACK ? '黑棋落子' : '白棋落子');
  }
}

function checkWin(r, c, player) {
  const dirs = [[0,1],[1,0],[1,1],[1,-1]];
  for (const [dr,dc] of dirs) {
    const cells = [[r,c]];
    for (let i = 1; i < 5; i++) { const nr = r+dr*i, nc = c+dc*i; if (nr>=0&&nr<SIZE&&nc>=0&&nc<SIZE&&board[nr][nc]===player) cells.push([nr,nc]); else break; }
    for (let i = 1; i < 5; i++) { const nr = r-dr*i, nc = c-dc*i; if (nr>=0&&nr<SIZE&&nc>=0&&nc<SIZE&&board[nr][nc]===player) cells.push([nr,nc]); else break; }
    if (cells.length >= 5) return cells;
  }
  return null;
}

function undoMove() {
  if (!history.length || gameOver) return;
  if (mode === 'ai') {
    if (history.length >= 2) {
      const [r2,c2] = history.pop(); board[r2][c2] = EMPTY;
      const [r1,c1] = history.pop(); board[r1][c1] = EMPTY;
      moveCount -= 2;
    } else {
      const [r,c] = history.pop(); board[r][c] = EMPTY;
      moveCount--;
    }
  } else {
    const [r,c] = history.pop(); board[r][c] = EMPTY;
    moveCount--;
    currentPlayer = currentPlayer === BLACK ? WHITE : BLACK;
  }
  setStatus(mode === 'ai' ? '你的回合 (黑棋)' : (currentPlayer === BLACK ? '黑棋落子' : '白棋落子'));
  draw();
}

function showOverlay(title, msg) {
  document.getElementById('winTitle').textContent = title;
  document.getElementById('winMsg').textContent = msg;
  document.getElementById('overlay').style.display = 'flex';
  if (mode === 'ai' && typeof getGameComment === 'function') {
    const won = title.includes('你赢');
    getGameComment('五子棋', moveCount + '手', won).then(c => {
      if (c) document.getElementById('winMsg').textContent = msg + ' | ' + c;
    });
  }
}
function closeOverlay() { document.getElementById('overlay').style.display = 'none'; }

// ===== AI =====
const DIRS = [[0,1],[1,0],[1,1],[1,-1]];

function scorePoint(r, c, player) {
  let total = 0;
  for (const [dr, dc] of DIRS) {
    let count = 1, openEnds = 0;
    for (let i = 1; i < 5; i++) {
      const nr = r + dr*i, nc = c + dc*i;
      if (nr < 0 || nr >= SIZE || nc < 0 || nc >= SIZE) break;
      if (board[nr][nc] === player) count++;
      else { if (board[nr][nc] === EMPTY) openEnds++; break; }
    }
    for (let i = 1; i < 5; i++) {
      const nr = r - dr*i, nc = c - dc*i;
      if (nr < 0 || nr >= SIZE || nc < 0 || nc >= SIZE) break;
      if (board[nr][nc] === player) count++;
      else { if (board[nr][nc] === EMPTY) openEnds++; break; }
    }
    if (count >= 5) total += 10000000;
    else if (count === 4) total += openEnds >= 1 ? 1000000 : 100000;
    else if (count === 3) total += openEnds === 2 ? 10000 : openEnds === 1 ? 1000 : 100;
    else if (count === 2) total += openEnds === 2 ? 100 : openEnds === 1 ? 10 : 1;
  }
  return total;
}

function getBestMove() {
  if (moveCount === 0) return [7, 7];

  const neighbors = new Set();
  for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) {
    if (board[r][c] !== EMPTY) {
      for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
        if (dr === 0 && dc === 0) continue;
        const nr = r + dr, nc = c + dc;
        if (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE && board[nr][nc] === EMPTY) {
          neighbors.add(nr * SIZE + nc);
        }
      }
    }
  }

  const scored = [...neighbors].map(idx => {
    const r = Math.floor(idx / SIZE), c = idx % SIZE;
    board[r][c] = WHITE;
    const a = scorePoint(r, c, WHITE);
    board[r][c] = BLACK;
    const b = scorePoint(r, c, BLACK);
    board[r][c] = EMPTY;
    return { r, c, score: a * 1.1 + b };
  }).sort((a, b) => b.score - a.score).slice(0, 20);

  for (const {r, c} of scored) {
    board[r][c] = WHITE;
    if (checkWin(r, c, WHITE)) { board[r][c] = EMPTY; return [r, c]; }
    board[r][c] = EMPTY;
  }
  for (const {r, c} of scored) {
    board[r][c] = BLACK;
    if (checkWin(r, c, BLACK)) { board[r][c] = EMPTY; return [r, c]; }
    board[r][c] = EMPTY;
  }
  return [scored[0].r, scored[0].c];
}

function aiMove() {
  if (gameOver) return;
  const [r, c] = getBestMove();
  placeStone(r, c);
}

init();
</script>
</body>
</html>
