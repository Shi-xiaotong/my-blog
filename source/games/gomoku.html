<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>五子棋 - 小游戏</title>
<link rel="stylesheet" href="common.css">
<script src="ai.js"></script>
<style>
.game-wrap { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; align-items: flex-start; }
.board-container { position: relative; }
.board { display: grid; grid-template-columns: repeat(15, 1fr); background: #d4a574; border-radius: 4px; border: 2px solid #8b6914; width: 480px; height: 480px; position: relative; cursor: pointer; }
.board .cell { position: relative; display: flex; align-items: center; justify-content: center; }
.board .cell::before { content: ''; position: absolute; background: #8b6914; }
.board .cell .h-line { position: absolute; left: 50%; right: 0; top: 50%; height: 1px; background: #8b6914; transform: translateY(-0.5px); }
.board .cell .v-line { position: absolute; top: 50%; bottom: 0; left: 50%; width: 1px; background: #8b6914; transform: translateX(-0.5px); }
.board .cell .stone { width: 28px; height: 28px; border-radius: 50%; position: relative; z-index: 2; cursor: pointer; transition: transform 0.1s; }
.board .cell .stone:hover { transform: scale(1.1); }
.board .cell .stone.black { background: radial-gradient(circle at 35% 35%, #555, #111); box-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
.board .cell .stone.white { background: radial-gradient(circle at 35% 35%, #fff, #ccc); box-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
.board .cell .stone.last::after { content: ''; position: absolute; inset: 8px; border-radius: 50%; background: rgba(239,68,68,0.6); }
.board .cell .stone.win { animation: winPulse 0.6s ease infinite alternate; }
@keyframes winPulse { to { transform: scale(1.1); filter: brightness(1.3); } }
.board .cell .dot { width: 8px; height: 8px; border-radius: 50%; background: #8b6914; position: relative; z-index: 1; }
.side-panel { min-width: 160px; display: flex; flex-direction: column; gap: 12px; }
.panel-box { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
.panel-box h3 { font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; }
.status-text { font-size: 16px; font-weight: 600; text-align: center; margin: 8px 0; }
.win-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 100; }
.win-box { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 32px; text-align: center; }
.win-box h2 { margin-bottom: 8px; }
.win-box p { color: var(--text-secondary); margin-bottom: 16px; }
@media (max-width: 640px) { .game-wrap { flex-direction: column; align-items: center; } .board { width: 100%; max-width: 480px; height: auto; aspect-ratio: 1; } .side-panel { flex-direction: row; flex-wrap: wrap; width: 100%; max-width: 480px; } .panel-box { flex: 1; } }
</style>
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
<div class="container">
  <div class="header">
    <a href="/games/" class="back-link"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> 返回游戏</a>
    <h1>五子棋</h1>
  </div>
  <div class="game-wrap">
    <div class="board-container">
      <div class="board" id="board"></div>
    </div>
    <div class="side-panel">
      <div class="panel-box">
        <h3>状态</h3>
        <div class="status-text" id="status">你的回合 (黑棋)</div>
      </div>
      <div class="panel-box">
        <h3>模式</h3>
        <div style="display:flex;gap:4px;flex-direction:column">
          <button class="btn btn-primary" onclick="newGame('ai')">人机对战</button>
          <button class="btn btn-outline" onclick="newGame('pvp')">双人对战</button>
        </div>
      </div>
      <div class="panel-box">
        <h3>操作</h3>
        <div style="display:flex;gap:4px;flex-direction:column">
          <button class="btn btn-outline" onclick="undoMove()">悔棋</button>
          <button class="btn btn-outline" onclick="newGame()">新游戏</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="win-overlay" id="overlay" style="display:none">
  <div class="win-box">
    <h2 id="winTitle"></h2>
    <p id="winMsg"></p>
    <button class="btn btn-primary" onclick="closeOverlay();newGame()">再来一局</button>
  </div>
</div>

<script>
function toggleTheme(){const h=document.documentElement;const d=h.getAttribute('data-theme')==='light';h.setAttribute('data-theme',d?'':'light');localStorage.setItem('game-theme',d?'dark':'light');const b=document.querySelector('.theme-toggle');b.innerHTML=d?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>':'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>'}
(function(){const s=localStorage.getItem('game-theme');if(s==='light'){document.documentElement.setAttribute('data-theme','light');document.querySelector('.theme-toggle').innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>'}})()

const SIZE = 15;
let board, currentPlayer, gameOver, mode, history, winCells, moveCount;
const EMPTY = 0, BLACK = 1, WHITE = 2;

function init() {
  newGame('ai');
}

function newGame(m) {
  mode = m || mode;
  board = Array.from({length: SIZE}, () => Array(SIZE).fill(EMPTY));
  currentPlayer = BLACK;
  gameOver = false;
  history = [];
  winCells = [];
  moveCount = 0;
  document.getElementById('overlay').style.display = 'none';
  setStatus(mode === 'ai' ? '你的回合 (黑棋)' : '黑棋落子');
  render();
}

function setStatus(msg) { document.getElementById('status').textContent = msg; }

function render() {
  const el = document.getElementById('board');
  el.innerHTML = '';
  // Star points (天元和星位)
  const starPoints = [[3,3],[3,11],[7,7],[11,3],[11,11],[3,7],[7,3],[7,11],[11,7]];
  const starSet = new Set(starPoints.map(([r,c]) => r+','+c));

  for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    // Grid lines
    if (c < SIZE - 1) { const h = document.createElement('div'); h.className = 'h-line'; cell.appendChild(h); }
    if (r < SIZE - 1) { const v = document.createElement('div'); v.className = 'v-line'; cell.appendChild(v); }
    // Star point
    if (starSet.has(r+','+c) && board[r][c] === EMPTY) {
      const dot = document.createElement('div'); dot.className = 'dot'; cell.appendChild(dot);
    }
    // Stone
    if (board[r][c] !== EMPTY) {
      const stone = document.createElement('div');
      stone.className = 'stone ' + (board[r][c] === BLACK ? 'black' : 'white');
      // Last move marker
      if (history.length && history[history.length-1][0] === r && history[history.length-1][1] === c) stone.classList.add('last');
      // Win highlight
      if (winCells.some(([wr,wc]) => wr === r && wc === c)) stone.classList.add('win');
      cell.appendChild(stone);
    }
    cell.onclick = () => placeStone(r, c);
    el.appendChild(cell);
  }
}

function placeStone(r, c) {
  if (gameOver || board[r][c] !== EMPTY) return;
  if (mode === 'ai' && currentPlayer === WHITE) return;

  board[r][c] = currentPlayer;
  history.push([r, c, currentPlayer]);
  moveCount++;

  const win = checkWin(r, c, currentPlayer);
  if (win) {
    winCells = win;
    gameOver = true;
    render();
    const isBlack = currentPlayer === BLACK;
    const title = mode === 'ai' ? (isBlack ? '你赢了!' : 'AI 赢了!') : (isBlack ? '黑棋获胜!' : '白棋获胜!');
    showOverlay(title, moveCount + ' 手');
    return;
  }

  if (moveCount >= SIZE * SIZE) {
    gameOver = true;
    render();
    showOverlay('平局', '棋盘已满');
    return;
  }

  currentPlayer = currentPlayer === BLACK ? WHITE : BLACK;
  render();

  if (mode === 'ai' && currentPlayer === WHITE) {
    setStatus('AI 思考中...');
    setTimeout(aiMove, 50);
  } else {
    setStatus(currentPlayer === BLACK ? '黑棋落子' : '白棋落子');
  }
}

function checkWin(r, c, player) {
  const dirs = [[0,1],[1,0],[1,1],[1,-1]];
  for (const [dr,dc] of dirs) {
    const cells = [[r,c]];
    // Forward
    for (let i = 1; i < 5; i++) { const nr = r+dr*i, nc = c+dc*i; if (nr>=0&&nr<SIZE&&nc>=0&&nc<SIZE&&board[nr][nc]===player) cells.push([nr,nc]); else break; }
    // Backward
    for (let i = 1; i < 5; i++) { const nr = r-dr*i, nc = c-dc*i; if (nr>=0&&nr<SIZE&&nc>=0&&nc<SIZE&&board[nr][nc]===player) cells.push([nr,nc]); else break; }
    if (cells.length >= 5) return cells;
  }
  return null;
}

function undoMove() {
  if (!history.length || gameOver) return;
  if (mode === 'ai') {
    // Undo both AI and player moves
    if (history.length >= 2) {
      const [r2,c2] = history.pop(); board[r2][c2] = EMPTY;
      const [r1,c1] = history.pop(); board[r1][c1] = EMPTY;
      moveCount -= 2;
    } else {
      const [r,c] = history.pop(); board[r][c] = EMPTY;
      moveCount--;
    }
  } else {
    const [r,c] = history.pop(); board[r][c] = EMPTY;
    moveCount--;
    currentPlayer = currentPlayer === BLACK ? WHITE : BLACK;
  }
  setStatus(mode === 'ai' ? '你的回合 (黑棋)' : (currentPlayer === BLACK ? '黑棋落子' : '白棋落子'));
  render();
}

function showOverlay(title, msg) {
  document.getElementById('winTitle').textContent = title;
  document.getElementById('winMsg').textContent = msg;
  document.getElementById('overlay').style.display = 'flex';
  // AI 点评
  if (mode === 'ai' && typeof getGameComment === 'function') {
    const won = title.includes('你赢');
    getGameComment('五子棋', moveCount + '手', won).then(c => {
      if (c) document.getElementById('winMsg').textContent = msg + ' | ' + c;
    });
  }
}
function closeOverlay() { document.getElementById('overlay').style.display = 'none'; }

// ===== AI (启发式评估 + Alpha-Beta) =====

// 棋型评分
const SCORES = {
  FIVE: 10000000,
  OPEN_FOUR: 1000000,
  FOUR: 100000,
  OPEN_THREE: 10000,
  THREE: 1000,
  OPEN_TWO: 100,
  TWO: 10,
  ONE: 1
};

function evaluateLine(line, player) {
  const opp = player === BLACK ? WHITE : BLACK;
  const pCount = line.filter(v => v === player).length;
  const oCount = line.filter(v => v === opp).length;
  const empty = line.filter(v => v === EMPTY).length;

  if (pCount > 0 && oCount > 0) return 0; // Both have stones in this line
  if (pCount === 0 && oCount === 0) return 0;

  const count = Math.max(pCount, oCount);
  const isPlayer = pCount > 0;

  if (count >= 5) return isPlayer ? SCORES.FIVE : -SCORES.FIVE;
  if (count === 4) {
    if (empty === 1) return isPlayer ? SCORES.OPEN_FOUR : -SCORES.OPEN_FOUR;
    return isPlayer ? SCORES.FOUR : -SCORES.FOUR;
  }
  if (count === 3) {
    if (empty === 2) return isPlayer ? SCORES.OPEN_THREE : -SCORES.OPEN_THREE;
    return isPlayer ? SCORES.THREE : -SCORES.THREE;
  }
  if (count === 2) {
    if (empty === 3) return isPlayer ? SCORES.OPEN_TWO : -SCORES.OPEN_TWO;
    return isPlayer ? SCORES.TWO : -SCORES.TWO;
  }
  return isPlayer ? SCORES.ONE : -SCORES.ONE;
}

function evaluateBoard(player) {
  let score = 0;
  const opp = player === BLACK ? WHITE : BLACK;

  // Evaluate all lines of 5
  for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) {
    // Horizontal
    if (c + 4 < SIZE) {
      const line = [board[r][c], board[r][c+1], board[r][c+2], board[r][c+3], board[r][c+4]];
      score += evaluateLine(line, player);
    }
    // Vertical
    if (r + 4 < SIZE) {
      const line = [board[r][c], board[r+1][c], board[r+2][c], board[r+3][c], board[r+4][c]];
      score += evaluateLine(line, player);
    }
    // Diagonal
    if (r + 4 < SIZE && c + 4 < SIZE) {
      const line = [board[r][c], board[r+1][c+1], board[r+2][c+2], board[r+3][c+3], board[r+4][c+4]];
      score += evaluateLine(line, player);
    }
    if (r + 4 < SIZE && c - 4 >= 0) {
      const line = [board[r][c], board[r+1][c-1], board[r+2][c-2], board[r+3][c-3], board[r+4][c-4]];
      score += evaluateLine(line, player);
    }
  }
  return score;
}

function getNeighbors() {
  const neighbors = new Set();
  const range = 2;
  for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) {
    if (board[r][c] !== EMPTY) {
      for (let dr = -range; dr <= range; dr++) for (let dc = -range; dc <= range; dc++) {
        const nr = r + dr, nc = c + dc;
        if (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE && board[nr][nc] === EMPTY) {
          neighbors.add(nr * SIZE + nc);
        }
      }
    }
  }
  return [...neighbors].map(idx => [Math.floor(idx / SIZE), idx % SIZE]);
}

function getCandidates() {
  if (moveCount === 0) return [[7, 7]]; // Center
  const neighbors = getNeighbors();
  // Score and sort candidates
  return neighbors
    .map(([r, c]) => {
      board[r][c] = WHITE;
      const score = evaluateBoard(WHITE);
      board[r][c] = EMPTY;
      return { r, c, score };
    })
    .sort((a, b) => b.score - a.score)
    .slice(0, 20)
    .map(({r, c}) => [r, c]);
}

function alphaBeta(depth, alpha, beta, isMaximizing) {
  // Check for immediate win
  for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) {
    if (board[r][c] !== EMPTY) {
      const player = board[r][c];
      if (checkWin(r, c, player)) {
        return player === WHITE ? SCORES.FIVE : -SCORES.FIVE;
      }
    }
  }

  if (depth === 0) return evaluateBoard(WHITE);

  const candidates = getCandidates();
  if (candidates.length === 0) return 0;

  if (isMaximizing) {
    let maxEval = -Infinity;
    for (const [r, c] of candidates) {
      board[r][c] = WHITE;
      const eval_ = alphaBeta(depth - 1, alpha, beta, false);
      board[r][c] = EMPTY;
      maxEval = Math.max(maxEval, eval_);
      alpha = Math.max(alpha, eval_);
      if (beta <= alpha) break;
    }
    return maxEval;
  } else {
    let minEval = Infinity;
    for (const [r, c] of candidates) {
      board[r][c] = BLACK;
      const eval_ = alphaBeta(depth - 1, alpha, beta, true);
      board[r][c] = EMPTY;
      minEval = Math.min(minEval, eval_);
      beta = Math.min(beta, eval_);
      if (beta <= alpha) break;
    }
    return minEval;
  }
}

function aiMove() {
  if (gameOver) return;

  let bestMove = null;
  let bestScore = -Infinity;

  const candidates = getCandidates();

  // First check for immediate win
  for (const [r, c] of candidates) {
    board[r][c] = WHITE;
    if (checkWin(r, c, WHITE)) {
      board[r][c] = EMPTY;
      placeStone(r, c);
      return;
    }
    board[r][c] = EMPTY;
  }

  // Then check for immediate block
  for (const [r, c] of candidates) {
    board[r][c] = BLACK;
    if (checkWin(r, c, BLACK)) {
      board[r][c] = EMPTY;
      bestMove = [r, c];
      break;
    }
    board[r][c] = EMPTY;
  }

  // Alpha-beta search
  if (!bestMove) {
    const depth = candidates.length > 10 ? 2 : 3;
    for (const [r, c] of candidates) {
      board[r][c] = WHITE;
      const score = alphaBeta(depth - 1, -Infinity, Infinity, false);
      board[r][c] = EMPTY;
      if (score > bestScore) {
        bestScore = score;
        bestMove = [r, c];
      }
    }
  }

  if (bestMove) {
    placeStone(bestMove[0], bestMove[1]);
  }
}

init();
</script>
</body>
</html>
