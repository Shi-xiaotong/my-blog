<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>扫雷 - 小游戏</title>
<link rel="stylesheet" href="common.css">
<style>
.game-container { max-width: 500px; margin: 0 auto; }
.info-bar { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 12px; font-family: 'SF Mono', monospace; }
.info-item { display: flex; align-items: center; gap: 6px; font-size: 18px; font-weight: 700; }
.info-item svg { width: 18px; height: 18px; }
.face-btn { width: 36px; height: 36px; border: 1px solid var(--border); border-radius: 8px; background: var(--card-bg); cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; }
.difficulty { display: flex; gap: 8px; margin-bottom: 16px; justify-content: center; }
.diff-btn { padding: 6px 16px; border: 1px solid var(--border); border-radius: 8px; background: var(--card-bg); color: var(--text); cursor: pointer; font-size: 13px; transition: all 0.15s; }
.diff-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
.board { display: inline-grid; gap: 1px; background: var(--border); border: 2px solid var(--border); border-radius: 6px; padding: 1px; margin: 0 auto; }
.cell { width: 32px; height: 32px; border: none; border-radius: 3px; cursor: pointer; font-weight: 700; font-size: 14px; display: flex; align-items: center; justify-content: center; transition: background 0.1s; user-select: none; -webkit-user-select: none; }
.cell.hidden { background: var(--primary); }
.cell.hidden:hover { filter: brightness(1.15); }
.cell.revealed { background: var(--card-bg); cursor: default; }
.cell.mine { background: #ef4444; }
.cell.flagged { background: var(--warning); }
.cell svg { width: 16px; height: 16px; }
.n1 { color: #3b82f6; } .n2 { color: #22c55e; } .n3 { color: #ef4444; } .n4 { color: #6366f1; }
.n5 { color: #f97316; } .n6 { color: #06b6d4; } .n7 { color: #1e293b; } .n8 { color: #64748b; }
.game-over-msg { text-align: center; padding: 16px; margin-top: 12px; border-radius: 8px; font-weight: 600; font-size: 18px; }
.game-over-msg.win { background: #14532d; color: #22c55e; }
.game-over-msg.lose { background: #7f1d1d; color: #fca5a5; }
.tip { text-align: center; font-size: 12px; color: var(--text-secondary); margin-top: 8px; }
.board-wrap { display: flex; justify-content: center; overflow: auto; }
@media (max-width: 640px) { .cell { width: 28px; height: 28px; font-size: 12px; } }
</style>
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
<div class="container">
  <div class="header">
    <a href="/games/" class="back-link"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> 返回游戏</a>
    <h1>扫雷</h1>
  </div>
  <div class="difficulty">
    <button class="diff-btn active" data-diff="beginner" onclick="setDiff('beginner')">初级 9x9</button>
    <button class="diff-btn" data-diff="intermediate" onclick="setDiff('intermediate')">中级 16x16</button>
    <button class="diff-btn" data-diff="expert" onclick="setDiff('expert')">高级 30x16</button>
  </div>
  <div class="game-container">
    <div class="info-bar">
      <div class="info-item"><svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="8"/></svg> <span id="mineCount">10</span></div>
      <button class="face-btn" id="faceBtn" onclick="newGame()"></button>
      <div class="info-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> <span id="timer">0</span></div>
    </div>
    <div class="board-wrap">
      <div class="board" id="board"></div>
    </div>
    <div id="gameMsg"></div>
    <p class="tip">左键揭开 / 右键标旗 / 长按标旗(移动端)</p>
  </div>
</div>

<script>
function toggleTheme(){const h=document.documentElement;const d=h.getAttribute('data-theme')==='light';h.setAttribute('data-theme',d?'':'light');localStorage.setItem('game-theme',d?'dark':'light');const b=document.querySelector('.theme-toggle');b.innerHTML=d?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>':'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>'}
(function(){const s=localStorage.getItem('game-theme');if(s==='light'){document.documentElement.setAttribute('data-theme','light');document.querySelector('.theme-toggle').innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>'}})()

const DIFFS = {
  beginner: { cols:9, rows:9, mines:10 },
  intermediate: { cols:16, rows:16, mines:40 },
  expert: { cols:30, rows:16, mines:99 }
};

let diff = 'beginner';
let board, revealed, flagged, mineMap;
let cols, rows, mineCount;
let gameOver, win, flagCount, revealedCount;
let seconds, timerInterval, started;

const MINE_SVG = '<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="6"/><line x1="12" y1="2" x2="12" y2="6" stroke="currentColor" stroke-width="2"/><line x1="12" y1="18" x2="12" y2="22" stroke="currentColor" stroke-width="2"/><line x1="2" y1="12" x2="6" y2="12" stroke="currentColor" stroke-width="2"/><line x1="18" y1="12" x2="22" y2="12" stroke="currentColor" stroke-width="2"/></svg>';
const FLAG_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>';

function setDiff(d) {
  diff = d;
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.toggle('active', b.dataset.diff === d));
  newGame();
}

function newGame() {
  const cfg = DIFFS[diff];
  cols = cfg.cols; rows = cfg.rows; mineCount = cfg.mines;
  board = Array.from({length: rows}, () => Array(cols).fill(0));
  revealed = Array.from({length: rows}, () => Array(cols).fill(false));
  flagged = Array.from({length: rows}, () => Array(cols).fill(false));
  mineMap = Array.from({length: rows}, () => Array(cols).fill(false));
  gameOver = false; win = false; flagCount = 0; revealedCount = 0;
  seconds = 0; started = false;
  clearInterval(timerInterval); timerInterval = null;
  document.getElementById('timer').textContent = '0';
  document.getElementById('mineCount').textContent = mineCount;
  document.getElementById('faceBtn').textContent = ':-)';
  document.getElementById('gameMsg').innerHTML = '';
  render();
}

function placeMines(safeR, safeC) {
  let placed = 0;
  while (placed < mineCount) {
    const r = Math.floor(Math.random() * rows);
    const c = Math.floor(Math.random() * cols);
    if (mineMap[r][c] || (Math.abs(r-safeR)<=1 && Math.abs(c-safeC)<=1)) continue;
    mineMap[r][c] = true; placed++;
  }
  for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) {
    if (mineMap[r][c]) { board[r][c] = -1; continue; }
    let count = 0;
    for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
      const nr = r+dr, nc = c+dc;
      if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && mineMap[nr][nc]) count++;
    }
    board[r][c] = count;
  }
}

function reveal(r, c) {
  if (r < 0 || r >= rows || c < 0 || c >= cols || revealed[r][c] || flagged[r][c] || gameOver) return;
  revealed[r][c] = true; revealedCount++;

  if (mineMap[r][c]) {
    gameOver = true; win = false;
    for (let i = 0; i < rows; i++) for (let j = 0; j < cols; j++) if (mineMap[i][j]) revealed[i][j] = true;
    render(); endGame();
    return;
  }

  if (board[r][c] === 0) {
    for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) reveal(r+dr, c+dc);
  }

  if (revealedCount === rows * cols - mineCount) {
    gameOver = true; win = true;
    for (let i = 0; i < rows; i++) for (let j = 0; j < cols; j++) if (mineMap[i][j]) flagged[i][j] = true;
    render(); endGame();
  }
}

function toggleFlag(r, c) {
  if (revealed[r][c] || gameOver) return;
  flagged[r][c] = !flagged[r][c];
  flagCount += flagged[r][c] ? 1 : -1;
  document.getElementById('mineCount').textContent = mineCount - flagCount;
  render();
}

function endGame() {
  clearInterval(timerInterval);
  document.getElementById('faceBtn').textContent = win ? 'B-)' : 'X-(';
  const msg = document.getElementById('gameMsg');
  msg.innerHTML = win
    ? `<div class="game-over-msg win">恭喜通关! 用时 ${seconds} 秒</div>`
    : `<div class="game-over-msg lose">踩雷了! 游戏结束</div>`;

  const bestKey = 'best_minesweeper_' + diff;
  const best = localStorage.getItem(bestKey);
  if (win && (!best || seconds < parseInt(best))) { localStorage.setItem(bestKey, seconds); }
}

function render() {
  const boardEl = document.getElementById('board');
  boardEl.style.gridTemplateColumns = `repeat(${cols}, 32px)`;
  let html = '';
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (revealed[r][c]) {
        if (mineMap[r][c]) {
          html += `<div class="cell mine">${MINE_SVG}</div>`;
        } else {
          const v = board[r][c];
          html += `<div class="cell revealed">${v ? '<span class="n'+v+'">'+v+'</span>' : ''}</div>`;
        }
      } else if (flagged[r][c]) {
        html += `<div class="cell hidden flagged" onclick="reveal(${r},${c})" oncontextmenu="event.preventDefault();toggleFlag(${r},${c})" ontouchstart="startLongPress(event,${r},${c})" ontouchend="cancelLongPress()">${FLAG_SVG}</div>`;
      } else {
        html += `<div class="cell hidden" onclick="handleClick(${r},${c})" oncontextmenu="event.preventDefault();toggleFlag(${r},${c})" ontouchstart="startLongPress(event,${r},${c})" ontouchend="cancelLongPress()"></div>`;
      }
    }
  }
  boardEl.innerHTML = html;

  // Adjust cell size on mobile
  if (window.innerWidth < 640 && cols > 16) {
    const size = Math.floor((window.innerWidth - 60) / cols);
    boardEl.style.gridTemplateColumns = `repeat(${cols}, ${size}px)`;
    boardEl.querySelectorAll('.cell').forEach(c => { c.style.width = size+'px'; c.style.height = size+'px'; c.style.fontSize = (size > 20 ? 12 : 10)+'px'; });
  }
}

let longPressTimer = null;
function startLongPress(e, r, c) {
  longPressTimer = setTimeout(() => { e.preventDefault(); toggleFlag(r, c); }, 400);
}
function cancelLongPress() { clearTimeout(longPressTimer); }

function handleClick(r, c) {
  if (!started) { started = true; placeMines(r, c); timerInterval = setInterval(() => { seconds++; document.getElementById('timer').textContent = seconds; }, 1000); }
  reveal(r, c);
  render();
}

newGame();
</script>
</body>
</html>
