<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>打字速度 - 小游戏</title>
<link rel="stylesheet" href="common.css">
<script src="ai.js"></script>
<style>
.game-container { max-width: 700px; margin: 0 auto; }
.mode-select { display: flex; gap: 8px; margin-bottom: 16px; justify-content: center; flex-wrap: wrap; }
.mode-btn { padding: 6px 16px; border: 1px solid var(--border); border-radius: 8px; background: var(--card-bg); color: var(--text); cursor: pointer; font-size: 13px; transition: all 0.15s; }
.mode-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
.text-display { background: var(--card-bg); border: 2px solid var(--border); border-radius: 10px; padding: 20px; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 18px; line-height: 1.8; margin-bottom: 16px; height: 280px; overflow-y: auto; position: relative; cursor: text; word-break: break-word; }
.text-display .char { transition: color 0.05s; display: inline; }
.text-display .char.space { display: inline; }
.text-display .char.space.current { background: var(--primary); border-radius: 2px; }
.text-display .char.correct { color: var(--accent); }
.text-display .char.wrong { color: var(--danger); background: rgba(239,68,68,0.15); border-radius: 2px; }
.text-display .char.current { border-bottom: 2px solid var(--primary); }
.text-display .char.pending { color: var(--text-secondary); }
.hidden-input { position: fixed; top: -100px; left: -100px; opacity: 0; width: 1px; height: 1px; }
.stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
.stat-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px; text-align: center; }
.stat-card .num { font-size: 28px; font-weight: 700; font-family: 'SF Mono', monospace; color: var(--primary); }
.stat-card .lbl { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
.result-panel { background: var(--card-bg); border: 2px solid var(--primary); border-radius: 12px; padding: 24px; text-align: center; margin-bottom: 16px; display: none; }
.result-panel h2 { font-size: 1.5em; margin-bottom: 12px; }
.result-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin: 16px 0; }
.result-item .num { font-size: 32px; font-weight: 700; font-family: 'SF Mono', monospace; color: var(--primary); }
.result-item .lbl { font-size: 13px; color: var(--text-secondary); }
.tip { text-align: center; font-size: 13px; color: var(--text-secondary); margin-top: 8px; }
@media (max-width: 640px) { .stats-bar { grid-template-columns: repeat(2, 1fr); } .text-display { font-size: 15px; } }
</style>
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
<div class="container">
  <div class="header">
    <a href="/games/" class="back-link"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> 返回游戏</a>
    <h1>打字速度</h1>
  </div>
  <div class="game-container">
    <div class="mode-select">
      <button class="mode-btn active" data-mode="english" onclick="setMode('english')">英文</button>
      <button class="mode-btn" data-mode="code" onclick="setMode('code')">代码</button>
      <button class="mode-btn" data-mode="mixed" onclick="setMode('mixed')">混合</button>
    </div>
    <div class="stats-bar">
      <div class="stat-card"><div class="num" id="wpm">0</div><div class="lbl">WPM</div></div>
      <div class="stat-card"><div class="num" id="accuracy">100%</div><div class="lbl">准确率</div></div>
      <div class="stat-card"><div class="num" id="chars">0</div><div class="lbl">字符数</div></div>
      <div class="stat-card"><div class="num" id="time">0s</div><div class="lbl">用时</div></div>
    </div>
    <div class="text-display" id="textDisplay" onclick="focusInput()">
      <span id="textContent"></span>
    </div>
    <input class="hidden-input" id="hiddenInput" oninput="onInput(event)" onkeydown="onKeyDown(event)" autofocus>
    <div class="result-panel" id="resultPanel">
      <h2>测试完成</h2>
      <div class="result-grid">
        <div class="result-item"><div class="num" id="resWpm">0</div><div class="lbl" id="resWpmLabel">WPM (每分钟字数)</div></div>
        <div class="result-item"><div class="num" id="resAccuracy">0%</div><div class="lbl">准确率</div></div>
        <div class="result-item"><div class="num" id="resChars">0</div><div class="lbl">总字符</div></div>
        <div class="result-item"><div class="num" id="resTime">0s</div><div class="lbl">用时</div></div>
      </div>
      <p id="resBest" style="color:var(--warning);margin-bottom:16px"></p>
      <button class="btn btn-primary" onclick="newTest()">再来一次</button>
    </div>
    <div style="text-align:center">
      <button class="btn btn-primary" onclick="newTest()">换一段</button>
      <button class="btn btn-outline" id="aiBtn" onclick="aiGenerate()">AI 生成</button>
    </div>
    <p class="tip">点击文本区域开始输入，完成后自动结算</p>
  </div>
</div>

<script>
function toggleTheme(){const h=document.documentElement;const d=h.getAttribute('data-theme')==='light';h.setAttribute('data-theme',d?'':'light');localStorage.setItem('game-theme',d?'dark':'light');const b=document.querySelector('.theme-toggle');b.innerHTML=d?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>':'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>'}
(function(){const s=localStorage.getItem('game-theme');if(s==='light'){document.documentElement.setAttribute('data-theme','light');document.querySelector('.theme-toggle').innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>'}})()

const TEXTS = {
  english: [
    "The quick brown fox jumps over the lazy dog. Pack my box with five dozen liquor jugs. How vexingly quick daft zebras jump.",
    "Programming is the art of telling another human being what one wants the computer to do. Software is a great combination of artistry and engineering.",
    "In the beginning there was nothing. Then there was everything. The universe is not only queerer than we suppose, but queerer than we can suppose.",
    "Technology is best when it brings people together. Innovation distinguishes between a leader and a follower. Stay hungry, stay foolish.",
    "The best time to plant a tree was twenty years ago. The second best time is now. Every great developer you know got there by solving problems they were unqualified to solve.",
  ],
  code: [
    'function fibonacci(n) {\n  if (n <= 1) return n;\n  return fibonacci(n - 1) + fibonacci(n - 2);\n}\n\nconsole.log(fibonacci(10));',
    'const arr = [1, 2, 3, 4, 5];\nconst doubled = arr.map(x => x * 2);\nconst sum = arr.reduce((a, b) => a + b, 0);\nconsole.log(doubled, sum);',
    'async function fetchData(url) {\n  const res = await fetch(url);\n  const data = await res.json();\n  return data;\n}',
    'class Animal {\n  constructor(name) {\n    this.name = name;\n  }\n  speak() {\n    return `${this.name} makes a sound.`;\n  }\n}',
    'for (let i = 0; i < 10; i++) {\n  if (i % 3 === 0) continue;\n  if (i % 5 === 0) break;\n  console.log(i);\n}',
  ],
  mixed: [
    'The HTTP status code 200 means "OK". A 404 error means the resource was not found. Use fetch() to make API requests.',
    'Docker containers are lightweight and portable. Run "docker build -t myapp ." to build an image, then "docker run -p 3000:3000 myapp".',
    'Git is a distributed version control system. Common commands: git add, git commit, git push, git pull, git branch, git merge.',
    'CSS Grid and Flexbox are powerful layout tools. Use display: grid for 2D layouts and display: flex for 1D layouts.',
    'REST APIs use HTTP methods: GET to read, POST to create, PUT to update, DELETE to remove. Status codes indicate success or failure.',
  ]
};

let mode = 'english';
let targetText = '';
let charStates = [];
let cursorPos = 0;
let startTime = null;
let totalTyped = 0;
let totalCorrect = 0;
let finished = false;
let timer = null;

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === m));
  newTest();
}

function pickText() {
  const pool = TEXTS[mode];
  return pool[Math.floor(Math.random() * pool.length)];
}

function newTest() {
  targetText = pickText();
  charStates = Array(targetText.length).fill('pending');
  cursorPos = 0; startTime = null; totalTyped = 0; totalCorrect = 0; finished = false;
  clearInterval(timer);
  document.getElementById('wpm').textContent = '0';
  document.getElementById('accuracy').textContent = '100%';
  document.getElementById('chars').textContent = '0';
  document.getElementById('time').textContent = '0s';
  document.getElementById('resultPanel').style.display = 'none';
  document.getElementById('textDisplay').scrollTop = 0;
  renderText();
  focusInput();
}

function focusInput() {
  document.getElementById('hiddenInput').focus();
}

async function aiGenerate() {
  if (typeof generateTypingText !== 'function') return;
  const btn = document.getElementById('aiBtn');
  btn.textContent = '生成中...';
  btn.disabled = true;
  const text = await generateTypingText();
  if (text) {
    targetText = text.trim();
    charStates = Array(targetText.length).fill('pending');
    cursorPos = 0; startTime = null; totalTyped = 0; totalCorrect = 0; finished = false;
    clearInterval(timer);
    document.getElementById('wpm').textContent = '0';
    document.getElementById('accuracy').textContent = '100%';
    document.getElementById('chars').textContent = '0';
    document.getElementById('time').textContent = '0s';
    document.getElementById('resultPanel').style.display = 'none';
    document.getElementById('textDisplay').scrollTop = 0;
    renderText();
    focusInput();
  }
  btn.textContent = 'AI 生成';
  btn.disabled = false;
}

function renderText() {
  const el = document.getElementById('textContent');
  el.innerHTML = targetText.split('').map((ch, i) => {
    const cls = charStates[i];
    if (ch === '\n') return '<br>';
    if (ch === ' ') return `<span class="char space ${cls} ${i === cursorPos && !finished ? 'current' : ''}"> </span>`;
    return `<span class="char ${cls} ${i === cursorPos && !finished ? 'current' : ''}">${escapeHtml(ch)}</span>`;
  }).join('');
  // Auto-scroll to keep current character visible
  scrollToCurrent();
}

function scrollToCurrent() {
  const el = document.getElementById('textDisplay');
  const currentChar = document.getElementById('textContent').querySelector('.current');
  if (!currentChar) return;
  const elRect = el.getBoundingClientRect();
  const charRect = currentChar.getBoundingClientRect();
  // If char is below visible area, scroll down; if above, scroll up
  if (charRect.bottom > elRect.bottom) {
    el.scrollTop += charRect.bottom - elRect.bottom + 40;
  } else if (charRect.top < elRect.top) {
    el.scrollTop -= elRect.top - charRect.top + 40;
  }
}

function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function onKeyDown(e) {
  if (finished) return;
  if (e.key === 'Backspace') {
    e.preventDefault();
    if (cursorPos > 0) { cursorPos--; charStates[cursorPos] = 'pending'; renderText(); }
    return;
  }
  if (e.key === 'Tab') { e.preventDefault(); return; }
}

function onInput(e) {
  if (finished) return;
  const val = e.target.value;
  e.target.value = '';
  if (!val) return;
  processInput(val);
}

function processInput(val) {
  if (finished || !val) return;

  if (!startTime) { startTime = Date.now(); startTimer(); }

  for (const ch of val) {
    if (cursorPos >= targetText.length) break;
    totalTyped++;
    if (ch === targetText[cursorPos]) { charStates[cursorPos] = 'correct'; totalCorrect++; }
    else { charStates[cursorPos] = 'wrong'; }
    cursorPos++;
  }

  renderText();
  updateStats();

  if (cursorPos >= targetText.length) finishTest();
}

function startTimer() {
  timer = setInterval(() => {
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    document.getElementById('time').textContent = elapsed + 's';
    updateStats();
  }, 200);
}

function updateStats() {
  if (!startTime) return;
  const elapsed = (Date.now() - startTime) / 1000 / 60;
  const wpm = elapsed > 0 ? Math.round((totalCorrect / 5) / elapsed) : 0;
  const accuracy = totalTyped > 0 ? Math.round((totalCorrect / totalTyped) * 100) : 100;
  document.getElementById('wpm').textContent = wpm;
  document.getElementById('accuracy').textContent = accuracy + '%';
  document.getElementById('chars').textContent = totalTyped;
}

function finishTest() {
  finished = true;
  clearInterval(timer);
  const elapsed = Math.floor((Date.now() - startTime) / 1000);
  const elapsedMin = elapsed / 60;
  const wpm = elapsedMin > 0 ? Math.round((totalCorrect / 5) / elapsedMin) : 0;
  const accuracy = totalTyped > 0 ? Math.round((totalCorrect / totalTyped) * 100) : 100;

  document.getElementById('resWpm').textContent = wpm;
  document.getElementById('resAccuracy').textContent = accuracy + '%';
  document.getElementById('resChars').textContent = totalTyped;
  document.getElementById('resTime').textContent = elapsed + 's';

  const bestKey = 'best_wpm';
  const best = localStorage.getItem(bestKey);
  const bestEl = document.getElementById('resBest');
  if (!best || wpm > parseInt(best)) {
    localStorage.setItem(bestKey, wpm);
    bestEl.textContent = '新纪录!';
  } else {
    bestEl.textContent = '最高记录: ' + best + ' WPM';
  }

  document.getElementById('resultPanel').style.display = 'block';
}

newTest();
</script>
<script src="track.js"></script>
</body>
</html>
