<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048 - 小游戏</title>
<link rel="icon" href="/img/favicon.ico" type="image/x-icon">
<link rel="stylesheet" href="common.css">
<style>
.game-container { max-width: 400px; margin: 0 auto; position: relative; }
.grid-bg { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 8px; background: var(--border); border-radius: 10px; }
.grid-bg .cell { width: 100%; aspect-ratio: 1; background: rgba(255,255,255,0.06); border-radius: 8px; }
[data-theme="light"] .grid-bg .cell { background: rgba(0,0,0,0.05); }
.tile-layer { position: absolute; inset: 8px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; pointer-events: none; }
.tile { border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 700; transition: all 0.12s ease; font-family: 'SF Mono', monospace; }
.tile.t2 { background: #eee4da; color: #776e65; font-size: 32px; }
.tile.t4 { background: #ede0c8; color: #776e65; font-size: 32px; }
.tile.t8 { background: #f2b179; color: #f9f6f2; font-size: 32px; }
.tile.t16 { background: #f59563; color: #f9f6f2; font-size: 30px; }
.tile.t32 { background: #f67c5f; color: #f9f6f2; font-size: 30px; }
.tile.t64 { background: #f65e3b; color: #f9f6f2; font-size: 30px; }
.tile.t128 { background: #edcf72; color: #f9f6f2; font-size: 26px; }
.tile.t256 { background: #edcc61; color: #f9f6f2; font-size: 26px; }
.tile.t512 { background: #edc850; color: #f9f6f2; font-size: 26px; }
.tile.t1024 { background: #edc53f; color: #f9f6f2; font-size: 22px; }
.tile.t2048 { background: #edc22e; color: #f9f6f2; font-size: 22px; }
.tile.tsuper { background: #3c3a32; color: #f9f6f2; font-size: 18px; }
.game-over-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.6); display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 10px; z-index: 10; }
.game-over-overlay h2 { font-size: 2.5em; margin-bottom: 8px; }
.game-over-overlay p { color: var(--text-secondary); margin-bottom: 16px; font-size: 18px; }
.controls { display: flex; gap: 8px; margin-top: 16px; justify-content: center; flex-wrap: wrap; }
.tip { text-align: center; font-size: 13px; color: var(--text-secondary); margin-top: 12px; }
</style>
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
<div class="container">
  <div class="header">
    <a href="/games/" class="back-link"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> 返回游戏</a>
    <h1>2048</h1>
  </div>
  <div class="score-bar">
    <div class="score-item"><div class="score-label">分数</div><div class="score-value" id="score">0</div></div>
    <div class="score-item"><div class="score-label">最高</div><div class="score-value" id="best">0</div></div>
  </div>
  <div class="game-container" id="gameContainer">
    <div class="grid-bg" id="gridBg"></div>
    <div class="tile-layer" id="tileLayer"></div>
    <div class="game-over-overlay" id="gameOver" style="display:none">
      <h2>Game Over</h2>
      <p id="finalScore"></p>
      <button class="btn btn-primary" onclick="newGame()">再来一局</button>
    </div>
  </div>
  <div class="controls">
    <button class="btn btn-primary" onclick="newGame()">新游戏</button>
    <button class="btn btn-outline" onclick="undoMove()">撤销</button>
  </div>
  <p class="tip">方向键 / WASD / 滑动操作</p>
</div>

<script>
function toggleTheme(){const h=document.documentElement;const d=h.getAttribute('data-theme')==='light';h.setAttribute('data-theme',d?'':'light');localStorage.setItem('game-theme',d?'dark':'light');const b=document.querySelector('.theme-toggle');b.innerHTML=d?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>':'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>'}
(function(){const s=localStorage.getItem('game-theme');if(s==='light'){document.documentElement.setAttribute('data-theme','light');document.querySelector('.theme-toggle').innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>'}})()

let grid, score, best, prevGrid, prevScore;

function init() {
  document.getElementById('gridBg').innerHTML = Array.from({length:16}, () => '<div class="cell"></div>').join('');
  best = parseInt(localStorage.getItem('best_2048')) || 0;
  document.getElementById('best').textContent = best;
  newGame();
}

function newGame() {
  grid = Array.from({length:4}, () => Array(4).fill(0));
  score = 0;
  prevGrid = null;
  prevScore = 0;
  document.getElementById('gameOver').style.display = 'none';
  addRandom(); addRandom();
  render();
}

function addRandom() {
  const empty = [];
  for (let r = 0; r < 4; r++) for (let c = 0; c < 4; c++) if (!grid[r][c]) empty.push([r, c]);
  if (!empty.length) return;
  const [r, c] = empty[Math.floor(Math.random() * empty.length)];
  grid[r][c] = Math.random() < 0.9 ? 2 : 4;
}

function render() {
  const layer = document.getElementById('tileLayer');
  let html = '';
  for (let r = 0; r < 4; r++) {
    for (let c = 0; c < 4; c++) {
      const v = grid[r][c];
      if (v) {
        const cls = v <= 2048 ? 't' + v : 'tsuper';
        html += `<div class="tile ${cls}">${v}</div>`;
      } else {
        html += '<div></div>';
      }
    }
  }
  layer.innerHTML = html;
  document.getElementById('score').textContent = score;
  if (score > best) { best = score; localStorage.setItem('best_2048', best); }
  document.getElementById('best').textContent = best;
}

function slide(row) {
  let arr = row.filter(v => v);
  let merged = false;
  for (let i = 0; i < arr.length - 1; i++) {
    if (arr[i] === arr[i + 1]) { arr[i] *= 2; score += arr[i]; arr.splice(i + 1, 1); merged = true; }
  }
  while (arr.length < 4) arr.push(0);
  return { result: arr, moved: row.some((v, i) => v !== arr[i]) };
}

function move(dir) {
  prevGrid = grid.map(r => [...r]);
  prevScore = score;
  let moved = false;

  if (dir === 'left') {
    for (let r = 0; r < 4; r++) { const s = slide(grid[r]); if (s.moved) moved = true; grid[r] = s.result; }
  } else if (dir === 'right') {
    for (let r = 0; r < 4; r++) { const s = slide([...grid[r]].reverse()); if (s.moved) moved = true; grid[r] = s.result.reverse(); }
  } else if (dir === 'up') {
    for (let c = 0; c < 4; c++) { const col = [grid[0][c], grid[1][c], grid[2][c], grid[3][c]]; const s = slide(col); if (s.moved) moved = true; for (let r = 0; r < 4; r++) grid[r][c] = s.result[r]; }
  } else if (dir === 'down') {
    for (let c = 0; c < 4; c++) { const col = [grid[3][c], grid[2][c], grid[1][c], grid[0][c]]; const s = slide(col); if (s.moved) moved = true; for (let r = 0; r < 4; r++) grid[3 - r][c] = s.result[r]; }
  }

  if (moved) { addRandom(); render(); if (isGameOver()) showGameOver(); }
}

function isGameOver() {
  for (let r = 0; r < 4; r++) for (let c = 0; c < 4; c++) {
    if (!grid[r][c]) return false;
    if (c < 3 && grid[r][c] === grid[r][c + 1]) return false;
    if (r < 3 && grid[r][c] === grid[r + 1][c]) return false;
  }
  return true;
}

function showGameOver() {
  document.getElementById('finalScore').textContent = '得分: ' + score;
  document.getElementById('gameOver').style.display = 'flex';
}

function undoMove() {
  if (prevGrid) { grid = prevGrid; score = prevScore; prevGrid = null; render(); document.getElementById('gameOver').style.display = 'none'; }
}

// Keyboard
document.addEventListener('keydown', e => {
  const map = { ArrowLeft:'left', ArrowRight:'right', ArrowUp:'up', ArrowDown:'down', a:'left', d:'right', w:'up', s:'down' };
  if (map[e.key]) { e.preventDefault(); move(map[e.key]); }
});

// Touch
let touchX, touchY;
const container = document.getElementById('gameContainer');
container.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; touchY = e.touches[0].clientY; }, {passive:true});
container.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchX;
  const dy = e.changedTouches[0].clientY - touchY;
  const absDx = Math.abs(dx), absDy = Math.abs(dy);
  if (Math.max(absDx, absDy) < 30) return;
  if (absDx > absDy) move(dx > 0 ? 'right' : 'left');
  else move(dy > 0 ? 'down' : 'up');
}, {passive:true});

init();
</script>
<script src="track.js"></script>
</body>
</html>
