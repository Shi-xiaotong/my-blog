# --------------------------------------
# 看板娘 (Live2D)
# --------------------------------------
live2d:
  enable: false
  # 是否启用拖拽功能
  drag: true
  # 控制面板显示的按钮（留空则不显示任何按钮）
  # 可选: hitokoto(一言), asteroids(小行星), switch-model(切换模型),
  #       switch-texture(切换材质), photo(拍照), info(信息), quit(关闭)
  tools:
#    - hitokoto
#    - asteroids
#    - switch-model
#    - switch-texture
#    - photo
#    - info
#    - quit