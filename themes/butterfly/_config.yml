# --------------------------------------
# Hexo Butterfly 主题配置
# 如果您有任何问题，请参考文档
# 中文文档: https://butterfly.js.org/
# English: https://butterfly.js.org/en/
# 图片代理 image_proxy_prefix: https://lz.qaiu.top/parser?url=
# --------------------------------------

# 主题颜色
theme_color:
  enable: true
  main: "#3b82f6"
  paginator: "#3b82f6"
  button_hover: "#2563eb"
  text_selection: "#3b82f6"
  link_color: "#3b82f6"
  meta_color: "#64748b"
  hr_color: "#3b82f6"
  code_foreground: "#ef4444"
  code_background: "rgba(27, 31, 35, .05)"
  toc_color: "#3b82f6"
  blockquote_padding_color: "#3b82f6"
  blockquote_background_color: "rgba(59, 130, 246, 0.15)"
  scrollbar_color: "#3b82f6"
  meta_theme_color_light: "ffffff"
  meta_theme_color_dark: "#0d0d0d"

# --------------------------------------
# 导航设置
# --------------------------------------

nav:
  # 导航栏 logo 图片
  logo: https://img.233002.xyz/assets/logo.webp
  display_title: true
  display_post_title: true
  # 是否固定导航栏
  fixed: false

menu:
  首页: / || fas fa-home
  导航: /bookmarks/ || fas fa-compass
  万年历: /calendar/ || fas fa-calendar-alt
  天气: /weather/ || fas fa-cloud-sun
  友链: /links/ || fas fa-link
  关于: /about/ || fas fa-heart

# --------------------------------------
# 代码块设置
# --------------------------------------

code_blocks:
  # 代码块主题: darker / pale night / light / ocean / false
  theme: darker
  macStyle: false
  # 代码块高度限制（单位：px）
  height_limit: false
  word_wrap: false

  # 工具栏
  copy: true
  language: true
  # true: 收起代码块 | false: 展开代码块 | none: 展开代码块并隐藏按钮
  shrink: false
  fullpage: false

# 社交媒体链接
# 格式：
#   图标: 链接 || 描述 || 颜色
social:
  fab fa-github: https://github.com/Shi-xiaotong || Github || '#24292e'
  fas fa-envelope: mailto:505350617@qq.com || Email || '#4a7dbe'
  fab fa-qq: https://qm.qq.com/q/Th9Z1ef8QY || QQ || '#12b5e1'
  fab fa-bilibili: https://space.bilibili.com/481000222 || B站 || '#00a1d6'
  fab fa-tiktok: https://v.douyin.com/51Ay-STNVCA || 抖音 || '#010101'

# --------------------------------------
# 图片设置
# --------------------------------------

favicon: /img/favicon.ico

avatar:
  img: https://img.233002.xyz/assets/avatar.webp
  effect: false

# 禁用所有顶部图片
disable_top_img: false

# 如果页面没有设置横幅图片，将显示 default_top_img
default_top_img:

# 首页横幅图片
index_img: 

# 归档页横幅图片
archive_img:

# 注意：标签页面，不是 tags 页面
tag_img:

# 标签页横幅图片，您可以为您每个标签设置横幅图片
# 格式：
#  - 标签名: xxxxx
tag_per_img:

# 注意：分类页面，不是 categories 页面
category_img:

# 分类页横幅图片，您可以为您每个分类设置横幅图片
# 格式：
#  - 分类名: xxxxx
category_per_img:

# 页脚背景图片
footer_img: false

# 网站背景
# 可以设置为颜色、图片 URL 或包含颜色和/或图片 URL 的数组
# 如果提供了数组，每次加载时会从数组中随机选择背景
# background: null
background: "#0f172a"

cover:
  # 是否禁用封面
  index_enable: true
  aside_enable: false
  archives_enable: false
  # 当没有设置封面时，显示 CSS 渐变
  default_cover:
    - 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)'
    - 'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)'
    - 'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)'
    - 'linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)'
    - 'linear-gradient(135deg, #fa709a 0%, #fee140 100%)'
    - 'linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%)'
    - 'linear-gradient(135deg, #fccb90 0%, #d57eeb 100%)'
    - 'linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%)'
    - 'linear-gradient(135deg, #0c3483 0%, #a2b6df 100%)'
    - 'linear-gradient(135deg, #f12711 0%, #f5af19 100%)'

# 替换失效图片
error_img:
  flink: /img/friend_404.gif
  post_page: /img/404.png

# 简单 404 页面
error_404:
  enable: true
  subtitle: '页面走丢了，可能是链接有误或已被移除。'
  background: /img/error-page.png

post_meta:
  # 主页
  page:
    # 选择: created / updated / both
    date_type: created
    # 选择: date / relative
    date_format: date
    categories: true
    tags: false
    label: true
  post:
    # 选择: left / center
    position: left
    # 选择: created / updated / both
    date_type: both
    # 选择: date / relative
    date_format: date
    categories: true
    tags: true
    label: true

# --------------------------------------
# 主页设置
# --------------------------------------

# 首页 top_img 设置
# default: top img - 全屏，站点信息 - 中间
# 站点信息的位置，例如：300px/300em/300rem/10%
index_site_info_top:
# top_img 的高度，例如：300px/300em/300rem
index_top_img_height:

# 主页副标题
subtitle:
  enable: true
  # 打字机效果
  effect: true
  # 自定义 typed.js
  # https://github.com/mattboldt/typed.js/#customization
  typed_option:
    # 打字速度（毫秒），数值越大越慢
    typeSpeed: 100
    # 删除速度（毫秒），数值越大越慢
    backSpeed: 60
    # 开始打字前的延迟（毫秒）
    startDelay: 300
    # 两句话之间的间隔（毫秒）
    backDelay: 1500
    # 光标字符，比如可以换成 '_' 或 '▶'
    cursorChar: "|"
    # 是否循环播放
    loop: true
    # 是否智能删除（只删除不同的部分）
    smartBackspace: true
  # 来源 - 调用第三方服务 API（仅限中文）
  # 它会先显示来源，然后显示 sub 的内容
  # 选择: false/1/2/3
  # false - 禁用该功能
  # 1 - hitokoto.cn
  # 2 - https://api.aa1.cn/doc/yiyan.html
  # 3 - jinrishici.com
  source: false
  # 如果关闭打字机效果，副标题只会显示 sub 的第一行
  sub:
    - '欢迎来到我的小世界'
    - '这里记录着代码与生活的点滴'
    - '很高兴你能来这里看看'
    - '愿你在忙碌的生活中找到片刻宁静'
    - '每一次访问都是一次美好的相遇'
    - '希望这里的内容能给你带来一些灵感'
    - '世界很大，很高兴与你在这里相遇'
    - '坐下来，喝杯茶，慢慢看'
    - '感谢你的每一次停留'
    - '愿你在这里找到有趣的东西'

# 主页文章布局
# 1: 封面在左，文章信息在右
# 2: 封面在右，文章信息在左
# 3: 封面和信息交替显示在左右
# 4: 封面上，文章信息在下
# 5: 信息显示在封面上
# 6: 瀑布流布局 - 封面上，文章信息在下
# 7: 瀑布流布局 - 信息显示在封面上
index_layout: 3

# 在首页显示文章简介
# 1: description
# 2: both（如果存在 description，显示 description；否则显示 auto_excerpt）
# 3: auto_excerpt（默认）
# false: 不显示文章简介
index_post_content:
  method: 2
  # 如果您设置 method 为 2 或 3，需要配置长度
  length: 500

# --------------------------------------
# 文章设置
# --------------------------------------

toc:
  post: true
  page: false
  number: true
  expand: false
  # 仅对文章页生效
  style_simple: false
  scroll_percent: true

post_copyright:
  enable: true
  decode: false
  author_href:
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

# 赞助/打赏
reward:
  enable: false
  text:
  QR_code:
  # - img: /img/wechat.jpg
  #   link:
  #   text: 微信
  # - img: /img/alipay.jpg
  #   link:
  #   text: 支付宝

# 文章编辑
# 轻松在线浏览和编辑博客源代码
post_edit:
  enable: false
  # url: https://github.com/user-name/repo-name/edit/branch-name/subdirectory-name/
  # 例如: https://github.com/jerryc127/butterfly.js.org/edit/main/source/
  url:

# 相关文章
related_post:
  enable: true
  # 显示的文章数量
  limit: 6
  # 选择: created / updated
  date_type: created

# 选择: 1 / 2 / false
# 1: "上一篇" 链接到较旧的文章
# 2: "下一篇" 链接到较新的文章
# false: 禁用分页
post_pagination: 1

# 显示文章过时提醒
noticeOutdate:
  enable: false
  # 样式: simple / flat
  style: flat
  # 多少天后显示
  limit_day: 365
  # 位置: top / bottom
  position: top
  message_prev: 距离上次更新已过去
  message_next: 天，文章内容可能已过时。

# --------------------------------------
# 页脚设置
# --------------------------------------
footer:
  nav:
  owner:
    enable: true
    since: 2025
  # 主题和框架的版权
  copyright:
    enable: false
    version: false
  custom_text:
    ✨ 种一棵树最好的时间是十年前，其次是现在

# --------------------------------------
# 侧边栏设置
# --------------------------------------

aside:
  enable: true
  hide: false
  # 在右下角显示隐藏侧边栏的按钮
  button: true
  mobile: true
  # 位置: left / right
  position: right
  display:
    archive: true
    tag: true
    category: true
  card_author:
    enable: true
    description:
    button:
      enable: true
      icon: fab fa-github
      text: 关注我
      link: https://github.com/Shi-xiaotong
  card_announcement:
    enable: true
    content: 难道我不是天才吗…
  card_weather:
    enable: true
    # 默认位置
    default_location:
      city: 北京
      lat: 39.9042
      lon: 116.4074
  card_calendar:
    enable: true
  card_recent_post:
    enable: true
    # 设置为 0 将显示全部
    limit: 1
    # 排序: date / updated
    sort: date
    sort_order:
  card_newest_comments:
    enable: false
    sort_order:
    limit: 6
    # 单位：分钟，将数据保存到 localStorage
    storage: 10
    avatar: true
  card_categories:
    enable: false
    # 设置为 0 将显示全部
    limit: 8
    # 选择: none / true / false
    expand: none
    sort_order:
  card_tags:
    enable: true
    # 设置为 0 将显示全部
    limit: 40
    color: true
    custom_colors:
    # 标签排序方式，random/name/length
    orderby: random
    # 排序顺序。1 为升序；-1 为降序
    order: 1
    sort_order:
  card_archives:
    enable: false
    # 类型: monthly / yearly
    type: yearly
    # 例如: YYYY年MM月
    format: MMMM YYYY
    # 排序顺序。1 为升序；-1 为降序
    order: -1
    # 设置为 0 将显示全部
    limit: 8
    sort_order:
  card_post_series:
    enable: true
    # 标题显示系列名称
    series_title: false
    # 按标题或日期排序
    orderBy: 'date'
    # 排序顺序。1 为升序；-1 为降序
    order: -1
  card_webinfo:
    enable: false
    post_count: true
    last_push_date: true
    sort_order:
    # 发布日期与现在的时间差
    # 格式: Month/Day/Year Time 或 Year/Month/Day Time
    # 如果不启用此功能，请留空
    runtime_date:

# --------------------------------------
# 右下角按钮
# --------------------------------------

# 右下角按钮与底部的距离（默认单位：px）
rightside_bottom:

# 繁简中文转换
translate:
  enable: true
  # 按钮的文字
  default: 繁
  # 网站语言 (1 - 繁体中文/ 2 - 简体中文）
  defaultEncoding: 2
  # 时间延迟
  translateDelay: 0
  # 语言为简体中文时按钮的文字
  msgToTraditionalChinese: '繁'
  # 语言为繁体中文时按钮的文字
  msgToSimplifiedChinese: '简'

# 阅读模式
readmode: true

# 夜间模式
darkmode:
  enable: true
  # 切换深色/浅色模式的按钮
  button: true
  # 自动切换深色/浅色模式
  # autoChangeMode: 1  跟随系统设置，如果系统不支持深色模式，将在下午 6 点到早上 6 点之间切换深色模式
  # autoChangeMode: 2  在下午 6 点到早上 6 点之间切换深色模式
  # autoChangeMode: false
  autoChangeMode: 1
  # 设置浅色模式的时间。值为 0 到 24 之间。如果不设置，默认为 6 和 18
  start:
  end:

# 在回到顶部按钮中显示滚动百分比
rightside_scroll_percent: true

# 除非您知道如何工作，否则不要修改以下设置
# 选择: readmode,translate,darkmode,hideAside,toc,chat,comment
# 不要重复相同的值
rightside_item_order:
  enable: false
  # 默认: readmode,translate,darkmode,hideAside
  hide:
  # 默认: toc,chat,comment
  show:

# 右下角配置按钮的动画
rightside_config_animation: true

# --------------------------------------
# 全局设置
# --------------------------------------

anchor:
  # 滚动时，URL 将根据标题 id 更新
  auto_update: false
  # 点击标题滚动并更新锚点
  click_to_scroll: false

photofigcaption: false

copy:
  enable: true
  # 复制内容后添加版权信息
  copyright:
    enable: false
    limit_count: 150

# 需要安装 hexo-wordcount 插件
wordcount:
  enable: false
  # 在文章元信息中显示文章字数
  post_wordcount: true
  # 在文章元信息中显示阅读时间
  min2read: true
  # 在侧边栏网站信息中显示网站总字数
  total_wordcount: true

# Busuanzi 统计网站的 PV / UV
busuanzi:
  site_uv: true
  site_pv: true
  page_pv: true

# --------------------------------------
# 数学
# --------------------------------------

# 关于 per_page
# 如果设置为 true，将在每个页面加载 mathjax/katex 脚本
# 如果设置为 false，将根据您的设置加载 mathjax/katex 脚本（在页面的 front-matter 中添加 'mathjax: true' 或 'katex: true'）
math:
  # 选择: mathjax, katex
  # 如果不需要数学公式，请留空
  use:
  per_page: true
  hide_scrollbar: false

  mathjax:
    # 启用右键菜单
    enableMenu: true
    # 选择: all / ams / none，控制公式是否编号以及如何编号
    tags: none

  katex:
    # 启用复制 KaTeX 公式
    copy_tex: false

# --------------------------------------
# 搜索
# --------------------------------------

search:
  # 选择: algolia_search / local_search / docsearch
  # 如果不需要搜索，请留空
  use: local_search
  placeholder: 搜索文章
  hits:
    per_page: 10

  # Algolia 搜索
  algolia_search:
    # 每页搜索结果数量
    hitsPerPage: 6

  # 本地搜索
  local_search:
    # 页面加载时预加载搜索数据
    preload: true
    # 每篇文章显示前 n 个结果，设置为 -1 显示全部结果
    top_n_per_article: -1
    # 将 html 字符串转换为可读格式
    unescape: false
    # 启用搜索结果分页
    pagination:
      enable: true
      # 每页搜索结果数量
      hitsPerPage: 8
    CDN:

  # Docsearch
  # https://docsearch.algolia.com/
  docsearch:
    appId:
    apiKey:
    indexName:
    option:

# --------------------------------------
# 分享系统
# --------------------------------------

share:
  # 选择: sharejs / addtoany
  # 如果不需要分享，请留空
  use: sharejs

  # Share.js
  # https://github.com/overtrue/share.js
  sharejs:
    sites: facebook,x,wechat,weibo,qq

  # AddToAny
  # https://www.addtoany.com/
  addtoany:
    item: facebook,x,wechat,sina_weibo,facebook_messenger,email,copy_link

# --------------------------------------
# 评论系统
# --------------------------------------

comments:
  # 最多两个评论系统，第一个将作为默认显示
  # 如果不需要评论，请留空
  # 选择: Disqus/Disqusjs/Livere/Gitalk/Valine/Waline/Utterances/Facebook Comments/Twikoo/Giscus/Remark42/Artalk/CWD
  # 两个评论系统的格式 : Disqus,Waline
  use: [CWD]
  # 在按钮旁边显示评论名称
  text: true
  # 懒加载：当评论元素进入浏览器视口时加载评论系统
  # 如果设置为 true，评论数量将无效
  lazyload: false
  # 在文章的 top_img 中显示评论数
  count: false
  # 在首页显示评论数
  card_post_count: false

# Disqus
# https://disqus.com/
disqus:
  shortname:
  # 用于最新评论小部件
  apikey:

# 替代 Disqus - 使用 Disqus API 渲染评论
# https://github.com/SukkaW/DisqusJS
disqusjs:
  shortname:
  apikey:
  option:

# Livere
# https://www.livere.com/
livere:
  uid:

# Gitalk
# https://github.com/gitalk/gitalk
gitalk:
  client_id:
  client_secret:
  repo:
  owner:
  admin:
  option:

# Valine
# https://valine.js.org
valine:
  appId:
  appKey:
  avatar: monsterid
  # 此配置适用于国内自定义域名用户，海外版本将自动检测（无需手动填写）
  serverURLs:
  bg:
  # 使用 Valine 访客数作为页面浏览量
  visitor: false
  option:

# Waline - 一个简单的评论系统，从 Valine 分支并支持后端
# https://waline.js.org/
waline:
  serverURL:
  bg:
  # 使用 Waline 页面浏览量作为页面浏览量
  pageview: false
  option:

# Utterances
# https://utteranc.es/
utterances:
  repo:
  # Issue 映射: pathname/url/title/og:title
  issue_term: pathname
  # 主题: github-light/github-dark/github-dark-orange/icy-dark/dark-blue/photon-dark
  light_theme: github-light
  dark_theme: photon-dark
  js:
  option:

# Facebook 评论插件
# https://developers.facebook.com/docs/plugins/comments/
facebook_comments:
  app_id:
  # 可选
  user_id:
  pageSize: 10
  # 选择: social / time / reverse_time
  order_by: social
  lang: en_US

# Twikoo
# https://github.com/imaegoo/twikoo
twikoo:
  envId:
  region:
  # 使用 Twikoo 访客数作为页面浏览量
  visitor: false
  option:

# Giscus
# https://giscus.app/
giscus:
  repo:
  repo_id:
  category_id:
  light_theme: light
  dark_theme: dark
  js:
  option:

# Remark42
# https://remark42.com/docs/configuration/frontend/
remark42:
  host:
  siteId:
  option:

# Artalk
# https://artalk.js.org/guide/frontend/config.html
artalk:
  server:
  site:
  # 使用 Artalk 访客数作为页面浏览量
  visitor: false
  option:

# CWD 评论系统
# https://github.com/anghunk/cwd
cwd:
  apiBaseUrl: https://cwd-api.233002.xyz
  siteId: blog
  lang: zh-CN

# --------------------------------------
# 聊天服务
# --------------------------------------

chat:
  # 选择: chatra/tidio/crisp
  # 如果不需要聊天，请留空
  use:
  # 聊天按钮 [推荐]
  # 它将在网站右下角创建一个按钮，并隐藏原始按钮
  rightside_button: false
  # 向上滚动时显示原始聊天按钮，向下滚动时隐藏按钮
  button_hide_show: false

# https://chatra.io/
chatra:
  id:

# https://www.tidio.com/
tidio:
  public_key:

# https://crisp.chat/en/
crisp:
  website_id:

# --------------------------------------
# 分析
# --------------------------------------

# https://tongji.baidu.com/web/welcome/login
baidu_analytics:

# https://analytics.google.com/analytics/web/
google_analytics:

# https://www.cloudflare.com/zh-tw/web-analytics/
cloudflare_analytics:

# https://clarity.microsoft.com/
microsoft_clarity:

# https://umami.is/
umami_analytics:
  enable: false
  # 对于自托管设置，配置 Umami 实例的主机名
  serverURL:
  script_name: script.js
  website_id:
  option:
  UV_PV:
    site_uv: false
    site_pv: false
    page_pv: false
    # Umami Cloud (API 密钥) / 自托管 Umami (token)
    token:

# https://www.googletagmanager.com/
google_tag_manager:
  tag_id:
  # 可选
  domain:

# --------------------------------------
# 广告
# --------------------------------------

# Google Adsense
google_adsense:
  enable: false
  auto_ads: true
  js: https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js
  client:
  enable_page_level_ads: true

# 手动插入广告
# 如果不需要广告，请留空
ad:
  # 在首页插入广告（每三篇文章）
  index:
  # 在侧边栏插入广告
  aside:
  # 在文章中插入广告（分页前）
  post:

# --------------------------------------
# 网站验证
# --------------------------------------

site_verification:
# - name: google-site-verification
#   content: xxxxxx
# - name: baidu-site-verification
#   content: xxxxxxx

# --------------------------------------
# 美化 / 特效
# --------------------------------------

# 自定义主题颜色
# 注意：颜色值必须使用双引号，如 "#000"，否则可能导致错误！

# theme_color:
#   enable: true
#   main: "#49B1F5"
#   paginator: "#00c4b6"
#   button_hover: "#FF7242"
#   text_selection: "#00c4b6"
#   link_color: "#99a9bf"
#   meta_color: "#858585"
#   hr_color: "#A4D8FA"
#   code_foreground: "#F47466"
#   code_background: "rgba(27, 31, 35, .05)"
#   toc_color: "#00c4b6"
#   blockquote_padding_color: "#49b1f5"
#   blockquote_background_color: "#49b1f5"
#   scrollbar_color: "#49b1f5"
#   meta_theme_color_light: "ffffff"
#   meta_theme_color_dark: "#0d0d0d"

# 分类和标签页的用户界面设置
# 选择: index - 与首页 UI 相同 / default - 与归档页 UI 相同
# 留空或设为 index
category_ui:
tag_ui:

# UI 元素的圆角
rounded_corners_ui: true

# 拉伸线条使每行具有相等的宽度
text_align_justify: false

# 为页眉和页脚添加遮罩
mask:
  header: true
  footer: true

# 加载动画
preloader:
  enable: true
  # 来源
  # 1. fullpage-loading
  # 2. pace (进度条)
  source: 2
  # pace 主题（参见 https://codebyzach.github.io/pace/）
  pace_css_url:

# 页面过渡
enter_transitions: true

# 默认显示模式 - light（默认）/ dark
display_mode: light

# 美化文章内容的配置
beautify:
  enable: true
  # 指定要美化的字段（site 或 post）
  field: post
  # 指定用作标题前缀的图标，例如 '\f0c1'
  title_prefix_icon: '\f02d'
  # 指定标题前缀图标的颜色，例如 '#F47466'
  title_prefix_icon_color: '#F47466'

# 全局字体设置
# 除非您知道如何工作，否则不要修改以下设置
font:
  global_font_size:
  code_font_size:
  font_family:
  code_font_family:

# 网站标题和副标题的字体设置
blog_title_font:
  font_link:
  font_family:

# 分割线图标设置
hr_icon:
  enable: true
  # Font Awesome 图标的 unicode 值，例如 '\3423'
  icon:
  icon_top:

# 打字机效果
# https://github.com/disjukr/activate-power-mode
activate_power_mode:
  enable: true
  colorful: true
  shake: false
  mobile: false

# 背景特效
# --------------------------------------

# canvas_ribbon
# 参见: https://github.com/hustcc/ribbon.js
canvas_ribbon:
  enable: false
  # 丝带的大小
  size: 150
  # 丝带的透明度 (0 ~ 1)
  alpha: 0.6
  zIndex: -1
  click_to_change: false
  mobile: false

# 飘动丝带
canvas_fluttering_ribbon:
  enable: false
  mobile: false

# canvas_nest
# https://github.com/hustcc/canvas-nest.js
canvas_nest:
  enable: false
  # 线条颜色，默认为 '0,0,0'；RGB 值：(R,G,B)。（注意：使用 ',' 分隔）
  color: '0,0,255'
  # 线条的透明度 (0~1)
  opacity: 0.7
  # 背景的 z-index 属性
  zIndex: -1
  # 线条数量
  count: 99
  mobile: false

# 鼠标点击特效：烟花
fireworks:
  enable: false
  zIndex: 9999
  mobile: false

# 鼠标点击特效：爱心符号
click_heart:
  enable: true
  mobile: false

# 鼠标点击特效：文字
clickShowText:
  enable: false
  text:
  # - 我
  # - 爱
  # - 你
  fontSize: 15px
  random: false
  mobile: false

# --------------------------------------
# 图片灯箱设置
# --------------------------------------

# 选择: fancybox / medium_zoom
# https://github.com/francoischalifour/medium-zoom
# https://fancyapps.com/fancybox/
# 如果不需要灯箱，请留空
lightbox: medium_zoom

# --------------------------------------
# 标签插件设置
# --------------------------------------

# 系列
series:
  enable: false
  # 按标题或日期排序
  orderBy: 'title'
  # 排序顺序。1 为升序；-1 为降序
  order: 1
  number: true

# ABCJS - ABC 音乐符号插件
# https://github.com/paulrosen/abcjs
abcjs:
  enable: false
  per_page: true

# Mermaid
# https://github.com/mermaid-js/mermaid
mermaid:
  enable: false
  # 使用代码块编写 Mermaid 图表
  code_write: false
  # 内置主题: default / forest / dark / neutral
  theme:
    light: default
    dark: dark
  # 启用"在新标签页中打开"按钮，以便在单独的窗口中查看图表
  open_in_new_tab: true
  # 在图表上启用缩放和平移交互
  zoom_pan: true

# chartjs
# 参见 https://www.chartjs.org/docs/latest/
chartjs:
  enable: false
  # 除非您理解它们的工作原理，否则不要修改
  # 仅当未指定 MD 语法时才使用默认设置
  # 图表的通用字体颜色
  fontColor:
    light: 'rgba(0, 0, 0, 0.8)'
    dark: 'rgba(255, 255, 255, 0.8)'
  # 图表的通用边框颜色
  borderColor:
    light: 'rgba(0, 0, 0, 0.1)'
    dark: 'rgba(255, 255, 255, 0.2)'
  # 雷达图和极坐标图上刻度标签的背景颜色
  scale_ticks_backdropColor:
    light: 'transparent'
    dark: 'transparent'

# Note - Bootstrap 提示框
note:
  # Note 标签样式值：
  #  - simple    旧的 bs-callout 警告样式。默认。
  #  - modern    新的 bs-callout (v2-v3) 警告样式。
  #  - flat      带背景的扁平提示框样式，如 Mozilla 或 StackOverflow。
  #  - disabled  禁用 note 标签的所有 CSS 样式导入。
  style: flat
  icons: true
  border_radius: 3
  # modern 和 flat 样式的背景偏移量（百分比）（modern: -12 | 12; flat: -18 | 6）。
  # 偏移也应用于标签变量。此选项可与禁用的 note 标签配合使用。
  light_bg_offset: 0

# --------------------------------------
# 其他设置
# --------------------------------------

# https://github.com/MoOx/pjax
pjax:
  enable: true
  # 从 pjax 中排除指定的页面，例如 '/music/'
  exclude:
    - /games/
    - /bookmarks/
  # - /xxxxxx/

# 注入 css 和脚本 (aplayer/meting)
aplayerInject:
  enable: false
  per_page: false

# Snackbar - 吐司通知
# https://github.com/polonel/SnackBar
# 位置: top-left / top-center / top-right / bottom-left / bottom-center / bottom-right
snackbar:
  enable: false
  position: bottom-left
  # 浅色模式和深色模式下吐司通知的背景颜色
  bg_light: '#49b1f5'
  bg_dark: '#1f1f1f'

# Instant.page
# https://instant.page/
instantpage: false

# 懒加载
# https://github.com/verlok/vanilla-lazyload
lazyload:
  enable: true
  # 使用浏览器的原生懒加载而不是 vanilla-lazyload
  native: true
  # 指定要使用懒加载的字段（site 或 post）
  field: site
  placeholder:
  blur: false

# PWA
# 参见 https://github.com/JLHwung/hexo-offline
# ---------------
pwa:
  enable: false
  manifest:
  apple_touch_icon:
  favicon_32_32:
  favicon_16_16:
  mask_icon:

# Open graph 元标签
# https://hexo.io/docs/helpers#open-graph
Open_Graph_meta:
  enable: true
  option:
  # twitter_card:
  # twitter_image:
  # twitter_id:
  # twitter_site:
  # google_plus:
  # fb_admins:
  # fb_app_id:

# 结构化数据
# https://developers.google.com/search/docs/guides/intro-structured-data
structured_data:
  enable: false
  # 网站的备用名称，用于结构化数据
  # 格式: ['name1', 'name2']
  alternate_name:

# 添加供应商前缀以确保兼容性
css_prefix: true

# 注入
# 在 head 之前（'</head>' 标签之前）和 bottom 之前（'</body>' 标签之前）插入代码
inject:
  head:
    # 注入 common.css 全站统一设计Token
    - <link rel="stylesheet" href="/tools/common.css">
    # 注入 site-override.css 桥接Butterfly→common.css
    - <link rel="stylesheet" href="/tools/site-override.css">
    # 注入 custom.css 全站自定义样式
    - <link rel="stylesheet" href="/css/custom.css">
    # Font Awesome 字体预加载 — 让字体文件提前下载，减少首次访问的等待时间
    - <link rel="preload" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@7.1.0/webfonts/fa-solid-900.woff2" as="font" type="font/woff2" crossorigin>
    - <link rel="preload" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@7.1.0/webfonts/fa-regular-400.woff2" as="font" type="font/woff2" crossorigin>
    - <link rel="preload" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@7.1.0/webfonts/fa-brands-400.woff2" as="font" type="font/woff2" crossorigin>

  bottom:
    # 太空背景
    - <script src="/tools/bg.js"></script>
    # 侧边栏小组件懒加载 (日历+天气，按需加载)
    - <script src="/js/widget-loader.js"></script>
    # 看板娘开关
    - <script src="/js/live2d-toggle.js"></script>


# CDN 设置
# 除非您知道如何工作，否则不要修改以下设置
CDN:
  # 内部和第三方脚本的 CDN 提供商
  # 两者的选项: local/jsdelivr/unpkg/cdnjs/custom
  # 注意: 开发版本只能对内部脚本使用 'local'
  # 注意: 当将第三方脚本设置为 'local' 时，您需要安装 hexo-butterfly-extjs
  internal_provider: local
  third_party_provider: jsdelivr

  # 在 url 中添加版本号，true 或 false
  version: true

  # 自定义格式
  # 例如: https://cdn.staticfile.org/${cdnjs_name}/${version}/${min_cdnjs_file}
  custom_format:

  option:
