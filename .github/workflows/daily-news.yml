name: Daily News Generator

on:
  schedule:
    - cron: '0 1 * * *'   # 09:00 CST (01:00 UTC)
  workflow_dispatch:
    inputs:
      topics:
        description: 'Custom topics (optional, leave empty for auto)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: Install scrapling
        run: pip install scrapling curl_cffi

      - name: Generate daily news
        env:
          AGNES_API_KEY: ${{ secrets.AGNES_API_KEY }}
          BLOG_DIR: ${{ github.workspace }}
        run: python _scripts/daily-news.py

      - name: Commit and push
        run: |
          cd ${{ github.workspace }}
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add source/_posts/daily-news/
          if ! git diff --cached --quiet; then
            git commit -m "auto: daily news $(date +%F)"
            git push
          fi
