name: Daily News Generator

on:
  schedule:
    - cron: '0 1 * * *'   # 09:00 CST (01:00 UTC)
  workflow_dispatch:
    inputs:
      topics:
        description: 'Custom topics (optional, leave empty for auto)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Generate daily news
        env:
          AGNES_API_KEY: ${{ secrets.AGNES_API_KEY }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_R2_TOKEN: ${{ secrets.CF_R2_TOKEN }}
          BLOG_DIR: ${{ github.workspace }}
        run: python _scripts/daily-news.py

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          cd ${{ github.workspace }}
          npx -y wrangler pages deploy public --project-name=my-blog --commit-dirty=true
